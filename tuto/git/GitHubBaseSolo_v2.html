<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub — La Base Solo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;800&family=Press+Start+2P&family=Fredoka:wght@500;600&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<style>
/* =========================================================
   THEMES — 10 themes, chacun avec sa variante .day dediee
   ========================================================= */

/* HiveOS */
.theme-hiveos{--bg:#111;--bg2:#1c1c1c;--bg3:#262626;--bg4:#303030;--brd:#7d206f44;--tx:#f5f5f5;--tx2:#b8a7b5;--ac:#7d206f;--ac2:#da1d33;--ok:#57f287;--title:'Syne';}
.theme-hiveos.day{--bg:#fff7fb;--bg2:#f8eaf2;--bg3:#efd7e6;--bg4:#e4c3d7;--brd:#7d206f33;--tx:#180812;--tx2:#5f4057;--ac:#9a145f;--ac2:#c21758;--ok:#168a4b;}

/* Pro Bleu */
.theme-problue{--bg:#08080f;--bg2:#0e0e18;--bg3:#171728;--bg4:#2a2a42;--brd:#1f1f35;--tx:#e4e4f4;--tx2:#9a9abc;--ac:#5865f2;--ac2:#a855f7;--ok:#57f287;--warn:#faa61a;--danger:#ed4245;--title:'Syne';}
.theme-problue.day{--bg:#f6f7ff;--bg2:#eceeff;--bg3:#dde2ff;--bg4:#cbd2ff;--brd:#b9c0f5;--tx:#0d1024;--tx2:#39405f;--ac:#3e4fd8;--ac2:#8b3fd8;--ok:#168a4b;--warn:#9a6400;--danger:#b62025;}

/* Bleu */
.theme-bleu{--bg:#080810;--bg2:#0f0f1c;--bg3:#181828;--bg4:#22223a;--brd:#2a2a48;--tx:#e2e2f4;--tx2:#9ca0c8;--ac:#5b8dee;--ac2:#7b6dee;--ok:#57f287;--title:'Syne';}
.theme-bleu.day{--bg:#f4f8ff;--bg2:#e8f0ff;--bg3:#d8e6ff;--bg4:#c4d8ff;--brd:#9db9ee;--tx:#071428;--tx2:#385070;--ac:#2f68c8;--ac2:#4f58c8;--ok:#168a4b;}

/* Dracula */
.theme-dracula{--bg:#282a36;--bg2:#21222c;--bg3:#44475a;--bg4:#6272a4;--brd:#44475a;--tx:#f8f8f2;--tx2:#b8bdd9;--ac:#ff79c6;--ac2:#bd93f9;--ok:#50fa7b;--title:'Syne';}
.theme-dracula.day{--bg:#fff5fb;--bg2:#f4e8f2;--bg3:#e8d7e6;--bg4:#d7c1d2;--brd:#b58aa8;--tx:#21121d;--tx2:#65485c;--ac:#9a0060;--ac2:#7a3fb0;--ok:#168a4b;}

/* Windows95 */
.theme-windows95{--bg:#1f1f1f;--bg2:#2b2b2b;--bg3:#3a3a3a;--bg4:#4a4a4a;--brd:#808080;--tx:#f2f2f2;--tx2:#c0c0c0;--ac:#3b6ea5;--ac2:#3b6ea5;--ok:#2faf5a;--title:'Syne';}
.theme-windows95.day{--bg:#c0c0c0;--bg2:#c0c0c0;--bg3:#d4d0c8;--bg4:#e8e4dc;--brd:#808080;--tx:#000;--tx2:#444;--ac:#000080;--ac2:#000080;--ok:#107010;}

/* Terminal */
.theme-terminal{--bg:#020200;--bg2:#070700;--bg3:#0f0f00;--bg4:#181800;--brd:#2bd90040;--tx:#2bd900;--tx2:#1e9900;--ac:#2bd900;--ac2:#1e9900;--ok:#00ff88;--title:'Press Start 2P';}
.theme-terminal.day{--bg:#f3fff0;--bg2:#e3f7df;--bg3:#d0ebc9;--bg4:#b9ddb0;--brd:#197a0040;--tx:#10240a;--tx2:#315d24;--ac:#197a00;--ac2:#315d24;--ok:#006b38;}

/* Picsou */
.theme-picsou{--bg:#140d00;--bg2:#201300;--bg3:#301c00;--bg4:#402600;--brd:#c89600;--tx:#ffd700;--tx2:#b07800;--ac:#ffd700;--ac2:#b07800;--ok:#4caf50;--title:'Fredoka';}
.theme-picsou.day{--bg:#fff8df;--bg2:#f8edbd;--bg3:#eedc91;--bg4:#dfc760;--brd:#b88a00;--tx:#2a1c00;--tx2:#6a4a00;--ac:#8a6000;--ac2:#6a4a00;--ok:#2f7d32;}

/* Cyberpunk */
.theme-cyberpunk{--bg:#02000e;--bg2:#060018;--bg3:#0c0028;--bg4:#120036;--brd:#ff006650;--tx:#eeeeff;--tx2:#a394ff;--ac:#ff0066;--ac2:#00ffcc;--ok:#00ffcc;--title:'Orbitron';}
.theme-cyberpunk.day{--bg:#fff3f8;--bg2:#f7e3ef;--bg3:#ebcadf;--bg4:#dcaacb;--brd:#99003d55;--tx:#210011;--tx2:#66334b;--ac:#99003d;--ac2:#007a66;--ok:#007a66;}

/* Spectre */
.theme-spectre{--bg:#0a0a0f;--bg2:#0f0f16;--bg3:#16161f;--bg4:#1e1e2a;--brd:#2a2a3a;--tx:#e8e8f0;--tx2:#9ba0aa;--ac:#4df0a0;--ac2:#4da0f0;--ok:#4df0a0;--title:'Syne';}
.theme-spectre.day{--bg:#f0f7f4;--bg2:#e0eee8;--bg3:#cfddd8;--bg4:#bdd0cb;--brd:#1a6e5040;--tx:#0a1412;--tx2:#2e4a44;--ac:#1a6e50;--ac2:#1a4a6e;--ok:#1a6e50;}

/* Matrix */
.theme-matrix{--bg:#050805;--bg2:#081008;--bg3:#0d180d;--bg4:#132013;--brd:#2bd90030;--tx:#2bd900;--tx2:#1e9900;--ac:#2bd900;--ac2:#1e9900;--ok:#00ff88;--title:'Press Start 2P';}
.theme-matrix.day{--bg:#f1faef;--bg2:#e1f2dc;--bg3:#cce6c5;--bg4:#b2d6aa;--brd:#197a0035;--tx:#10240a;--tx2:#315d24;--ac:#197a00;--ac2:#315d24;--ok:#006b38;}

/* =========================================================
   BASE
   ========================================================= */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Space Mono',monospace;
  background:var(--bg);
  color:var(--tx);
  line-height:1.6;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
  transition:background .3s,color .3s;
}

/* Fonds par theme */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;}
.theme-hiveos::before,.theme-bleu::before,.theme-dracula::before,.theme-picsou::before{
  background:radial-gradient(circle at 12% 8%,var(--ac) 0%,transparent 38%),radial-gradient(circle at 88% 92%,var(--ac2) 0%,transparent 38%);
  opacity:.07;
}
.theme-problue::before{
  background:radial-gradient(circle at 12% 8%,#5865f2 0%,transparent 38%),radial-gradient(circle at 88% 92%,#a855f7 0%,transparent 38%);
  opacity:.05;
}
.theme-cyberpunk::before{
  background:radial-gradient(circle at 12% 8%,var(--ac) 0%,transparent 38%),radial-gradient(circle at 88% 92%,var(--ac2) 0%,transparent 38%);
  opacity:.06;
}
.theme-spectre::before{
  background-image:linear-gradient(rgba(77,240,160,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(77,240,160,.03) 1px,transparent 1px);
  background-size:40px 40px;opacity:1;
}
.theme-spectre.day::before{
  background-image:linear-gradient(rgba(26,110,80,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(26,110,80,.06) 1px,transparent 1px);
}
.theme-matrix::before{
  background-image:linear-gradient(rgba(43,217,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(43,217,0,.04) 1px,transparent 1px);
  background-size:40px 40px;opacity:1;
}
.theme-matrix.day::before{
  background-image:linear-gradient(rgba(25,122,0,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(25,122,0,.06) 1px,transparent 1px);
}
.theme-terminal::before,.theme-windows95::before{background:none;}

/* =========================================================
   HEADER INVISIBLE (guide) — se fond dans le contenu
   ========================================================= */
#hdr{
  position:relative;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 6px;max-width:1000px;margin:0 auto;
}
#logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.5px;
  background:linear-gradient(90deg,var(--ac),var(--ac2));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  cursor:default;user-select:none;
}
.theme-windows95 #logo,.theme-terminal #logo,.theme-matrix #logo{
  -webkit-text-fill-color:var(--ac);background:none;
}
#sysbtns{display:flex;gap:6px;align-items:center;}
.sysbtn{
  background:transparent;border:none;color:var(--tx);
  font-size:20px;cursor:pointer;width:38px;height:38px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;position:relative;
  transition:background .2s,transform .15s;
}
.sysbtn:hover{background:var(--bg3);transform:translateY(-1px);}
.sysbtn[data-tip]:hover::after{
  content:attr(data-tip);position:absolute;top:46px;right:0;white-space:nowrap;
  background:var(--bg4);color:var(--tx);font-size:11px;padding:4px 8px;border-radius:6px;
  border:1px solid var(--brd);z-index:200;font-family:'Space Mono',monospace;
}

/* =========================================================
   LAYOUT CONTENU
   ========================================================= */
.wrap{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:0 20px 90px;}
.hero{text-align:center;padding:24px 0 14px;}
.hero h1{
  font-family:var(--title),'Syne',sans-serif;font-size:38px;line-height:1.1;margin-bottom:10px;
  color:var(--tx);
}
.theme-terminal .hero h1,.theme-matrix .hero h1{font-size:22px;}
.hero p{color:var(--tx2);max-width:620px;margin:0 auto;font-size:15px;}

/* Barre progression */
#progwrap{
  background:var(--bg2);border:1px solid var(--brd);border-radius:14px;
  padding:16px 18px;margin:18px 0 26px;
}
#progwrap .ptop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:14px;}
#progwrap .ptop b{color:var(--ac);}
#progbar{height:10px;background:var(--bg4);border-radius:6px;overflow:hidden;}
#progfill{height:100%;width:0;background:linear-gradient(90deg,var(--ac),var(--ac2));transition:width .4s;}

/* Sections */
.sec{
  background:var(--bg2);border:1px solid var(--brd);border-radius:14px;
  margin-bottom:16px;overflow:hidden;
}
.sec-head{
  display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;
  user-select:none;transition:background .2s;
}
.sec-head:hover{background:var(--bg3);}
.sec-head .ic{font-size:22px;}
.sec-head h2{
  font-family:var(--title),'Syne',sans-serif;font-size:19px;flex:1;color:var(--tx);
}
.theme-terminal .sec-head h2,.theme-matrix .sec-head h2{font-size:13px;}
.sec-head .arr{transition:transform .3s;color:var(--tx2);font-size:14px;}
.sec.closed .arr{transform:rotate(-90deg);}
.sec-body{padding:0 18px 18px;}
.sec.closed .sec-body{display:none;}
.sec-intro{color:var(--tx2);font-size:14px;margin-bottom:16px;padding-top:2px;}

/* Cards concept */
.card{
  background:var(--bg);border:1px solid var(--brd);border-radius:11px;
  padding:14px 15px;margin-bottom:11px;position:relative;
  transition:border-color .2s;
}
.card.done{border-color:var(--ok);}
.card .ctop{display:flex;align-items:flex-start;gap:10px;margin-bottom:7px;}
.card .term{font-weight:700;font-size:15px;color:var(--ac);flex:1;}
.card .fr{color:var(--tx2);font-size:13px;font-weight:400;}
.card .def{font-size:14px;margin-bottom:7px;}
.card .ex{
  font-size:13px;background:var(--bg3);border-left:3px solid var(--ac2);
  padding:8px 11px;border-radius:0 7px 7px 0;color:var(--tx2);
}
.card .ex b{color:var(--tx);}

/* Cards command */
.card .cmd{
  font-weight:700;font-size:15px;color:var(--ac);flex:1;
  font-family:'Space Mono',monospace;
}
.card .note{
  font-size:12px;margin-top:7px;color:var(--tx2);font-style:italic;
}
code,.codeinline{
  font-family:'Space Mono',monospace;background:var(--bg3);
  padding:2px 6px;border-radius:5px;font-size:13px;color:var(--tx);
  border:1px solid var(--brd);
}

/* Bouton maitrise */
.chk{
  flex-shrink:0;border:1.5px solid var(--brd);background:var(--bg3);color:var(--tx2);
  border-radius:7px;font-size:11px;padding:5px 9px;cursor:pointer;white-space:nowrap;
  font-family:'Space Mono',monospace;transition:all .2s;
}
.chk:hover{border-color:var(--ac);}
.chk.on{background:var(--ok);border-color:var(--ok);color:#000;font-weight:700;}

/* Steps */
.step{display:flex;gap:13px;margin-bottom:13px;}
.step .num{
  flex-shrink:0;width:28px;height:28px;border-radius:50%;
  background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;
}
.theme-terminal .step .num,.theme-matrix .step .num,.theme-picsou .step .num,.theme-spectre .step .num{color:#000;}
.step .stx{font-size:14px;padding-top:3px;}
.step .stx b{color:var(--ac);}

/* Tips */
.tip{
  display:flex;gap:10px;font-size:14px;margin-bottom:10px;
  background:var(--bg);border-radius:9px;padding:11px 13px;border:1px solid var(--brd);
}
.tip .tic{font-size:18px;flex-shrink:0;}

/* =========================================================
   BLOC-NOTES flottant
   ========================================================= */
#np{
  position:fixed;top:90px;right:30px;width:320px;height:280px;z-index:900;
  background:var(--bg2);border:1px solid var(--brd);border-radius:13px;
  display:none;flex-direction:column;box-shadow:0 18px 50px rgba(0,0,0,.5);
  min-width:220px;min-height:160px;overflow:hidden;
}
#np.on{display:flex;}
#np-head{
  background:var(--bg3);padding:9px 12px;cursor:move;display:flex;
  align-items:center;justify-content:space-between;user-select:none;
}
#np-head span{font-size:13px;font-weight:700;}
#np-copy{
  background:var(--ac);color:#fff;border:none;border-radius:6px;font-size:11px;
  padding:4px 9px;cursor:pointer;font-family:'Space Mono',monospace;
}
.theme-terminal #np-copy,.theme-matrix #np-copy,.theme-picsou #np-copy,.theme-spectre #np-copy{color:#000;}
#np-ta{
  flex:1;background:var(--bg);color:var(--tx);border:none;resize:none;
  padding:12px;font-family:'Space Mono',monospace;font-size:13px;outline:none;
}
#np-rz{
  position:absolute;right:2px;bottom:2px;width:16px;height:16px;cursor:nwse-resize;
  background:linear-gradient(135deg,transparent 50%,var(--tx2) 50%,var(--tx2) 60%,transparent 60%,transparent 70%,var(--tx2) 70%,var(--tx2) 80%,transparent 80%);
}

/* =========================================================
   MENU THEME (dropdown custom)
   ========================================================= */
#th-wrap{position:relative;}
#th-menu{
  position:absolute;top:46px;right:0;background:var(--bg2);border:1px solid var(--brd);
  border-radius:11px;padding:6px;display:none;flex-direction:column;gap:2px;z-index:300;
  box-shadow:0 14px 40px rgba(0,0,0,.45);min-width:170px;max-height:70vh;overflow-y:auto;
}
#th-menu.on{display:flex;}
.th-opt{
  background:transparent;border:none;color:var(--tx);text-align:left;cursor:pointer;
  padding:9px 11px;border-radius:8px;font-size:13px;font-family:'Space Mono',monospace;
  display:flex;align-items:center;gap:9px;transition:background .15s;
}
.th-opt:hover{background:var(--bg3);}
.th-opt.on{background:var(--ac);color:#fff;}
.theme-terminal .th-opt.on,.theme-matrix .th-opt.on,.theme-picsou .th-opt.on,.theme-spectre .th-opt.on{color:#000;}

/* =========================================================
   MODAL SAUVEGARDE
   ========================================================= */
#sv-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;
  display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;
}
#sv-ov.on{display:flex;}
#sv-box{
  background:var(--bg2);border:1px solid var(--brd);border-radius:16px;
  width:100%;max-width:520px;padding:22px;
}
#sv-box h3{font-family:var(--title),'Syne',sans-serif;font-size:20px;margin-bottom:4px;}
.theme-terminal #sv-box h3,.theme-matrix #sv-box h3{font-size:14px;}
.sv-sec{margin-top:20px;}
.sv-sec h4{font-size:14px;margin-bottom:9px;color:var(--ac);display:flex;align-items:center;gap:7px;}
.sv-sec textarea{
  width:100%;background:var(--bg);color:var(--tx);border:1px solid var(--brd);
  border-radius:9px;padding:10px;font-family:'Space Mono',monospace;font-size:12px;
  resize:vertical;min-height:70px;outline:none;
}
.sv-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px;}
.btn{
  border:1px solid var(--brd);background:var(--bg3);color:var(--tx);border-radius:9px;
  padding:9px 13px;cursor:pointer;font-size:13px;font-family:'Space Mono',monospace;
  transition:all .2s;flex:1;min-width:120px;
}
.btn:hover{border-color:var(--ac);}
.btn-ac{background:var(--ac);color:#fff;border-color:var(--ac);}
.theme-terminal .btn-ac,.theme-matrix .btn-ac,.theme-picsou .btn-ac,.theme-spectre .btn-ac{color:#000;}
.btn-dng{background:transparent;border-color:#ed4245;color:#ed4245;}
.btn-dng:hover{background:#ed4245;color:#fff;}
.sv-in{
  width:100%;background:var(--bg);color:var(--tx);border:1px solid var(--brd);
  border-radius:9px;padding:9px 11px;font-family:'Space Mono',monospace;font-size:13px;
  outline:none;margin-bottom:9px;
}
#sv-close{position:absolute;}
.sv-x{float:right;background:transparent;border:none;color:var(--tx2);font-size:22px;cursor:pointer;line-height:1;}

/* =========================================================
   VISITE GUIDEE
   ========================================================= */
#tour-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;
  display:none;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
#tour-ov.on{display:block;}
#tour-win{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2100;
  background:var(--bg2);border:1px solid var(--ac);border-radius:16px;
  width:calc(100% - 40px);max-width:420px;padding:24px;display:none;
  box-shadow:0 20px 60px rgba(0,0,0,.6);text-align:center;
}
#tour-win.on{display:block;}
#tour-step{font-size:12px;color:var(--ac);margin-bottom:8px;letter-spacing:1px;}
#tour-title{font-family:var(--title),'Syne',sans-serif;font-size:20px;margin-bottom:10px;}
.theme-terminal #tour-title,.theme-matrix #tour-title{font-size:14px;}
#tour-text{font-size:14px;color:var(--tx);margin-bottom:20px;line-height:1.55;}
.tour-btns{display:flex;gap:10px;justify-content:center;}
#tour-nb{background:var(--ac);color:#fff;border:none;border-radius:9px;padding:10px 22px;cursor:pointer;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;}
.theme-terminal #tour-nb,.theme-matrix #tour-nb,.theme-picsou #tour-nb,.theme-spectre #tour-nb{color:#000;}
#tour-close{background:transparent;border:1px solid var(--brd);color:var(--tx2);border-radius:9px;padding:10px 18px;cursor:pointer;font-family:'Space Mono',monospace;font-size:14px;}
.tour-hi{position:relative;z-index:2050!important;outline:3px solid var(--ac);outline-offset:4px;border-radius:10px;background:var(--bg);box-shadow:0 0 0 9999px rgba(0,0,0,.0);}

/* Responsive */
@media(max-width:600px){
  .hero h1{font-size:28px;}
  .theme-terminal .hero h1,.theme-matrix .hero h1{font-size:17px;}
  #np{right:14px;left:14px;width:auto;}
  .card .ctop{flex-wrap:wrap;}
  #hdr{padding:14px 14px 4px;}
  #logo{font-size:20px;}
}
</style>
</head>
<body class="theme-hiveos">

<header id="hdr">
  <div id="logo">HiveOS</div>
  <div id="sysbtns">
    <button class="sysbtn" id="btn-np" data-tip="Bloc-notes">📝</button>
    <div id="th-wrap">
      <button class="sysbtn" id="btn-th" data-tip="Thème">🎨</button>
      <div id="th-menu"></div>
    </div>
    <button class="sysbtn" id="btn-dn" data-tip="Jour / Nuit">🌙</button>
    <button class="sysbtn" id="btn-sv" data-tip="Sauvegarde">💾</button>
    <button class="sysbtn" id="btn-help" data-tip="Aide">❓</button>
  </div>
</header>

<div class="wrap">
  <div class="hero">
    <h1 id="hero-title"></h1>
    <p id="hero-sub"></p>
  </div>
  <div id="progwrap">
    <div class="ptop"><span id="prog-label">Progression</span><span><b id="prog-num">0</b> / <span id="prog-tot">0</span> maîtrisés</span></div>
    <div id="progbar"><div id="progfill"></div></div>
  </div>
  <div id="content"></div>
</div>

<!-- Bloc-notes -->
<div id="np">
  <div id="np-head"><span>📝 Bloc-notes</span><button id="np-copy">Copier</button></div>
  <textarea id="np-ta" placeholder="Tes notes perso… (sauvegardées sur cet appareil)"></textarea>
  <div id="np-rz"></div>
</div>

<!-- Modal sauvegarde -->

const THEMES=[
  {id:"hiveos",name:"HiveOS",emo:"🐝"},
  {id:"problue",name:"Pro Bleu",emo:"🔷"},
  {id:"bleu",name:"Bleu",emo:"🔵"},

  {id:"matrix",name:"Matrix",emo:"🟢"}
];

let S={progress:{},open:{}};
let theme='hiveos',dayMode=false;

// Charge l'etat metier : URL hash > localStorage > SEED
function loadState(){
  let loaded=null;
  try{
    const h=location.hash;
    if(h&&h.indexOf('#d=')===0){
      loaded=JSON.parse(decodeURIComponent(escape(atob(h.slice(3)))));
    }
  }catch(e){loaded=null;}
  if(!loaded){
    try{const ls=localStorage.getItem('app_data_state');if(ls)loaded=JSON.parse(ls);}catch(e){loaded=null;}
  }
  if(!loaded)loaded=JSON.parse(JSON.stringify(SEED_STATE));
  S.progress=loaded.progress||{};
  S.open=loaded.open||{};
  // theme + mode jour (stockes a part, exclus des donnees metier)
  try{const t=localStorage.getItem('app-theme');if(t)theme=t;}catch(e){}
  try{const d=localStorage.getItem('app-day-mode');if(d==='1')dayMode=true;}catch(e){}
}

function saveState(){
  try{localStorage.setItem('app_data_state',JSON.stringify({progress:S.progress,open:S.open}));}catch(e){}
}

function applyTheme(){
  document.body.className='theme-'+theme+(dayMode?' day':'');
  document.getElementById('btn-dn').textContent=dayMode?'☀️':'🌙';
  // refresh menu actif
  document.querySelectorAll('.th-opt').forEach(o=>o.classList.toggle('on',o.dataset.t===theme));
  try{localStorage.setItem('app-theme',theme);localStorage.setItem('app-day-mode',dayMode?'1':'0');}catch(e){}
}

/* =========================================================
   RENDU (data-driven)
   ========================================================= */
function render(){
  document.getElementById('hero-title').textContent=CONTENT.title;
  document.getElementById('hero-sub').textContent=CONTENT.sub;
  const root=document.getElementById('content');
  root.innerHTML='';
  CONTENT.sections.forEach(sec=>{
    const closed=S.open[sec.id]===false;
    const el=document.createElement('div');
    el.className='sec'+(closed?' closed':'');
    let inner='<div class="sec-head" data-sec="'+sec.id+'"><span class="ic">'+sec.icon+'</span><h2>'+sec.title+'</h2><span class="arr">▼</span></div>';
    inner+='<div class="sec-body"><div class="sec-intro">'+sec.intro+'</div>';
    sec.items.forEach(it=>{
      if(sec.type==='concept'){
        const done=S.progress[it.id]?' done':'';
        inner+='<div class="card'+done+'"><div class="ctop"><span class="term">'+it.term+' <span class="fr">'+it.fr+'</span></span><button class="chk'+(S.progress[it.id]?' on':'')+'" data-id="'+it.id+'">'+(S.progress[it.id]?'✓ Acquis':'À voir')+'</button></div><div class="def">'+it.def+'</div><div class="ex">'+it.example+'</div></div>';
      }else if(sec.type==='command'){
        const done=S.progress[it.id]?' done':'';
        inner+='<div class="card'+done+'"><div class="ctop"><span class="cmd">'+it.cmd+'</span><button class="chk'+(S.progress[it.id]?' on':'')+'" data-id="'+it.id+'">'+(S.progress[it.id]?'✓ Acquis':'À voir')+'</button></div><div class="def">'+it.role+'</div><div class="ex"><b>Exemple :</b> <code>'+it.example+'</code></div><div class="note">'+it.note+'</div></div>';
      }else if(sec.type==='steps'){
        inner+='<div class="step"><div class="num">'+it.step+'</div><div class="stx">'+it.text+'</div></div>';
      }else if(sec.type==='tips'){
        inner+='<div class="tip"><span class="tic">→</span><div>'+it.text+'</div></div>';
      }
    });
    inner+='</div>';
    el.innerHTML=inner;
    root.appendChild(el);
  });
  bindContent();
  updateProgress();
}

function bindContent(){
  document.querySelectorAll('.sec-head').forEach(h=>{
    h.onclick=()=>{
      const id=h.dataset.sec;
      S.open[id]=!(S.open[id]!==false);
      h.parentElement.classList.toggle('closed');
      saveState();
    };
  });
  document.querySelectorAll('.chk').forEach(b=>{
    b.onclick=(e)=>{
      e.stopPropagation();
      const id=b.dataset.id;
      S.progress[id]=!S.progress[id];
      render();
      saveState();
    };
  });
}

function updateProgress(){
  let tot=0,done=0;
  CONTENT.sections.forEach(s=>{
    if(s.type==='concept'||s.type==='command'){
      s.items.forEach(it=>{tot++;if(S.progress[it.id])done++;});
    }
  });
  document.getElementById('prog-num').textContent=done;
  document.getElementById('prog-tot').textContent=tot;
  document.getElementById('progfill').style.width=(tot?(done/tot*100):0)+'%';
}

/* =========================================================
   MENU THEME
   ========================================================= */
function buildThemeMenu(){
  const m=document.getElementById('th-menu');
  m.innerHTML='';
  THEMES.forEach(t=>{
    const b=document.createElement('button');
    b.className='th-opt'+(t.id===theme?' on':'');
    b.dataset.t=t.id;
    b.innerHTML='<span>'+t.emo+'</span><span>'+t.name+'</span>';
    b.onclick=()=>{theme=t.id;applyTheme();m.classList.remove('on');};
    m.appendChild(b);
  });
}
document.getElementById('btn-th').onclick=(e)=>{e.stopPropagation();document.getElementById('th-menu').classList.toggle('on');};
document.getElementById('btn-dn').onclick=()=>{dayMode=!dayMode;applyTheme();};

/* =========================================================
   BLOC-NOTES (drag + resize + copie)
   ========================================================= */
const np=document.getElementById('np'),npHead=document.getElementById('np-head'),npTa=document.getElementById('np-ta'),npRz=document.getElementById('np-rz');
document.getElementById('btn-np').onclick=()=>np.classList.toggle('on');
document.getElementById('np-copy').onclick=()=>{
  npTa.select();navigator.clipboard.writeText(npTa.value);
  const b=document.getElementById('np-copy');b.textContent='Copié ✓';setTimeout(()=>b.textContent='Copier',1200);
};
npTa.addEventListener('input',()=>{try{localStorage.setItem('hiveos_notepad',npTa.value);}catch(e){}});

// Drag
let drag=false,dx=0,dy=0;
function startDrag(x,y){drag=true;const r=np.getBoundingClientRect();dx=x-r.left;dy=y-r.top;}
function moveDrag(x,y){if(!drag)return;np.style.left=(x-dx)+'px';np.style.top=(y-dy)+'px';np.style.right='auto';}
npHead.addEventListener('mousedown',e=>startDrag(e.clientX,e.clientY));
npHead.addEventListener('touchstart',e=>{const t=e.touches[0];startDrag(t.clientX,t.clientY);});
document.addEventListener('mousemove',e=>moveDrag(e.clientX,e.clientY));
document.addEventListener('touchmove',e=>{if(drag){const t=e.touches[0];moveDrag(t.clientX,t.clientY);}});
document.addEventListener('mouseup',()=>drag=false);
document.addEventListener('touchend',()=>drag=false);
// Resize
let rz=false,rw=0,rh=0,rx=0,ry=0;
function startRz(x,y){rz=true;const r=np.getBoundingClientRect();rw=r.width;rh=r.height;rx=x;ry=y;}
function moveRz(x,y){if(!rz)return;np.style.width=Math.max(220,rw+(x-rx))+'px';np.style.height=Math.max(160,rh+(y-ry))+'px';}
npRz.addEventListener('mousedown',e=>{e.stopPropagation();startRz(e.clientX,e.clientY);});
npRz.addEventListener('touchstart',e=>{e.stopPropagation();const t=e.touches[0];startRz(t.clientX,t.clientY);});
document.addEventListener('mousemove',e=>moveRz(e.clientX,e.clientY));
document.addEventListener('touchmove',e=>{if(rz){const t=e.touches[0];moveRz(t.clientX,t.clientY);}});
document.addEventListener('mouseup',()=>rz=false);
document.addEventListener('touchend',()=>rz=false);

function openSave(){
  document.getElementById('sv-out').value=JSON.stringify({progress:S.progress,open:S.open},null,2);
  svOv.classList.add('on');
}
document.getElementById('btn-sv').onclick=openSave;
document.getElementById('sv-x').onclick=()=>svOv.classList.remove('on');
svOv.addEventListener('click',e=>{if(e.target===svOv)svOv.classList.remove('on');});

document.getElementById('sv-copy').onclick=()=>{
  const t=document.getElementById('sv-out');t.select();navigator.clipboard.writeText(t.value);
  flash('sv-copy','Copié ✓','Copier le JSON');
};
document.getElementById('sv-dl').onclick=()=>{
  dlFile(JSON.stringify({progress:S.progress,open:S.open},null,2),'github-base-progression.json','application/json');
};
document.getElementById('sv-merge').onclick=()=>{
  const v=parseIn();if(!v)return;
  S.progress=Object.assign({},S.progress,v.progress||{});
  S.open=Object.assign({},S.open,v.open||{});
  render();saveState();svOv.classList.remove('on');
};
document.getElementById('sv-replace').onclick=()=>{
  if(!confirm('Remplacer TOUTE ta progression actuelle ?'))return;
  const v=parseIn();if(!v)return;
  S.progress=v.progress||{};S.open=v.open||{};
  render();saveState();svOv.classList.remove('on');
};
document.getElementById('sv-url').onclick=()=>{
  const data=btoa(unescape(encodeURIComponent(JSON.stringify({progress:S.progress,open:S.open}))));
  const url=location.origin+location.pathname+'#d='+data;
  navigator.clipboard.writeText(url);
  flash('sv-url','URL copiée ✓','Copier l\'URL avec données');
};
document.getElementById('sv-html').onclick=()=>{
  const name=document.getElementById('sv-fname').value||'GitHubBaseSolo.html';
  const src=document.documentElement.outerHTML;
  const json=JSON.stringify({progress:S.progress,open:S.open});
  const re=/\/\*__SEED_STATE_START__\*\/[\s\S]*?\/\*__SEED_STATE_END__\*\//;
  const out=src.replace(re,'/*__SEED_STATE_START__*/\nconst SEED_STATE='+json+';\n/*__SEED_STATE_END__*/');
  dlFile('<!DOCTYPE html>\n'+out,name,'text/html');
};
document.getElementById('sv-reset').onclick=()=>{
  if(!confirm('Réinitialiser toute la progression ?'))return;
  if(!confirm('Vraiment sûr ? Cette action est définitive.'))return;
  S.progress={};S.open={};
  try{localStorage.removeItem('app_data_state');}catch(e){}
  theme='hiveos';dayMode=false;applyTheme();
  render();saveState();svOv.classList.remove('on');
};
function parseIn(){
  try{return JSON.parse(document.getElementById('sv-in').value);}
  catch(e){alert('JSON invalide.');return null;}
}
function flash(id,on,off){const b=document.getElementById(id);b.textContent=on;setTimeout(()=>b.textContent=off,1300);}
function dlFile(content,name,type){
  const blob=new Blob([content],{type:type});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

/* =========================================================
   VISITE GUIDEE
   ========================================================= */
const TOUR=[
  {t:"Bienvenue 👋",tx:"Ce guide est ta base GitHub pour le travail solo. Tout le jargon et les commandes, expliqués simplement. Laisse-moi te montrer l'interface en 30 secondes.",sel:null},
  {t:"Le logo HiveOS",tx:"En haut à gauche, ta signature HiveOS. Toujours présente, sur tous tes outils.",sel:"#logo"},
  {t:"Le bloc-notes 📝",tx:"Une fenêtre flottante pour tes notes perso. Déplaçable, redimensionnable. Tes notes restent sur cet appareil, jamais exportées.",sel:"#btn-np"},
  {t:"Les thèmes 🎨",tx:"10 thèmes au choix, chacun avec son ambiance. Clique pour changer l'apparence complète.",sel:"#btn-th"},
  {t:"Jour / Nuit ☀️🌙",tx:"Bascule entre mode sombre et clair, adapté à chaque thème.",sel:"#btn-dn"},
  {t:"La sauvegarde 💾",tx:"Exporte ou importe ta progression, copie une URL de partage, ou télécharge ce guide avec tes données intégrées.",sel:"#btn-sv"},
  {t:"Ta progression",tx:"Marque chaque terme et commande comme « Acquis ». La barre suit ton avancement. C'est ta feuille de route.",sel:"#progwrap"},
  {t:"C'est parti ! 🚀",tx:"Parcours les sections, coche au fur et à mesure, reviens quand tu veux. Tu peux relancer cette visite via le bouton ❓ à tout moment.",sel:null}
];
let tourIdx=0,tourOn=false,_keyH=null,_clkH=null;
document.getElementById('btn-help').onclick=startTour;
function startTour(){tourOn=true;tourIdx=0;document.getElementById('tour-ov').classList.add('on');document.getElementById('tour-win').classList.add('on');
  _keyH=(e)=>{if(e.key==='Escape'){endTour();}else{nextStep();}};
  _clkH=()=>nextStep();
  document.addEventListener('keydown',_keyH);
  document.getElementById('tour-ov').addEventListener('click',_clkH);
  showStep();
}
function showStep(){
  const st=TOUR[tourIdx];
  document.getElementById('tour-step').textContent='Étape '+(tourIdx+1)+' / '+TOUR.length;
  document.getElementById('tour-title').textContent=st.t;
  document.getElementById('tour-text').textContent=st.tx;
  const nb=document.getElementById('tour-nb');
  if(tourIdx===TOUR.length-1){nb.textContent='🚀 C\'est parti !';nb.onclick=endTour;}
  else{nb.textContent='Suivant →';nb.onclick=nextStep;}
  clearHi();
  if(st.sel){
    const el=document.querySelector(st.sel);
    if(el){el.classList.add('tour-hi');el.scrollIntoView({behavior:'smooth',block:'center'});}
  }
}
function nextStep(){if(!tourOn)return;tourIdx++;if(tourIdx>=TOUR.length){endTour();return;}showStep();}
function endTour(){
  tourOn=false;tourIdx=0;
  document.getElementById('tour-ov').classList.remove('on');
  document.getElementById('tour-win').classList.remove('on');
  clearHi();
  if(_keyH)document.removeEventListener('keydown',_keyH);
  if(_clkH)document.getElementById('tour-ov').removeEventListener('click',_clkH);
}
function clearHi(){document.querySelectorAll('.tour-hi').forEach(el=>el.classList.remove('tour-hi'));}

/* =========================================================
   FERMER LES MENUS AU CLIC EXTERIEUR
   ========================================================= */
document.addEventListener('click',e=>{
  if(!e.target.closest('#th-wrap'))document.getElementById('th-menu').classList.remove('on');
});

   INIT
   ========================================================= */
function init(){
  loadState();
  buildThemeMenu();
  applyTheme();
  render();
  try{const n=localStorage.getItem('hiveos_notepad');if(n)npTa.value=n;}catch(e){}
}
init();
</script>
