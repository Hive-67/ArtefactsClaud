<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>IdeaForge — HiveOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@600;700;800&family=Space+Mono:wght@400;700&family=Fredoka+One&family=Press+Start+2P&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   IDEAFORGE — Standard HiveOS
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
:root{--br:16px;--br-sm:10px;--font-body:'Inter',sans-serif;--font-display:'Syne',sans-serif;--font-mono:'Space Mono',monospace}

/* ---------- THÈMES (8) : nuit + .day, halos ::before ---------- */
.t-sncf{--bg:#111;--bg2:#1c1c1c;--bg3:#262626;--bg4:#303030;--brd:rgba(125,32,111,.27);--tx:#f5f5f5;--tx2:#888;--ac:#7d206f;--ac2:#da1d33;--ok:#1e824c;--warn:#e67e22;--danger:#c0392b;--info:#2980b9;--c1:#7d206f;--c2:#b01678;--c3:#c21758;--c4:#da1d33;--c5:#eb1925}
.t-sncf.day{--bg:#f7f5f8;--bg2:#efeaf0;--bg3:#e2dce4;--bg4:#d4cdd8;--brd:rgba(125,32,111,.18);--tx:#1a141c;--tx2:#6a5a70}
.t-sncf::before,.t-sncf.day::before{background:radial-gradient(ellipse at 12% 0%,var(--ac) 0%,transparent 50%),radial-gradient(ellipse at 88% 100%,#da1d33 0%,transparent 50%);opacity:.07}

.t-bleu{--bg:#0a1628;--bg2:#112240;--bg3:#1a3154;--bg4:#234068;--brd:rgba(255,255,255,.06);--tx:#e6f0ff;--tx2:#90b4d9;--ac:#1565c0;--ac2:#42a5f5;--ok:#2e7d32;--warn:#ef6c00;--danger:#c62828;--info:#0288d1;--c1:#1565c0;--c2:#42a5f5;--c3:#2e7d32;--c4:#ef6c00;--c5:#c62828}
.t-bleu.day{--bg:#f4f7fc;--bg2:#e4eaf4;--bg3:#d0dae8;--bg4:#bcc8db;--brd:rgba(0,0,0,.05);--tx:#0a1929;--tx2:#3a5070}
.t-bleu::before,.t-bleu.day::before{background:radial-gradient(ellipse at 15% 5%,var(--ac) 0%,transparent 45%),radial-gradient(ellipse at 85% 95%,var(--ac2) 0%,transparent 45%);opacity:.05}

.t-dracula{--bg:#282a36;--bg2:#21222c;--bg3:#3a3d4f;--bg4:#4a4e63;--brd:rgba(255,255,255,.06);--tx:#f8f8f2;--tx2:#a0a0b0;--ac:#bd93f9;--ac2:#ff79c6;--ok:#50fa7b;--warn:#ffb86c;--danger:#ff5555;--info:#8be9fd;--c1:#bd93f9;--c2:#ff79c6;--c3:#50fa7b;--c4:#ffb86c;--c5:#ff5555;--font-display:'Orbitron',sans-serif}
.t-dracula.day{--bg:#f5f5fa;--bg2:#e8e8f0;--bg3:#d8d8e2;--bg4:#c8c8d4;--brd:rgba(0,0,0,.05);--tx:#1e1e2e;--tx2:#555570}
.t-dracula::before,.t-dracula.day::before{background:radial-gradient(ellipse at 20% 0%,var(--ac) 0%,transparent 40%),radial-gradient(ellipse at 80% 100%,var(--ac2) 0%,transparent 40%);opacity:.07}

.t-windows95{--bg:#008080;--bg2:#c0c0c0;--bg3:#a0a0a0;--bg4:#808080;--brd:rgba(0,0,0,.3);--tx:#000;--tx2:#222;--ac:#000080;--ac2:#808080;--ok:#008000;--warn:#808000;--danger:#800000;--info:#0000ff;--c1:#000080;--c2:#008000;--c3:#808000;--c4:#800000;--c5:#0000ff;--br:0;--br-sm:0;--font-display:'Press Start 2P',cursive;--font-body:'Space Mono',monospace}
.t-windows95.day{--bg:#c0c0c0;--bg2:#d4d4d4;--bg3:#a0a0a0;--bg4:#808080;--brd:rgba(0,0,0,.3);--tx:#000;--tx2:#222}

.t-terminal{--bg:#0c0c0c;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;--brd:rgba(0,255,0,.15);--tx:#00ff00;--tx2:#00aa00;--ac:#00ff00;--ac2:#00cc00;--ok:#00ff00;--warn:#ffff00;--danger:#ff0000;--info:#00ffff;--c1:#00ff00;--c2:#00cc00;--c3:#ffff00;--c4:#ff0000;--c5:#00ffff;--br:0;--br-sm:0;--font-display:'Space Mono',monospace;--font-body:'Space Mono',monospace}
.t-terminal.day{--bg:#e8ffe8;--bg2:#d0f0d0;--bg3:#b8e0b8;--bg4:#a0d0a0;--brd:rgba(0,100,0,.15);--tx:#003300;--tx2:#005500;--ac:#008000;--ac2:#00aa00;--ok:#008000;--warn:#cccc00;--danger:#cc0000;--info:#006699}

.t-picsou{--bg:#2c1f0e;--bg2:#3d2e1a;--bg3:#4e3d26;--bg4:#5f4c32;--brd:rgba(255,255,255,.08);--tx:#ffe0b2;--tx2:#c9a87c;--ac:#f9a825;--ac2:#ff8f00;--ok:#33691e;--warn:#e65100;--danger:#b71c1c;--info:#ff8f00;--c1:#f9a825;--c2:#ff8f00;--c3:#33691e;--c4:#e65100;--c5:#b71c1c;--font-display:'Fredoka One',cursive}
.t-picsou.day{--bg:#fffdf5;--bg2:#fff3d0;--bg3:#ffe9a0;--bg4:#ffd970;--brd:rgba(0,0,0,.06);--tx:#3e2723;--tx2:#6d5040}
.t-picsou::before,.t-picsou.day::before{background:radial-gradient(ellipse at 10% 5%,var(--ac) 0%,transparent 45%),radial-gradient(ellipse at 90% 90%,var(--ac2) 0%,transparent 45%);opacity:.08}

.t-cyberpunk{--bg:#0d0221;--bg2:#150533;--bg3:#200845;--bg4:#2b0b57;--brd:rgba(255,0,193,.15);--tx:#ff00c1;--tx2:#00e5ff;--ac:#ff00c1;--ac2:#00ffff;--ok:#39ff14;--warn:#ffea00;--danger:#ff0000;--info:#00e5ff;--c1:#ff00c1;--c2:#00ffff;--c3:#39ff14;--c4:#ffea00;--c5:#ff0000;--font-display:'Orbitron',sans-serif}
.t-cyberpunk.day{--bg:#fce4ff;--bg2:#f0c8ff;--bg3:#e0b0f0;--bg4:#d098e0;--brd:rgba(255,0,193,.1);--tx:#1a0028;--tx2:#4a0070;--ac:#c00090;--ac2:#0088aa}
.t-cyberpunk::before,.t-cyberpunk.day::before{background:radial-gradient(ellipse at 25% 0%,var(--ac) 0%,transparent 40%),radial-gradient(ellipse at 75% 100%,var(--ac2) 0%,transparent 40%);opacity:.1}

.t-pro-bleu{--bg:#0d1b2a;--bg2:#1b2838;--bg3:#293546;--bg4:#374254;--brd:rgba(255,255,255,.06);--tx:#e8f0fe;--tx2:#90b0d0;--ac:#1a73e8;--ac2:#4a90d9;--ok:#0f9d58;--warn:#f4b400;--danger:#db4437;--info:#4285f4;--c1:#1a73e8;--c2:#4a90d9;--c3:#0f9d58;--c4:#f4b400;--c5:#db4437}
.t-pro-bleu.day{--bg:#eef3fa;--bg2:#d8e4f4;--bg3:#c4d5e8;--bg4:#b0c6dc;--brd:rgba(0,0,0,.05);--tx:#0d1b2a;--tx2:#2e4058}
.t-pro-bleu::before,.t-pro-bleu.day::before{background:radial-gradient(ellipse at 15% 0%,var(--ac) 0%,transparent 45%),radial-gradient(ellipse at 85% 100%,var(--ac2) 0%,transparent 45%);opacity:.05}

/* ---------- BASE ---------- */
html,body{height:100%}
body{background:var(--bg);color:var(--tx);font-family:var(--font-body);line-height:1.5;transition:background .3s,color .3s;-webkit-tap-highlight-color:transparent}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none}
#root{position:relative;z-index:1}
::selection{background:var(--ac);color:#fff}
h1,h2,h3{font-family:var(--font-display);line-height:1.15}
strong{color:var(--ac)}
code{font-family:var(--font-mono);background:var(--bg3);padding:1px 6px;border-radius:5px;font-size:.85em}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:var(--ac)}

/* ---------- HEADER (VISIBLE / sticky) ---------- */
.appbar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--brd);backdrop-filter:blur(10px);
  transition:transform .3s ease}
.appbar.hidden{transform:translateY(-105%)}
.t-sncf .appbar{background:linear-gradient(90deg,#7d206f,#b01678,#c21758,#da1d33,#eb1925);border-bottom:none}
.t-pro-bleu .appbar{background:linear-gradient(90deg,var(--bg2),var(--bg3))}
.brand{display:flex;flex-direction:column;line-height:1}
.logo{font-family:var(--font-display);font-weight:800;font-size:22px;background:linear-gradient(90deg,var(--ac),var(--ac2));-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:.5px}
.t-sncf .appbar .logo{background:none;-webkit-text-fill-color:#fff;color:#fff}
.subtitle{font-family:var(--font-mono);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--tx2);margin-top:3px}
.t-sncf .appbar .subtitle{color:rgba(255,255,255,.65)}
.sysbtns{display:flex;align-items:center;gap:2px}
.sysbtn{font-size:18px;line-height:1;background:transparent;border:none;cursor:pointer;color:var(--tx);
  padding:8px;border-radius:var(--br-sm);transition:background .15s,transform .1s;position:relative}
.sysbtn:hover{background:rgba(125,125,125,.18)}
.sysbtn:active{transform:scale(.9)}
.sysbtn.on{background:rgba(125,125,125,.28)}
.t-sncf .appbar .sysbtn{color:#fff}
.t-sncf .appbar .sysbtn:hover{background:rgba(255,255,255,.18)}

/* ---------- THEME MENU (custom) ---------- */
.theme-wrap{position:relative}
.theme-menu{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg2);border:1px solid var(--brd);
  border-radius:var(--br-sm);padding:6px;min-width:180px;box-shadow:0 12px 40px rgba(0,0,0,.45);z-index:60;animation:pop .12s ease}
.theme-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border:none;background:transparent;
  color:var(--tx);cursor:pointer;border-radius:8px;font-family:var(--font-body);font-size:14px;text-align:left}
.theme-item:hover{background:var(--bg3)}
.theme-item.active{background:var(--ac);color:#fff}
.theme-item .em{font-size:17px}
@keyframes pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

/* ---------- TOOLBAR ---------- */
.wrap{max-width:1180px;margin:0 auto;padding:84px 18px 80px}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:22px}
.seg{display:inline-flex;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--br-sm);padding:3px;gap:2px}
.seg button{border:none;background:transparent;color:var(--tx2);cursor:pointer;padding:7px 14px;border-radius:calc(var(--br-sm) - 2px);
  font-family:var(--font-body);font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px;transition:.15s}
.seg button.active{background:var(--ac);color:#fff}
.btn{border:1px solid var(--brd);background:var(--bg2);color:var(--tx);cursor:pointer;padding:9px 15px;border-radius:var(--br-sm);
  font-family:var(--font-body);font-weight:600;font-size:14px;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--ac)}
.btn:active{transform:scale(.97)}
.btn.accent{background:var(--ac);color:#fff;border-color:var(--ac)}
.btn.accent:hover{filter:brightness(1.1)}
.btn.ghost{background:transparent}
.btn.danger{border-color:var(--danger);color:var(--danger)}
.btn.danger:hover{background:var(--danger);color:#fff}
.spacer{flex:1 1 auto}
.field{flex:1 1 180px;min-width:140px;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--brd);
  border-radius:var(--br-sm);padding:0 12px}
.field input{flex:1;border:none;background:transparent;color:var(--tx);font-family:var(--font-body);font-size:14px;padding:10px 0;outline:none}
.sel{background:var(--bg2);border:1px solid var(--brd);color:var(--tx);font-family:var(--font-body);font-size:13px;
  padding:9px 12px;border-radius:var(--br-sm);cursor:pointer;font-weight:600}

/* ---------- TAG FILTER ---------- */
.tagbar{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
.tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 11px;border-radius:999px;
  border:1px solid transparent;cursor:pointer;font-family:var(--font-body);transition:.12s;color:#fff;line-height:1.6}
.tag .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.85)}
.tag.off{background:var(--bg3)!important;color:var(--tx2);border-color:var(--brd)}
.tag.off .dot{opacity:.6}

/* ---------- CARDS GRID ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--br);padding:18px;cursor:pointer;
  transition:transform .15s,border-color .15s,box-shadow .15s;position:relative;overflow:hidden;animation:fadeUp .35s ease both}
.card:hover{transform:translateY(-3px);border-color:var(--ac);box-shadow:0 10px 30px rgba(0,0,0,.25)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px}
.card-title{font-family:var(--font-display);font-weight:700;font-size:16px;display:flex;gap:7px;align-items:center}
.card-title .st{font-size:15px}
.card-desc{color:var(--tx2);font-size:13px;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.stars{display:flex;gap:2px;margin-bottom:12px;font-size:15px}
.star{cursor:pointer;color:var(--bg4);transition:.1s}
.star.on{color:var(--ac2)}
.score{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;width:54px;height:54px;
  border-radius:50%;font-family:var(--font-mono);font-weight:700;border:3px solid;line-height:1}
.score b{font-size:18px}
.score span{font-size:8px;letter-spacing:.5px;opacity:.8;text-transform:uppercase;margin-top:1px}
.gauges{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.grow{display:flex;align-items:center;gap:9px}
.glabel{font-size:10px;font-family:var(--font-mono);width:74px;color:var(--tx2);text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
.gtrack{flex:1;height:6px;background:var(--bg3);border-radius:4px;overflow:hidden}
.gfill{height:100%;border-radius:4px;transition:width .4s ease}
.gval{font-size:10px;font-family:var(--font-mono);width:30px;text-align:right;color:var(--tx2)}
.prog{margin-bottom:12px}
.prog-top{display:flex;justify-content:space-between;font-size:11px;font-family:var(--font-mono);color:var(--tx2);margin-bottom:5px}
.prog-track{height:8px;background:var(--bg3);border-radius:5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:5px;transition:width .4s ease}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.minitag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;color:#fff;font-family:var(--font-body)}
.card-foot{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--tx2);font-family:var(--font-mono);border-top:1px solid var(--brd);padding-top:10px}
.move-btns{display:flex;gap:5px}
.move-btns button{border:1px solid var(--brd);background:var(--bg3);color:var(--tx);border-radius:6px;cursor:pointer;
  font-size:11px;padding:3px 8px;font-family:var(--font-mono);transition:.12s}
.move-btns button:hover{border-color:var(--ac);color:var(--ac)}
.move-btns button:disabled{opacity:.3;cursor:not-allowed}

/* ---------- KANBAN ---------- */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
.kcol{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--br);padding:12px;min-height:120px;transition:.15s}
.kcol.over{border-color:var(--ac);background:var(--bg3)}
.kcol-head{display:flex;align-items:center;justify-content:space-between;font-family:var(--font-display);font-weight:700;
  font-size:14px;padding:4px 6px 12px;border-bottom:1px solid var(--brd);margin-bottom:12px}
.kcol-head .cnt{font-family:var(--font-mono);font-size:11px;background:var(--bg3);color:var(--tx2);padding:2px 8px;border-radius:999px}
.kcol .card{margin-bottom:12px;cursor:grab}
.kcol .card:last-child{margin-bottom:0}
.kcol .card:active{cursor:grabbing}
.kempty{color:var(--tx2);font-size:12px;text-align:center;padding:24px 0;font-family:var(--font-mono);opacity:.6}

/* ---------- EMPTY STATE ---------- */
.empty{text-align:center;padding:70px 20px;color:var(--tx2)}
.empty .em{font-size:54px;margin-bottom:14px}
.empty h2{font-size:22px;color:var(--tx);margin-bottom:8px}
.empty p{font-size:14px;max-width:420px;margin:0 auto 22px}

/* ---------- MODALS ---------- */
.overlay{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);display:flex;
  align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;animation:fade .15s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--br);width:100%;max-width:600px;
  padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.5);animation:popUp .2s ease}
.modal.wide{max-width:760px}
@keyframes popUp{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-head h2{font-size:20px;display:flex;align-items:center;gap:9px}
.x{background:transparent;border:none;color:var(--tx2);font-size:24px;cursor:pointer;line-height:1;padding:2px 6px;border-radius:8px}
.x:hover{background:var(--bg3);color:var(--tx)}
.section{border:1px solid var(--brd);border-radius:var(--br-sm);padding:15px;margin-bottom:14px;background:var(--bg)}
.section h3{font-size:13px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px;color:var(--tx2);margin-bottom:11px;font-weight:700}
textarea{width:100%;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--br-sm);color:var(--tx);
  font-family:var(--font-mono);font-size:12px;padding:10px;resize:vertical;outline:none;line-height:1.5}
textarea:focus{border-color:var(--ac)}
.inp{width:100%;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--br-sm);color:var(--tx);
  font-family:var(--font-body);font-size:14px;padding:10px 12px;outline:none}
.inp:focus{border-color:var(--ac)}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.row .btn{flex:1 1 auto}
.hint{font-size:11px;color:var(--tx2);margin-top:8px;font-family:var(--font-mono)}

/* ---------- EDITOR ---------- */
.ed-grid{display:grid;grid-template-columns:1fr;gap:16px}
.ed-label{font-size:11px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.8px;color:var(--tx2);margin-bottom:6px;display:block}
.status-pills{display:flex;gap:8px;flex-wrap:wrap}
.status-pills button{flex:1;border:1px solid var(--brd);background:var(--bg2);color:var(--tx2);cursor:pointer;
  padding:9px;border-radius:var(--br-sm);font-family:var(--font-body);font-weight:600;font-size:13px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.status-pills button.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.slider-row{margin-bottom:12px}
.slider-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.slider-top .v{font-family:var(--font-mono);font-weight:700}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:7px;border-radius:5px;background:var(--bg3);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--ac);border:2px solid var(--bg2);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.3)}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--ac);border:2px solid var(--bg2);cursor:pointer}
.tag-pick{display:flex;flex-wrap:wrap;gap:7px}
.tag-pick .tag{position:relative}
.tag-pick .tag .rm{margin-left:2px;opacity:.7;font-weight:700}
.task-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.task{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--br-sm);padding:8px 11px}
.task .cb{width:19px;height:19px;border-radius:5px;border:2px solid var(--tx2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;transition:.12s}
.task .cb.done{background:var(--ok);border-color:var(--ok)}
.task .tx{flex:1;font-size:14px}
.task .tx.done{text-decoration:line-through;color:var(--tx2)}
.task .del{background:transparent;border:none;color:var(--tx2);cursor:pointer;font-size:16px;padding:0 4px;border-radius:5px}
.task .del:hover{color:var(--danger)}
.score-big{display:flex;align-items:center;gap:16px;background:var(--bg);border:1px solid var(--brd);border-radius:var(--br-sm);padding:14px}
.score-big .num{font-family:var(--font-mono);font-weight:700;font-size:34px;line-height:1}
.score-big .lbl{font-size:11px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px;color:var(--tx2)}
.score-big .desc{font-size:12px;color:var(--tx2);margin-top:3px}

/* ---------- NOTEPAD (flottant, déplaçable, redimensionnable) ---------- */
.notepad{position:fixed;z-index:80;background:var(--bg2);border:1px solid var(--ac);border-radius:var(--br-sm);
  box-shadow:0 18px 50px rgba(0,0,0,.5);display:flex;flex-direction:column;min-width:240px;min-height:200px;
  resize:both;overflow:hidden;animation:popUp .18s ease}
.np-bar{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--ac);color:#fff;
  cursor:move;user-select:none;font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.5px;flex-shrink:0}
.np-bar .hide{background:rgba(255,255,255,.2);border:none;color:#fff;cursor:pointer;border-radius:6px;padding:2px 8px;font-size:11px}
.notepad textarea{flex:1;border:none;border-radius:0;resize:none;background:var(--bg2);font-size:13px}
.np-foot{padding:8px 10px;border-top:1px solid var(--brd);flex-shrink:0}
.np-foot .btn{width:100%;padding:7px}

/* ---------- TOAST ---------- */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;background:var(--bg3);
  border:1px solid var(--ac);color:var(--tx);padding:12px 22px;border-radius:999px;font-size:14px;font-weight:600;
  box-shadow:0 8px 30px rgba(0,0,0,.4);animation:toastIn .25s ease}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}

/* Windows 95 : boutons 3D rétro */
.t-windows95 .btn,.t-windows95 .sel,.t-windows95 .seg,.t-windows95 .move-btns button{border:2px solid;border-color:#fff #404040 #404040 #fff;border-radius:0}
.t-windows95 .card,.t-windows95 .modal,.t-windows95 .kcol,.t-windows95 .notepad{border:2px solid;border-color:#fff #404040 #404040 #fff}

@media(max-width:760px){
  .wrap{padding:78px 12px 70px}
  .kanban{grid-template-columns:1fr}
  .modal{padding:18px}
  .field{flex-basis:100%}
}

<script type="text/babel">
const { useState, useRef, useEffect, useMemo } = React;

/* ============================================================
   DONNÉES INITIALES (source unique de vérité)
   ============================================================ */
/*__SEED_START__*/
const SEED = {
  tags: [
    { id: 't_yt',   name: 'YouTube', color: 'var(--c1)' },
    { id: 't_web',  name: 'Web',     color: 'var(--c2)' },
    { id: 't_perso',name: 'Perso',   color: 'var(--c3)' },
    { id: 't_sncf', name: 'SNCF',    color: 'var(--c4)' }
  ],
  ideas: [
    { id: 'i1', title: 'Chaîne YouTube Tech / IA', desc: 'Vulgarisation IA & outils dev. Objectif : 1 vidéo par semaine.',
      status: 'doing', stars: 4, gauges: { impact: 85, faisabilite: 70, difficulte: 60, cout: 55 }, tags: ['t_yt','t_web'],
      tasks: [{id:'a',text:'Définir la ligne éditoriale',done:true},{id:'b',text:'Setup DaVinci Resolve',done:true},{id:'c',text:'Tourner le pilote',done:false},{id:'d',text:'Template de miniatures',done:false}],
      createdAt: Date.now()-432000000, updatedAt: Date.now()-172800000 },
    { id: 'i2', title: 'Forge PWA v2 (offline)', desc: 'Version installable : service worker, manifest, sync localStorage hors-ligne.',
      status: 'explore', stars: 5, gauges: { impact: 75, faisabilite: 80, difficulte: 45, cout: 30 }, tags: ['t_web','t_perso'],
      tasks: [{id:'a',text:'Service worker',done:false},{id:'b',text:'Manifest + prompt install',done:false},{id:'c',text:'Sync hors-ligne',done:false}],
      createdAt: Date.now()-259200000, updatedAt: Date.now()-86400000 },
    { id: 'i3', title: 'd3mandhub.com', desc: 'Plateforme au concept encore flou. À cadrer avant tout.',
      status: 'explore', stars: 3, gauges: { impact: 65, faisabilite: 50, difficulte: 70, cout: 60 }, tags: ['t_web'],
      tasks: [{id:'a',text:'Définir le concept',done:false},{id:'b',text:'Réserver le domaine',done:true}],
      createdAt: Date.now()-864000000, updatedAt: Date.now()-345600000 }
  ]
};
/*__SEED_END__*/

/* ============================================================
   CONSTANTES
   ============================================================ */
const THEMES = [
  { id:'sncf', name:'SNCF', em:'🚆' }, { id:'bleu', name:'Bleu', em:'🌊' },
  { id:'dracula', name:'Dracula', em:'🧛' }, { id:'windows95', name:'Windows 95', em:'🪟' },
  { id:'terminal', name:'Terminal', em:'🖥️' }, { id:'picsou', name:'Picsou', em:'🤑' },
  { id:'cyberpunk', name:'Cyberpunk', em:'🌃' }, { id:'pro-bleu', name:'Pro Bleu', em:'💼' }
];
const STATUSES = [
  { id:'explore', name:'À explorer', em:'💡' },
  { id:'doing',   name:'En cours',   em:'🔧' },
  { id:'done',    name:'Terminé',    em:'✅' }
];
const GAUGE_DEFS = [
  { key:'impact',      name:'Impact',     color:'var(--ok)',   positive:true },
  { key:'faisabilite', name:'Faisabilité',color:'var(--info)', positive:true },
  { key:'difficulte',  name:'Difficulté', color:'var(--warn)', positive:false },
  { key:'cout',        name:'Coût/Temps', color:'var(--danger)',positive:false }
];
const TAG_COLORS = ['var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)','var(--ac2)'];
const SORTS = [
  { id:'score', name:'Score auto ↓' }, { id:'stars', name:'Note étoiles ↓' },
  { id:'prog',  name:'Progression ↓' }, { id:'recent', name:'Récent' }, { id:'title', name:'A → Z' }
];

/* ============================================================
   HELPERS
   ============================================================ */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const b64encode = s => btoa(String.fromCharCode(...new TextEncoder().encode(s)));
const b64decode = b => new TextDecoder().decode(Uint8Array.from(atob(b), c => c.charCodeAt(0)));
const calcScore = g => Math.round((g.impact + g.faisabilite + (100 - g.difficulte) + (100 - g.cout)) / 4);
const calcProg  = t => t.length ? Math.round(t.filter(x => x.done).length / t.length * 100) : 0;
const scoreColor = s => s >= 70 ? 'var(--ok)' : s >= 40 ? 'var(--warn)' : 'var(--danger)';
const scoreLabel = s => s >= 70 ? 'À lancer' : s >= 40 ? 'À étudier' : 'Risqué';

function copyText(t){
  if (navigator.clipboard && window.isSecureContext) return navigator.clipboard.writeText(t);
  return new Promise((res, rej) => {
    try {
      const ta = document.createElement('textarea');
      ta.value = t; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta); res();
    } catch (e) { rej(e); }
  });
}
function download(filename, text, type){
  const blob = new Blob([text], { type: type || 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}
// Normalise toute donnée chargée/importée vers le schéma attendu
function normalize(raw){
  const d = (raw && typeof raw === 'object') ? raw : {};
  const tags = Array.isArray(d.tags) ? d.tags.map(t => ({
    id: t.id || uid(), name: String(t.name || 'tag'), color: t.color || TAG_COLORS[0]
  })) : [];
  const ideas = Array.isArray(d.ideas) ? d.ideas.map(i => ({
    id: i.id || uid(),
    title: String(i.title || 'Sans titre'),
    desc: String(i.desc || ''),
    status: STATUSES.some(s => s.id === i.status) ? i.status : 'explore',
    stars: Math.max(0, Math.min(5, Number(i.stars) || 0)),
    gauges: {
      impact: clamp(i.gauges && i.gauges.impact, 50),
      faisabilite: clamp(i.gauges && i.gauges.faisabilite, 50),
      difficulte: clamp(i.gauges && i.gauges.difficulte, 50),
      cout: clamp(i.gauges && i.gauges.cout, 50)
    },
    tags: Array.isArray(i.tags) ? i.tags : [],
    tasks: Array.isArray(i.tasks) ? i.tasks.map(t => ({ id: t.id || uid(), text: String(t.text || ''), done: !!t.done })) : [],
    createdAt: Number(i.createdAt) || Date.now(),
    updatedAt: Number(i.updatedAt) || Date.now()
  })) : [];
  return { tags, ideas };
}
const clamp = (v, def) => { const n = Number(v); return isNaN(n) ? def : Math.max(0, Math.min(100, Math.round(n))); };
const fmtDate = ts => new Date(ts).toLocaleDateString('fr-FR', { day:'2-digit', month:'short' });

/* ============================================================
   COMPOSANTS UI
   ============================================================ */
function Stars({ value, onChange, size }){
  return (
    <div className="stars" style={size ? { fontSize: size } : null}>
      {[1,2,3,4,5].map(n => (
        <span key={n} className={'star' + (n <= value ? ' on' : '')}
          onClick={e => { e.stopPropagation(); onChange(n === value ? 0 : n); }}>★</span>
      ))}
    </div>
  );
}

function MiniGauge({ def, value }){
  return (
    <div className="grow">
      <span className="glabel">{def.name}</span>
      <div className="gtrack"><div className="gfill" style={{ width: value + '%', background: def.color }} /></div>
      <span className="gval">{value}</span>
    </div>
  );
}

function IdeaCard({ idea, tags, onOpen, kanban, onMove, style }){
  const score = calcScore(idea.gauges);
  const prog = calcProg(idea.tasks);
  const st = STATUSES.find(s => s.id === idea.status);
  const idx = STATUSES.findIndex(s => s.id === idea.status);
  const myTags = idea.tags.map(id => tags.find(t => t.id === id)).filter(Boolean);
  const done = idea.tasks.filter(t => t.done).length;
  return (
    <div className="card" style={style} onClick={() => onOpen(idea.id)}
      draggable={kanban}
      onDragStart={kanban ? e => e.dataTransfer.setData('text/plain', idea.id) : undefined}>
      <div className="card-head">
        <div className="card-title"><span className="st">{st.em}</span>{idea.title}</div>
        <div className="score" style={{ color: scoreColor(score), borderColor: scoreColor(score) }}>
          <b>{score}</b><span>score</span>
        </div>
      </div>
      {idea.desc && <div className="card-desc">{idea.desc}</div>}
      <Stars value={idea.stars} onChange={() => onOpen(idea.id)} />
      <div className="gauges">
        {GAUGE_DEFS.map(d => <MiniGauge key={d.key} def={d} value={idea.gauges[d.key]} />)}
      </div>
      <div className="prog">
        <div className="prog-top"><span>Progression</span><span>{prog}%</span></div>
        <div className="prog-track"><div className="prog-fill" style={{ width: prog + '%' }} /></div>
      </div>
      {myTags.length > 0 && (
        <div className="card-tags">
          {myTags.map(t => <span key={t.id} className="minitag" style={{ background: t.color }}>{t.name}</span>)}
        </div>
      )}
      <div className="card-foot">
        <span>✓ {done}/{idea.tasks.length} · {fmtDate(idea.updatedAt)}</span>
        {kanban && (
          <div className="move-btns" onClick={e => e.stopPropagation()}>
            <button disabled={idx === 0} onClick={() => onMove(idea.id, STATUSES[idx-1].id)}>◀</button>
            <button disabled={idx === STATUSES.length-1} onClick={() => onMove(idea.id, STATUSES[idx+1].id)}>▶</button>
          </div>
        )}
      </div>
    </div>
  );
}

function KanbanColumn({ status, ideas, tags, onOpen, onMove }){
  const [over, setOver] = useState(false);
  return (
    <div className={'kcol' + (over ? ' over' : '')}
      onDragOver={e => { e.preventDefault(); setOver(true); }}
      onDragLeave={() => setOver(false)}
      onDrop={e => { e.preventDefault(); setOver(false); const id = e.dataTransfer.getData('text/plain'); if (id) onMove(id, status.id); }}>
      <div className="kcol-head"><span>{status.em} {status.name}</span><span className="cnt">{ideas.length}</span></div>
      {ideas.length === 0 && <div className="kempty">Glisse une idée ici</div>}
      {ideas.map(i => <IdeaCard key={i.id} idea={i} tags={tags} onOpen={onOpen} kanban onMove={onMove} />)}
    </div>
  );
}

/* ---------- ÉDITEUR D'IDÉE ---------- */
function IdeaEditor({ idea, tags, onClose, onPatch, onDelete, onCreateTag }){
  const [taskText, setTaskText] = useState('');
  const [newTag, setNewTag] = useState('');
  const [confirmDel, setConfirmDel] = useState(false);

  const score = calcScore(idea.gauges);
  const prog = calcProg(idea.tasks);
  const myTagIds = idea.tags;

  const toggleTag = id => {
    const has = myTagIds.includes(id);
    onPatch({ tags: has ? myTagIds.filter(t => t !== id) : [...myTagIds, id] });
  };
  const addTask = () => {
    if (!taskText.trim()) return;
    onPatch({ tasks: [...idea.tasks, { id: uid(), text: taskText.trim(), done: false }] });
    setTaskText('');
  };
  const toggleTask = id => onPatch({ tasks: idea.tasks.map(t => t.id === id ? { ...t, done: !t.done } : t) });
  const delTask = id => onPatch({ tasks: idea.tasks.filter(t => t.id !== id) });
  const setG = (k, v) => onPatch({ gauges: { ...idea.gauges, [k]: Number(v) } });
  const createTag = () => {
    if (!newTag.trim()) return;
    const t = onCreateTag(newTag.trim());
    if (t) onPatch({ tags: [...myTagIds, t.id] });
    setNewTag('');
  };

  return (
    <div className="overlay" onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal wide" onMouseDown={e => e.stopPropagation()}>
        <div className="modal-head">
          <h2>📝 Éditer l'idée</h2>
          <button className="x" onClick={onClose}>×</button>
        </div>

        <div className="ed-grid">
          <div>
            <label className="ed-label">Titre</label>
            <input className="inp" value={idea.title} onChange={e => onPatch({ title: e.target.value })} placeholder="Nom de l'idée" />
          </div>
          <div>
            <label className="ed-label">Description</label>
            <textarea rows="2" style={{ fontFamily: 'var(--font-body)', fontSize: '14px' }}
              value={idea.desc} onChange={e => onPatch({ desc: e.target.value })} placeholder="En quelques mots…" />
          </div>

          <div>
            <label className="ed-label">Statut</label>
            <div className="status-pills">
              {STATUSES.map(s => (
                <button key={s.id} className={idea.status === s.id ? 'active' : ''} onClick={() => onPatch({ status: s.id })}>
                  {s.em} {s.name}
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="ed-label">Note (coup de cœur)</label>
            <Stars value={idea.stars} onChange={v => onPatch({ stars: v })} size="26px" />
          </div>

          {/* Score auto */}
          <div className="score-big">
            <div className="num" style={{ color: scoreColor(score) }}>{score}</div>
            <div>
              <div className="lbl">Score d'opportunité</div>
              <div className="desc">{scoreLabel(score)} — calculé : Impact + Faisabilité − Difficulté − Coût</div>
            </div>
          </div>

          {/* Jauges */}
          <div>
            <label className="ed-label">Jauges</label>
            {GAUGE_DEFS.map(d => (
              <div className="slider-row" key={d.key}>
                <div className="slider-top">
                  <span>{d.name}</span>
                  <span className="v" style={{ color: d.color }}>{idea.gauges[d.key]}</span>
                </div>
                <input type="range" min="0" max="100" value={idea.gauges[d.key]}
                  style={{ accentColor: d.color }}
                  onChange={e => setG(d.key, e.target.value)} />
              </div>
            ))}
          </div>

          {/* Progression auto */}
          <div>
            <label className="ed-label">Progression (auto — tâches validées)</label>
            <div className="prog-track" style={{ height: '10px' }}>
              <div className="prog-fill" style={{ width: prog + '%' }} />
            </div>
            <div className="hint">{idea.tasks.filter(t => t.done).length}/{idea.tasks.length} tâches · {prog}%</div>
          </div>

          {/* Libellés */}
          <div>
            <label className="ed-label">Libellés</label>
            <div className="tag-pick">
              {tags.map(t => {
                const on = myTagIds.includes(t.id);
                return (
                  <span key={t.id} className={'tag' + (on ? '' : ' off')}
                    style={on ? { background: t.color } : null} onClick={() => toggleTag(t.id)}>
                    <span className="dot" />{t.name}
                  </span>
                );
              })}
            </div>
            <div className="row">
              <input className="inp" style={{ flex: '1 1 auto' }} value={newTag}
                onChange={e => setNewTag(e.target.value)} onKeyDown={e => e.key === 'Enter' && createTag()}
                placeholder="Nouveau libellé…" />
              <button className="btn" onClick={createTag}>+ Créer</button>
            </div>
          </div>

          {/* Tâches / étapes */}
          <div>
            <label className="ed-label">Étapes / Tâches</label>
            <div className="task-list">
              {idea.tasks.map(t => (
                <div className="task" key={t.id}>
                  <div className={'cb' + (t.done ? ' done' : '')} onClick={() => toggleTask(t.id)}>{t.done ? '✓' : ''}</div>
                  <span className={'tx' + (t.done ? ' done' : '')}>{t.text}</span>
                  <button className="del" onClick={() => delTask(t.id)}>×</button>
                </div>
              ))}
              {idea.tasks.length === 0 && <div className="hint">Aucune étape pour l'instant.</div>}
            </div>
            <div className="row">
              <input className="inp" style={{ flex: '1 1 auto' }} value={taskText}
                onChange={e => setTaskText(e.target.value)} onKeyDown={e => e.key === 'Enter' && addTask()}
                placeholder="Ajouter une étape…" />
              <button className="btn accent" onClick={addTask}>+ Ajouter</button>
            </div>
          </div>

          {/* Suppression */}
          <div className="row" style={{ marginTop: '4px' }}>
            {!confirmDel
              ? <button className="btn danger" onClick={() => setConfirmDel(true)}>🗑️ Supprimer l'idée</button>
              : <>
                  <button className="btn danger" onClick={() => { onDelete(idea.id); onClose(); }}>Confirmer la suppression</button>
                  <button className="btn ghost" onClick={() => setConfirmDel(false)}>Annuler</button>
                </>
            }
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- THEME MENU ---------- */
function ThemeMenu({ theme, setTheme }){
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [open]);
  return (
    <div className="theme-wrap" ref={ref}>
      <button className={'sysbtn' + (open ? ' on' : '')} title="Thème" onClick={() => setOpen(o => !o)}>🎨</button>
      {open && (
        <div className="theme-menu">
          {THEMES.map(t => (
            <button key={t.id} className={'theme-item' + (theme === t.id ? ' active' : '')}
              onClick={() => { setTheme(t.id); setOpen(false); }}>
              <span className="em">{t.em}</span>{t.name}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---------- NOTEPAD (flottant) ---------- */
function Notepad({ note, setNote, onToast, onClose }){
  const [pos, setPos] = useState({ x: Math.max(8, window.innerWidth - 320), y: 70 });
  const drag = useRef(null);
  useEffect(() => {
    const move = e => {
      if (!drag.current) return;
      setPos({ x: e.clientX - drag.current.dx, y: e.clientY - drag.current.dy });
    };
    const up = () => { drag.current = null; };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
    return () => { document.removeEventListener('pointermove', move); document.removeEventListener('pointerup', up); };
  }, []);
  const start = e => { drag.current = { dx: e.clientX - pos.x, dy: e.clientY - pos.y }; };
  return (
    <div className="notepad" style={{ left: Math.max(4, pos.x) + 'px', top: Math.max(4, pos.y) + 'px', width: '300px', height: '320px' }}>
      <div className="np-bar" onPointerDown={start} style={{ touchAction: 'none' }}>
        <span>📝 BLOC-NOTES</span>
        <button className="hide" onClick={onClose}>masquer</button>
      </div>
      <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="Notes volantes…" />
      <div className="np-foot">
        <button className="btn" onClick={() => copyText(note).then(() => onToast('Bloc-notes copié ✓'))}>📋 Copier</button>
      </div>
    </div>
  );
}

/* ---------- SAVE MODAL ---------- */
function SaveModal({ data, onClose, onToast, onMerge, onReplace, onCopyUrl, onDownloadApp, onReset }){
  const json = useMemo(() => JSON.stringify(data, null, 2), [data]);
  const [restore, setRestore] = useState('');
  const [filename, setFilename] = useState('IdeaForge.html');
  const [confirmReplace, setConfirmReplace] = useState(false);
  const [resetStep, setResetStep] = useState(0);

  const doRestore = (mode) => {
    let parsed;
    try { parsed = JSON.parse(restore); }
    catch (e) { onToast('JSON invalide ✗'); return; }
    if (mode === 'merge') { onMerge(parsed); onToast('Données fusionnées ✓'); onClose(); }
    else { onReplace(parsed); onToast('Données remplacées ✓'); onClose(); }
  };

  return (
    <div className="overlay" onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" onMouseDown={e => e.stopPropagation()}>
        <div className="modal-head"><h2>💾 Sauvegarde</h2><button className="x" onClick={onClose}>×</button></div>

        <div className="section">
          <h3>📤 Sauvegarde</h3>
          <textarea rows="6" readOnly value={json} />
          <div className="row">
            <button className="btn" onClick={() => copyText(json).then(() => onToast('JSON copié ✓'))}>📋 Copier le JSON</button>
            <button className="btn" onClick={() => { download('IdeaForge-data.json', json, 'application/json'); onToast('Fichier .json téléchargé ✓'); }}>⬇️ Télécharger .json</button>
          </div>
        </div>

        <div className="section">
          <h3>📥 Restauration</h3>
          <textarea rows="4" value={restore} onChange={e => setRestore(e.target.value)} placeholder="Colle un JSON ici…" />
          <div className="row">
            <button className="btn" onClick={() => doRestore('merge')}>✚ Valider · Fusionner</button>
            {!confirmReplace
              ? <button className="btn danger" onClick={() => setConfirmReplace(true)}>♻️ Valider · Remplacer tout</button>
              : <button className="btn danger" onClick={() => doRestore('replace')}>Confirmer le remplacement</button>}
          </div>
        </div>

        <div className="section">
          <h3>🔗 Copier l'URL</h3>
          <button className="btn" style={{ width: '100%' }} onClick={() => { onCopyUrl(); onToast('URL copiée ✓'); }}>🔗 Encoder les données dans l'URL</button>
          <div className="hint">Pratique pour transférer l'état entre appareils.</div>
        </div>

        <div className="section">
          <h3>📦 Télécharger l'application</h3>
          <input className="inp" value={filename} onChange={e => setFilename(e.target.value)} />
          <div className="row">
            <button className="btn accent" style={{ width: '100%' }}
              onClick={() => { onDownloadApp(filename.endsWith('.html') ? filename : filename + '.html'); onToast('Application téléchargée ✓'); }}>
              ⬇️ Télécharger .html (autonome)
            </button>
          </div>
          <div className="hint">Injecte tes données actuelles dans le fichier et le télécharge prêt à l'emploi.</div>
        </div>

        <div className="section">
          <h3>♻️ Remise à zéro</h3>
          {resetStep === 0 && <button className="btn danger" style={{ width: '100%' }} onClick={() => setResetStep(1)}>♻️ Tout réinitialiser</button>}
          {resetStep === 1 && <button className="btn danger" style={{ width: '100%' }} onClick={() => setResetStep(2)}>Es-tu sûr ? (1/2)</button>}
          {resetStep === 2 && <button className="btn danger" style={{ width: '100%' }} onClick={() => { onReset(); onClose(); }}>Confirmer définitivement (2/2)</button>}
          <div className="hint">Efface toutes les idées et libellés. Le bloc-notes est conservé.</div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App(){
  // --- États (groupés) ---
  const [ready, setReady] = useState(false);
  const [data, setData] = useState({ ideas: [], tags: [] });
  const [theme, setTheme] = useState('sncf');
  const [day, setDay] = useState(true);
  const [view, setView] = useState('cards');
  const [note, setNote] = useState('');
  const [npOpen, setNpOpen] = useState(false);
  const [saveOpen, setSaveOpen] = useState(false);
  const [selId, setSelId] = useState(null);
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('score');
  const [activeTags, setActiveTags] = useState([]);
  const [hideBar, setHideBar] = useState(false);
  const [toast, setToast] = useState('');
  const lastScroll = useRef(0);
  const toastTimer = useRef(null);

  // --- Effets ---
  // Chargement initial : hash > localStorage > SEED
  useEffect(() => {
    let loaded = null, fromHash = false;
    if (location.hash.startsWith('#d=')) {
      try { loaded = JSON.parse(b64decode(location.hash.slice(3))); fromHash = true; } catch (e) {}
    }
    if (!loaded) { try { const ls = localStorage.getItem('app_data_state'); if (ls) loaded = JSON.parse(ls); } catch (e) {} }
    setData(normalize(loaded || SEED));
    if (fromHash) history.replaceState(null, '', location.pathname + location.search);
    const t = localStorage.getItem('app-theme'); if (t && THEMES.some(x => x.id === t)) setTheme(t);
    const dm = localStorage.getItem('app-day-mode'); if (dm !== null) setDay(dm === 'true');
    const v = localStorage.getItem('app-view'); if (v === 'cards' || v === 'kanban') setView(v);
    setNote(localStorage.getItem('hiveos_notepad') || '');
    setReady(true);
  }, []);

  // Persistance
  useEffect(() => { if (ready) try { localStorage.setItem('app_data_state', JSON.stringify(data)); } catch (e) {} }, [data, ready]);
  useEffect(() => { document.body.className = 't-' + theme + (day ? ' day' : ''); if (ready) { localStorage.setItem('app-theme', theme); localStorage.setItem('app-day-mode', String(day)); } }, [theme, day, ready]);
  useEffect(() => { if (ready) localStorage.setItem('app-view', view); }, [view, ready]);
  useEffect(() => { if (ready) localStorage.setItem('hiveos_notepad', note); }, [note, ready]);

  // Header : masquer au scroll bas, réafficher au scroll haut
  useEffect(() => {
    const onScroll = () => {
      const y = window.scrollY;
      setHideBar(y > 90 && y > lastScroll.current);
      lastScroll.current = y;
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  // --- Actions ---
  const showToast = msg => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(''), 2200);
  };
  const patchIdea = (id, patch) => setData(d => ({
    ...d, ideas: d.ideas.map(i => i.id === id ? { ...i, ...patch, updatedAt: Date.now() } : i)
  }));
  const moveIdea = (id, status) => patchIdea(id, { status });
  const deleteIdea = id => setData(d => ({ ...d, ideas: d.ideas.filter(i => i.id !== id) }));
  const newIdea = () => {
    const i = { id: uid(), title: 'Nouvelle idée', desc: '', status: 'explore', stars: 0,
      gauges: { impact: 50, faisabilite: 50, difficulte: 50, cout: 50 }, tags: [], tasks: [],
      createdAt: Date.now(), updatedAt: Date.now() };
    setData(d => ({ ...d, ideas: [i, ...d.ideas] }));
    setSelId(i.id);
  };
  const createTag = name => {
    const exist = data.tags.find(t => t.name.toLowerCase() === name.toLowerCase());
    if (exist) return exist;
    const t = { id: uid(), name, color: TAG_COLORS[data.tags.length % TAG_COLORS.length] };
    setData(d => ({ ...d, tags: [...d.tags, t] }));
    return t;
  };
  const mergeData = inc => setData(d => {
    const n = normalize(inc);
    const byName = {}; d.tags.forEach(t => byName[t.name.toLowerCase()] = t.id);
    const tags = [...d.tags];
    const incNameById = {}; n.tags.forEach(t => incNameById[t.id] = t.name.toLowerCase());
    n.tags.forEach(t => { if (!byName[t.name.toLowerCase()]) { tags.push(t); byName[t.name.toLowerCase()] = t.id; } });
    const ideas = [...d.ideas];
    n.ideas.forEach(i => { i.id = uid(); i.tags = (i.tags || []).map(tid => byName[incNameById[tid]]).filter(Boolean); ideas.push(i); });
    return { tags, ideas };
  });
  const replaceData = inc => { setData(normalize(inc)); };
  const copyUrl = () => {
    const hash = '#d=' + b64encode(JSON.stringify(data));
    history.replaceState(null, '', hash);
    copyText(location.href);
  };
  const factoryReset = () => {
    ['app_data_state','app-theme','app-day-mode','app-view'].forEach(k => localStorage.removeItem(k));
    history.replaceState(null, '', location.pathname + location.search);
    setData({ ideas: [], tags: [] });
    setTheme('sncf'); setDay(true); setView('cards');
    setActiveTags([]); setSearch(''); setSort('score');
  };
  // Télécharge le fichier HTML autonome avec données injectées dans le SEED
  const downloadApp = (filename) => {
    const clone = document.documentElement.cloneNode(true);
    const root = clone.querySelector('#root'); if (root) root.innerHTML = '';
    let html = '<!DOCTYPE html>\n' + clone.outerHTML;
    const seedJson = JSON.stringify(data, null, 2);
    html = html.replace(/\/\*__SEED_START__\*\/[\s\S]*?\/\*__SEED_END__\*\//,
      () => '/*__SEED_START__*/\nconst SEED = ' + seedJson + ';\n/*__SEED_END__*/');
    download(filename, html, 'text/html');
  };

  // --- Dérivés ---
  const toggleFilterTag = id => setActiveTags(a => a.includes(id) ? a.filter(x => x !== id) : [...a, id]);
  const filtered = useMemo(() => {
    let list = data.ideas.filter(i => {
      const q = search.trim().toLowerCase();
      const matchQ = !q || i.title.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q);
      const matchT = activeTags.length === 0 || activeTags.every(t => i.tags.includes(t));
      return matchQ && matchT;
    });
    const s = sort;
    list = [...list].sort((a, b) => {
      if (s === 'score') return calcScore(b.gauges) - calcScore(a.gauges);
      if (s === 'stars') return b.stars - a.stars;
      if (s === 'prog') return calcProg(b.tasks) - calcProg(a.tasks);
      if (s === 'recent') return b.updatedAt - a.updatedAt;
      if (s === 'title') return a.title.localeCompare(b.title);
      return 0;
    });
    return list;
  }, [data.ideas, search, activeTags, sort]);

  const selected = data.ideas.find(i => i.id === selId);

  if (!ready) return null;

  return (
    <>
      {/* HEADER */}
      <header className={'appbar' + (hideBar ? ' hidden' : '')}>
        <div className="brand">
          <span className="logo">HiveOS</span>
          <span className="subtitle">IdeaForge</span>
        </div>
        <div className="sysbtns">
          <button className={'sysbtn' + (npOpen ? ' on' : '')} title="Bloc-notes" onClick={() => setNpOpen(o => !o)}>📝</button>
          <ThemeMenu theme={theme} setTheme={setTheme} />
          <button className="sysbtn" title="Jour / Nuit" onClick={() => setDay(d => !d)}>{day ? '🌙' : '☀️'}</button>
          <button className="sysbtn" title="Sauvegarde" onClick={() => setSaveOpen(true)}>💾</button>
        </div>
      </header>

      <div className="wrap">
        {/* TOOLBAR */}
        <div className="toolbar">
          <div className="seg">
            <button className={view === 'cards' ? 'active' : ''} onClick={() => setView('cards')}>🗂️ Cartes</button>
            <button className={view === 'kanban' ? 'active' : ''} onClick={() => setView('kanban')}>📋 Kanban</button>
          </div>
          <button className="btn accent" onClick={newIdea}>＋ Nouvelle idée</button>
          <div className="spacer" />
          <div className="field"><span>🔍</span><input value={search} onChange={e => setSearch(e.target.value)} placeholder="Rechercher…" /></div>
          {view === 'cards' && (
            <select className="sel" value={sort} onChange={e => setSort(e.target.value)}>
              {SORTS.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          )}
        </div>

        {/* FILTRE LIBELLÉS */}
        {data.tags.length > 0 && (
          <div className="tagbar">
            {data.tags.map(t => {
              const on = activeTags.includes(t.id);
              return (
                <span key={t.id} className={'tag' + (on ? '' : ' off')} style={on ? { background: t.color } : null}
                  onClick={() => toggleFilterTag(t.id)}>
                  <span className="dot" />{t.name}
                </span>
              );
            })}
            {activeTags.length > 0 && <span className="tag off" onClick={() => setActiveTags([])}>✕ tout</span>}
          </div>
        )}

        {/* CONTENU */}
        {data.ideas.length === 0 ? (
          <div className="empty">
            <div className="em">💡</div>
            <h2>Aucune idée pour l'instant</h2>
            <p>Capture ta première idée, ajoute des étapes, règle les jauges et laisse le score te dire quoi lancer en premier.</p>
            <button className="btn accent" onClick={newIdea}>＋ Créer une idée</button>
          </div>
        ) : view === 'cards' ? (
          filtered.length === 0
            ? <div className="empty"><div className="em">🔍</div><h2>Rien ne correspond</h2><p>Essaie d'ajuster la recherche ou les filtres.</p></div>
            : <div className="grid">
                {filtered.map((i, n) => (
                  <IdeaCard key={i.id} idea={i} tags={data.tags} onOpen={setSelId}
                    style={{ animationDelay: (n * 0.04) + 's' }} />
                ))}
              </div>
        ) : (
          <div className="kanban">
            {STATUSES.map(s => (
              <KanbanColumn key={s.id} status={s} tags={data.tags} onOpen={setSelId} onMove={moveIdea}
                ideas={filtered.filter(i => i.status === s.id)} />
            ))}
          </div>
        )}
      </div>

      {/* MODALES / OVERLAYS */}
      {selected && (
        <IdeaEditor idea={selected} tags={data.tags} onClose={() => setSelId(null)}
          onPatch={p => patchIdea(selected.id, p)} onDelete={deleteIdea} onCreateTag={createTag} />
      )}
      {saveOpen && (
        <SaveModal data={data} onClose={() => setSaveOpen(false)} onToast={showToast}
          onMerge={mergeData} onReplace={replaceData} onCopyUrl={copyUrl}
          onDownloadApp={downloadApp} onReset={factoryReset} />
      )}
      {npOpen && <Notepad note={note} setNote={setNote} onToast={showToast} onClose={() => setNpOpen(false)} />}
      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
