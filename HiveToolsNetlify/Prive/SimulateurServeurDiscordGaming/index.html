<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulation Serveur Gaming</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.0/babel.min.js" crossorigin></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════════════════════
   VARIABLES — THÈME SOMBRE (défaut) / CLAIR (.light sur body)
═══════════════════════════════════════════════════════════════ */
:root {
  --bg-app    : #1a1b1e;
  --bg-side   : #25262b;
  --bg-shead  : #1f2023;
  --bg-main   : #313338;
  --bg-bar    : #2f3136;
  --bg-card   : #2b2d31;
  --bg-input  : #1e1f22;
  --bg-hover  : #35373c;
  --bg-active : #404249;
  --bg-tabs   : #232428;
  --bg-modal  : #2b2d31;
  --bd        : #3f4147;
  --bd-s      : #2e3035;
  --tx-h      : #f2f3f5;
  --tx        : #dcddde;
  --tx-s      : #96989d;
  --tx-m      : #4e5058;
  --ac        : #5865F2;
  --green     : #57F287;
  --green-d   : #3ba55c;
  --orange    : #FAA81A;
  --red       : #ED4245;
  --purple    : #A855F7;
  --sb-bg     : #1e1f22;
  --sb-thumb  : #3f4147;
}
body.light {
  --bg-app    : #e3e5e8;
  --bg-side   : #f2f3f5;
  --bg-shead  : #e3e5e8;
  --bg-main   : #ffffff;
  --bg-bar    : #f2f3f5;
  --bg-card   : #ffffff;
  --bg-input  : #ebedef;
  --bg-hover  : #dde0e4;
  --bg-active : #d4d7dc;
  --bg-tabs   : #e3e5e8;
  --bg-modal  : #ffffff;
  --bd        : #c8ccd2;
  --bd-s      : #d4d7dc;
  --tx-h      : #060607;
  --tx        : #2e3338;
  --tx-s      : #4f5660;
  --tx-m      : #96989d;
  --sb-bg     : #e3e5e8;
  --sb-thumb  : #c8ccd2;
}

/* ═══════════════════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-app);
  color: var(--tx);
  height: 100vh;
  overflow: hidden;
  transition: background .2s, color .2s;
}
textarea, input, select, button { font-family: 'Outfit', sans-serif; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--sb-bg); }
::-webkit-scrollbar-thumb { background: var(--sb-thumb); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--ac); }

/* ═══════════════════════════════════════════════════════════════
   LAYOUT — sidebar | main
═══════════════════════════════════════════════════════════════ */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 242px; flex-shrink: 0;
  background: var(--bg-side);
  border-right: 1px solid var(--bd);
  display: flex; flex-direction: column;
  overflow: hidden; transition: background .2s;
}
.s-head {
  background: var(--bg-shead);
  border-bottom: 1px solid var(--bd);
  padding: 12px 14px 10px; flex-shrink: 0;
  transition: background .2s;
}
.s-title {
  font-size: 12px; font-weight: 700;
  color: var(--tx-h); text-transform: uppercase;
  letter-spacing: .5px; margin-bottom: 8px;
}
.prog-wrap { margin-top: 5px; }
.prog-bar {
  height: 4px; border-radius: 2px;
  background: var(--bd); overflow: hidden; margin-bottom: 3px;
}
.prog-fill { height: 100%; border-radius: 2px; transition: width .4s; }
.pf-green  { background: linear-gradient(90deg, var(--green), var(--green-d)); }
.pf-purple { background: linear-gradient(90deg, var(--purple), #7c3aed); }
.prog-lbl  {
  display: flex; justify-content: space-between;
  font-size: 10px; color: var(--tx-m); font-weight: 600;
}
.prog-lbl .c-green  { color: var(--green); }
.prog-lbl .c-purple { color: var(--purple); }
.s-scroll { flex: 1; overflow-y: auto; padding: 6px 0 40px; }

/* Catégories */
.cat-h {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 10px 4px; cursor: pointer; user-select: none;
  border-radius: 4px;
  transition: background .1s;
}
.cat-h:hover { background: var(--bg-hover); }
.cat-h.active-cat { background: var(--bg-active); }
.cat-h .cat-click { flex: 1; display: flex; align-items: center; gap: 6px; min-width: 0; }
.cat-h .cat-chev-click {
  padding: 2px 4px;
  cursor: pointer;
  border-radius: 4px;
  transition: background .1s;
}
.cat-h .cat-chev-click:hover { background: var(--bg-hover); }
.cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.cat-n {
  font-size: 9px; font-weight: 700; color: var(--tx-m);
  text-transform: uppercase; letter-spacing: .3px; flex: 1; transition: color .1s;
}
.cat-h:hover .cat-n { color: var(--tx-s); }
.cat-count {
  font-size: 9px; font-weight: 700; color: var(--green);
  background: rgba(87,242,135,.1); padding: 1px 5px; border-radius: 8px;
}
.cat-chev { font-size: 7px; color: var(--tx-m); transition: transform .15s; }
.nocat-lbl {
  padding: 8px 10px 2px; font-size: 9px;
  color: var(--tx-m); font-style: italic; letter-spacing: .4px; user-select: none;
}
.cat-h.nocat { cursor: default; }
.cat-h.nocat:hover { background: transparent; }

/* Salons */
.ch-list { padding: 0 6px; }
.ch {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 8px; border-radius: 4px;
  cursor: pointer; transition: background .1s; min-height: 28px; user-select: none;
}
.ch:hover:not(.voice) { background: var(--bg-hover); }
.ch.active  { background: var(--bg-active); }
.ch.voice   { opacity: .5; cursor: default; }
.ch.val .ch-n { color: var(--purple) !important; }
.ch-ico { font-size: 11px; color: var(--tx-m); flex-shrink: 0; }
.ch-n {
  font-size: 12px; color: var(--tx-s); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color .1s;
}
.ch:not(.voice):hover .ch-n, .ch.active .ch-n { color: var(--tx-h); }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot.g { background: var(--green);  }
.dot.p { background: var(--purple); }
.dot.b { background: var(--ac);     }

/* ── MAIN ── */
.main {
  flex: 1; display: flex; flex-direction: column;
  background: var(--bg-main); overflow: hidden; transition: background .2s;
}

/* Topbar */
.bar {
  background: var(--bg-bar); border-bottom: 1px solid var(--bd);
  padding: 0 14px; height: 48px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; transition: background .2s;
}
.bar-l { display: flex; align-items: center; gap: 8px; }
.bar-title { font-size: 15px; font-weight: 600; color: var(--tx-h); }
.badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; }
.bar-r { display: flex; align-items: center; gap: 6px; }
.auto-save { font-size: 10px; color: var(--green); opacity: 0; transition: opacity .3s; pointer-events: none; }
.auto-save.on { opacity: 1; }

/* Boutons icon */
.ico-btn {
  width: 34px; height: 34px;
  background: var(--bg-card); border: 1px solid var(--bd);
  border-radius: 7px; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, border-color .15s;
}
.ico-btn:hover { background: var(--bg-hover); border-color: var(--tx-m); }
.ico-btn.active-save { background: var(--green) !important; border-color: var(--green) !important; }

/* Menu déroulant langue */
.lang-menu {
  position: absolute; top: calc(100% + 6px); right: 0; z-index: 100;
  background: var(--bg-modal); border: 1px solid var(--bd);
  border-radius: 9px; padding: 5px; min-width: 150px;
  box-shadow: 0 8px 28px rgba(0,0,0,.4);
  display: flex; flex-direction: column; gap: 2px;
}
.lang-opt {
  display: flex; align-items: center; gap: 9px; width: 100%;
  background: transparent; border: none; border-radius: 6px;
  color: var(--tx); font-family: inherit; font-size: 13px; font-weight: 500;
  padding: 8px 10px; cursor: pointer; text-align: left;
  transition: background .12s;
}
.lang-opt:hover { background: var(--bg-hover); }
.lang-opt.on { background: var(--ac); color: #fff; }

/* Tabs */
.tabs {
  display: flex; background: var(--bg-tabs);
  border-bottom: 1px solid var(--bd); flex-shrink: 0; transition: background .2s;
}
.tab {
  padding: 10px 16px; font-size: 12px; font-weight: 600;
  color: var(--tx-s); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s; user-select: none;
}
.tab:hover { color: var(--tx-h); }
.tab.on    { color: var(--tx-h); border-bottom-color: var(--ac); }

/* ═══════════════════════════════════════════════════════════════
   PANNEAU ÉDITEUR
═══════════════════════════════════════════════════════════════ */
.panel { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

.sec {
  background: var(--bg-card); border: 1px solid var(--bd-s);
  border-radius: 8px; overflow: hidden; transition: background .2s, border-color .2s;
}
.sec-h {
  padding: 9px 14px 8px; border-bottom: 1px solid var(--bd-s);
  display: flex; justify-content: space-between; align-items: center;
}
.sec-lbl { font-size: 11px; font-weight: 700; color: var(--tx-s); text-transform: uppercase; letter-spacing: .5px; }
.sec-sub { font-size: 10px; color: var(--tx-m); }
.sec-body { padding: 10px 14px 12px; position: relative; }

.sec.sujet { border-left: 3px solid var(--ac); }
.sec.inst  { border-left: 3px solid var(--orange); }
.sec.inst  .sec-lbl { color: var(--orange); }
.sec.post  { border-left: 3px solid var(--green); }
.sec.post  .sec-lbl { color: var(--green); }
.sec.modif { border-left: 3px solid var(--purple); }
.sec.modif .sec-lbl { color: var(--purple); }

textarea, input[type=text] {
  width: 100%; background: var(--bg-input); border: 1px solid var(--bd);
  border-radius: 6px; color: var(--tx); font-size: 13px;
  line-height: 1.5; padding: 9px 11px; resize: vertical; outline: none;
  transition: border-color .15s, background .2s;
}
textarea:focus, input[type=text]:focus { border-color: var(--ac); }
textarea.t-inst { background: rgba(250,168,26,.05); border-color: rgba(250,168,26,.2); color: #e8c87a; }
textarea.t-inst:focus { border-color: var(--orange); }
textarea.t-modif { background: rgba(168,85,247,.05); border-color: rgba(168,85,247,.2); color: #c9b8e8; }
textarea.t-modif:focus { border-color: var(--purple); }
body.light textarea.t-inst { background: #fff8ec; border-color: rgba(250,168,26,.3); color: #7a4f00; }
body.light textarea.t-modif { background: #f8f0ff; border-color: rgba(168,85,247,.3); color: #6b21a8; }
.char-c { position: absolute; bottom: 16px; right: 18px; font-size: 9px; font-family: monospace; color: var(--tx-m); pointer-events: none; }

/* ═══════════════════════════════════════════════════════════════
   PANNEAU PERMISSIONS
═══════════════════════════════════════════════════════════════ */
.perm-panel {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 16px;
}
.perm-section {
  background: var(--bg-card); border: 1px solid var(--bd-s);
  border-radius: 8px; overflow: hidden;
  transition: background .2s, border-color .2s;
}
.perm-header {
  padding: 9px 14px; border-bottom: 1px solid var(--bd-s);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 6px;
  background: var(--bg-shead); transition: background .2s;
}
.perm-header .lbl {
  font-size: 11px; font-weight: 700; color: var(--tx-s);
  text-transform: uppercase; letter-spacing: .4px;
}
.perm-header .hint { font-size: 10px; color: var(--tx-m); }
.perm-body {
  padding: 12px 14px;
  display: flex; flex-direction: column; gap: 12px;
}
.perm-role-selector {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
}
.perm-role-selector .role-btn {
  padding: 4px 12px; border-radius: 12px; border: 1px solid var(--bd);
  background: transparent; color: var(--tx-s); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: background .1s, border-color .1s, color .1s;
  font-family: 'Outfit', sans-serif;
}
.perm-role-selector .role-btn:hover { border-color: var(--tx-m); }
.perm-role-selector .role-btn.active {
  background: var(--ac); border-color: var(--ac); color: #fff;
}

/* Groupes de permissions */
.perm-group-label {
  font-size: 9px; font-weight: 700; color: var(--tx-m);
  text-transform: uppercase; letter-spacing: .6px;
  padding: 8px 6px 2px; border-top: 1px solid var(--bd-s); margin-top: 4px;
}
.perm-group-label:first-child { border-top: none; margin-top: 0; padding-top: 2px; }

.perm-grid {
  display: flex; flex-direction: column; gap: 2px;
  max-height: 500px; overflow-y: auto;
}
.perm-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 6px; border-radius: 4px;
  transition: background .1s;
}
.perm-row:hover { background: var(--bg-hover); }
.perm-row .p-lbl { font-size: 12px; color: var(--tx); flex: 1; }
.perm-row .p-actions { display: flex; gap: 4px; }
.perm-row .p-btn {
  width: 28px; height: 28px; border: none; border-radius: 4px;
  font-size: 14px; cursor: pointer; background: transparent;
  opacity: .4; transition: opacity .15s, background .15s;
  font-family: 'Outfit', sans-serif;
}
.perm-row .p-btn:hover { opacity: .8; }
.perm-row .p-btn.on { opacity: 1; }
.perm-row .p-btn.yes { color: var(--green); }
.perm-row .p-btn.yes.on { background: rgba(87,242,135,.15); }
.perm-row .p-btn.no  { color: var(--red); }
.perm-row .p-btn.no.on  { background: rgba(237,66,69,.15); }
.perm-row .p-btn.inh { color: var(--tx-s); }
.perm-row .p-btn.inh.on { background: rgba(150,152,157,.15); }

.perm-inherit-all {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; background: rgba(88,101,242,.06);
  border: 1px solid rgba(88,101,242,.15); border-radius: 6px;
  color: var(--tx-m); font-size: 11px; cursor: pointer;
}
.perm-inherit-all input { cursor: pointer; }
.perm-add-role {
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  padding-top: 4px;
}
.perm-add-role select {
  background: var(--bg-input); border: 1px solid var(--bd);
  border-radius: 6px; color: var(--tx); font-size: 12px;
  padding: 5px 8px; outline: none; transition: border-color .15s;
  font-family: 'Outfit', sans-serif; flex: 1; min-width: 120px;
}
.perm-add-role select:focus { border-color: var(--ac); }
.perm-add-role .chip {
  background: rgba(88,101,242,.2); color: #a5b0ff;
  border: 1px solid rgba(88,101,242,.3); border-radius: 10px;
  padding: 2px 8px; font-size: 11px; font-weight: 600;
  cursor: pointer; transition: background .1s;
}
.perm-add-role .chip:hover {
  background: rgba(237,66,69,.2); color: #ff9999;
  border-color: rgba(237,66,69,.4);
}

/* ═══════════════════════════════════════════════════════════════
   BOUTONS GÉNÉRAUX
═══════════════════════════════════════════════════════════════ */
.btn { padding: 7px 13px; border-radius: 6px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: filter .15s; font-family: 'Outfit', sans-serif; white-space: nowrap; }
.btn:hover { filter: brightness(1.1); }
.btn.prim  { background: var(--ac); color: #fff; }
.btn.ghost { background: transparent; border: 1px solid var(--bd); color: var(--tx-s); }
.btn.ghost:hover { border-color: var(--tx-s); color: var(--tx-h); }
.btn.ok    { background: var(--green); color: #111; }
.btn.warn  { background: var(--red); color: #fff; }

/* ═══════════════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════════════ */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.65);
  z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal {
  background: var(--bg-modal); border: 1px solid var(--bd);
  border-radius: 10px; width: 100%; max-width: 580px; max-height: 88vh;
  overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 14px;
  box-shadow: 0 24px 60px rgba(0,0,0,.5); transition: background .2s;
}
.modal-title { font-size: 16px; font-weight: 700; color: var(--tx-h); }
.modal-sep   { height: 1px; background: var(--bd); }
.modal-sub   { font-size: 11px; color: var(--tx-m); line-height: 1.5; }
.modal-row   { display: flex; gap: 8px; flex-wrap: wrap; }
.modal-code  { background: var(--bg-input); border: 1px solid var(--bd); border-radius: 6px; padding: 10px 12px; font-family: monospace; font-size: 11px; color: var(--green); word-break: break-all; line-height: 1.4; }
.mta { background: var(--bg-input); border: 1px solid var(--bd); border-radius: 6px; color: var(--tx-s); font-family: monospace; font-size: 11px; padding: 10px 12px; width: 100%; height: 140px; resize: none; outline: none; transition: border-color .15s; }
.mta:focus { border-color: var(--ac); }
.mta.imp { color: var(--purple); }
.msg { padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; }
.msg.ok  { background: rgba(87,242,135,.1);  color: var(--green); border: 1px solid rgba(87,242,135,.2); }
.msg.err { background: rgba(237,66,69,.1);   color: var(--red);   border: 1px solid rgba(237,66,69,.2); }

/* État vide */
.empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--tx-m); }
.empty-ico { font-size: 40px; }
.empty-txt { font-size: 13px; text-align: center; max-width: 260px; line-height: 1.5; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

/* ═══════════════════════════════════════════════════════════════
   PRESETS — chaque preset déclare les 38 permissions explicitement
   (true ou false). Zéro case blanche dans l'outil.
═══════════════════════════════════════════════════════════════ */

/* Base tout-faux : sert de socle pour tous les autres presets */
const _NONE = {
  view:false, manage:false, managePerms:false, manageWebhooks:false, createInvite:false,
  sendMessages:false, sendTTS:false, sendVoice:false, createPolls:false,
  embedLinks:false, attachFiles:false, useExternalEmojis:false, useExternalStickers:false,
  addReactions:false, createPublicThreads:false, createPrivateThreads:false,
  sendThreads:false, manageThreads:false, readHistory:false, manageMessages:false,
  pinMessages:false, mentionEveryone:false, useAppCommands:false, useActivities:false,
  useExternalApps:false, connect:false, speak:false, stream:false, useVAD:false,
  prioritySpeaker:false, useSoundboard:false, useExternalSounds:false, setVoiceStatus:false,
  muteMembers:false, deafenMembers:false, moveMembers:false, manageEvents:false, createEvents:false,
};

/* Fondateur / Admin — tout autorisé */
const _FULL = {
  view:true, manage:true, managePerms:true, manageWebhooks:true, createInvite:true,
  sendMessages:true, sendTTS:true, sendVoice:true, createPolls:true,
  embedLinks:true, attachFiles:true, useExternalEmojis:true, useExternalStickers:true,
  addReactions:true, createPublicThreads:true, createPrivateThreads:true,
  sendThreads:true, manageThreads:true, readHistory:true, manageMessages:true,
  pinMessages:true, mentionEveryone:true, useAppCommands:true, useActivities:true,
  useExternalApps:true, connect:true, speak:true, stream:true, useVAD:true,
  prioritySpeaker:true, useSoundboard:true, useExternalSounds:true, setVoiceStatus:true,
  muteMembers:true, deafenMembers:true, moveMembers:true, manageEvents:true, createEvents:true,
};

/* Modo — modération complète (salons publics texte + vocal) */
const _MODO_MOD = {
  ..._NONE,
  view:true, readHistory:true, createInvite:true,
  sendMessages:true, sendVoice:true, createPolls:true,
  embedLinks:true, attachFiles:true, useExternalEmojis:true, useExternalStickers:true,
  addReactions:true, createPublicThreads:true, sendThreads:true,
  manageThreads:true, manageMessages:true, pinMessages:true,
  useAppCommands:true, useActivities:true, useExternalApps:true,
  connect:true, speak:true, stream:true, useVAD:true,
  useSoundboard:true, useExternalSounds:true, setVoiceStatus:true,
  muteMembers:true, deafenMembers:true, moveMembers:true,
};

/* Modo — écriture simple (salons staff internes, sans outils de modération) */
const _MODO_W = {
  ..._NONE,
  view:true, readHistory:true,
  sendMessages:true, sendVoice:true, createPolls:true,
  embedLinks:true, attachFiles:true, useExternalEmojis:true, useExternalStickers:true,

/* ── STORAGE ── */
const S_KEY   = "discord-gaming-v5";
const S_THEME = "discord-gaming-theme";

async function sGet() {
  if (window.storage?.get) {
    try { const r = await window.storage.get(S_KEY); if (r?.value) return JSON.parse(r.value); } catch(_) {}
  }
  try { const r = localStorage.getItem(S_KEY); if (r) return JSON.parse(r); } catch(_) {}
  return null;
}
async function sSet(data) {
  const j = JSON.stringify(data);
  if (window.storage?.set) {
    try { await window.storage.set(S_KEY, j); return; } catch(_) {}
  }
  try { localStorage.setItem(S_KEY, j); } catch(_) {}
}

function hashEncode(data) {
  try {
    const bytes = new TextEncoder().encode(JSON.stringify(data));
    let bin = "";
    bytes.forEach(b => bin += String.fromCharCode(b));
    return btoa(bin);
  } catch(_) { return null; }
}
function hashDecode(b64) {
  try {
    const bin   = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return JSON.parse(new TextDecoder().decode(bytes));
  } catch(_) { return null; }
}
function hashRead()  {
  const h = window.location.hash.slice(1);
  return h ? hashDecode(h) : null;
}
function hashWrite(data) {
  const enc = hashEncode(data);
  if (!enc) return false;
  window.location.hash = enc;
  try { navigator.clipboard.writeText(window.location.href); } catch(_) {}
  return true;
}

/* ═══════════════════════════════════════════════════════════════
   COMPOSANT PERMISSIONS PANEL
═══════════════════════════════════════════════════════════════ */
function PermsPanel({ catId, chId, catPerms, setCatPerms, chPerms, setChPerms }) {
  const catRoles = useMemo(() => {
    return (catPerms[catId]?.roles) || [];
  }, [catPerms, catId]);

  /* Rôles ajoutés directement au niveau du salon (hors catégorie) */
  const chRoles = useMemo(() => {
    return (chPerms[chId]?.roles) || [];
  }, [chPerms, chId]);

  const [selectedRole, setSelectedRole] = useState("everyone");

  const getCatPerm = (role, permKey) => catPerms[catId]?.perms?.[role]?.[permKey];
  const setCatPerm = (role, permKey, value) => {
    setCatPerms(prev => {
      const cat = prev[catId] || { roles: catRoles, perms: {} };
      const perms = cat.perms || {};
      const rolePerms = perms[role] || {};
      const newRolePerms = { ...rolePerms };
      if (value === undefined) delete newRolePerms[permKey];
      else newRolePerms[permKey] = value;
      const newPerms = { ...perms, [role]: newRolePerms };
      Object.keys(newPerms).forEach(r => { if (Object.keys(newPerms[r]).length === 0) delete newPerms[r]; });
      return { ...prev, [catId]: { ...cat, perms: newPerms, roles: catRoles } };
    });
  };

  const getChPerm = (role, permKey) => {
    if (chPerms[chId]?.inheritAll) return undefined;
    return chPerms[chId]?.perms?.[role]?.[permKey];
  };
  const setChPerm = (role, permKey, value) => {
    setChPerms(prev => {
      const ch = { ...(prev[chId] || { inheritAll: false, perms: {} }) };
      if (ch.inheritAll) ch.inheritAll = false;
      const perms = ch.perms || {};
      const rolePerms = perms[role] || {};
      const newRolePerms = { ...rolePerms };
      if (value === undefined) delete newRolePerms[permKey];
      else newRolePerms[permKey] = value;
      const newPerms = { ...perms, [role]: newRolePerms };
      Object.keys(newPerms).forEach(r => { if (Object.keys(newPerms[r]).length === 0) delete newPerms[r]; });
      return { ...prev, [chId]: { ...ch, perms: newPerms } };
    });
  };

  const toggleInheritAll = () => {
    setChPerms(prev => {
      const ch = prev[chId] || { inheritAll: false, perms: {} };
      const newVal = !ch.inheritAll;
      return newVal
        ? { ...prev, [chId]: { inheritAll: true, perms: {} } }
        : { ...prev, [chId]: { ...ch, inheritAll: false } };
    });
  };

  const addRole = (role) => {
    if (!role || catRoles.includes(role)) return;
    setCatPerms(prev => {
      const cat = prev[catId] || { roles: [], perms: {} };
      return { ...prev, [catId]: { ...cat, roles: [...cat.roles, role] } };
    });
  };
  const removeRole = (role) => {
    setCatPerms(prev => {
      const cat = prev[catId] || { roles: [], perms: {} };
      const newRoles = cat.roles.filter(r => r !== role);
      const perms = { ...cat.perms };
      delete perms[role];
      return { ...prev, [catId]: { ...cat, roles: newRoles, perms } };
    });
  };

  /* Ajout / suppression de rôles au niveau du salon */
  const addChRole = (role) => {
    if (!role) return;
    setChPerms(prev => {
      const ch = prev[chId] || { inheritAll: false, perms: {}, roles: [] };
      const roles = ch.roles || [];
      if (roles.includes(role)) return prev;
      return { ...prev, [chId]: { ...ch, roles: [...roles, role] } };
    });
  };
  const removeChRole = (role) => {
    setChPerms(prev => {
      const ch = prev[chId] || { inheritAll: false, perms: {}, roles: [] };
      const roles = (ch.roles || []).filter(r => r !== role);
      const perms = { ...(ch.perms || {}) };
      delete perms[role];
      return { ...prev, [chId]: { ...ch, roles, perms } };
    });
  };

  /* Fusion catRoles + chRoles (sans doublons) */
  const displayRoles = ["everyone", "membre", ...new Set([...catRoles, ...chRoles])];

  /* Rendu d'une ligne permission */
  const renderPermRow = (permKey, getFn, setFn) => {
    const val = getFn(selectedRole, permKey);
    return (
      <div key={permKey} className="perm-row">
        <span className="p-lbl">{permLabel(permKey)}</span>
        <div className="p-actions">
          <button className={`p-btn yes${val === true  ? ' on' : ''}`} title={t("permYes")}     onClick={() => setFn(selectedRole, permKey, true)}>✅</button>
          <button className={`p-btn inh${val === undefined ? ' on' : ''}`} title={t("permInherit")} onClick={() => setFn(selectedRole, permKey, undefined)}>⬜</button>
          <button className={`p-btn no${val === false  ? ' on' : ''}`} title={t("permNo")}      onClick={() => setFn(selectedRole, permKey, false)}>❌</button>
        </div>
      </div>
    );
  };

  /* Rendu groupé */
  const renderGroupedPerms = (getFn, setFn) => (
    <div className="perm-grid">
      {PERM_GROUPS.map(g => (
        <React.Fragment key={g.key}>
          <div className="perm-group-label">{permGroupLabel(g)}</div>
          {g.perms.map(k => renderPermRow(k, getFn, setFn))}
        </React.Fragment>
      ))}
    </div>
  );

  const roleBtns = (
    <div className="perm-role-selector">
      {displayRoles.map(r => (
        <button key={r} className={`role-btn${selectedRole === r ? ' active' : ''}`}
          onClick={() => setSelectedRole(r)}>
          {r === 'everyone' ? t("permRoleEveryone") : r === 'membre' ? t("permRoleMembre") : roleName(r)}
        </button>
      ))}
    </div>
  );

  /* ── Salon ── */
  if (chId) {
    const isInheritAll = !!chPerms[chId]?.inheritAll;
    return (
      <div className="perm-panel">
        <div className="perm-section">
          <div className="perm-header">
            <span className="lbl">{t("permChTitle")}</span>
            <label className="perm-inherit-all">
              <input type="checkbox" checked={isInheritAll} onChange={toggleInheritAll} />
              {t("permInheritAll")}
            </label>
          </div>
          <div className="perm-body">
            {!isInheritAll ? (
              <>
                {roleBtns}
                {/* Ajout de rôles au niveau du salon */}
                <div className="perm-add-role">
                  <select value="" onChange={e => { if (e.target.value) { addChRole(e.target.value); e.target.value = ""; } }}>
                    <option value="">+ {t("permAddRole")}</option>
                    {ROLES.filter(r => !displayRoles.includes(r) && r !== 'membre' && r !== 'everyone').map(r => (
                      <option key={r} value={r}>{roleName(r)}</option>
                    ))}
                  </select>
                  <span style={{fontSize:11, color:"var(--tx-m)"}}>
                    {chRoles.map(r => (
                      <span key={r} className="chip" style={{marginRight:4}} onClick={() => removeChRole(r)}>
                        {roleName(r)} ✕
                      </span>
                    ))}
                  </span>
                </div>
                {renderGroupedPerms(getChPerm, setChPerm)}
              </>
            ) : (
              /* ── Vue héritée : affiche les permissions de la catégorie en lecture seule ── */
              <>
                <div style={{
                  background:"rgba(88,101,242,.08)", border:"1px solid rgba(88,101,242,.2)",
                  borderRadius:6, padding:"8px 12px", fontSize:12, color:"var(--tx-s)",
                  display:"flex", alignItems:"center", gap:8, marginBottom:4
                }}>
                  🔗 <span>Ce salon est <strong>synchronisé</strong> avec la catégorie — les permissions ci-dessous sont héritées automatiquement.</span>
                </div>
                {roleBtns}
                <div className="perm-grid">
                  {PERM_GROUPS.map(g => (
                    <React.Fragment key={g.key}>
                      <div className="perm-group-label">{permGroupLabel(g)}</div>
                      {g.perms.map(k => {
                        const val = getCatPerm(selectedRole, k);
                        return (
                          <div key={k} className="perm-row" style={{opacity:.72}}>
                            <span className="p-lbl">{permLabel(k)}</span>
                            <div style={{display:"flex", alignItems:"center", gap:6}}>
                              <span style={{fontSize:15}}>{val === true ? "✅" : val === false ? "❌" : "⬜"}</span>
                              <span style={{fontSize:10, color:"var(--ac)"}}>🔗</span>
                            </div>
                          </div>
                        );
                      })}
                    </React.Fragment>
                  ))}
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    );
  }

  /* ── Catégorie ── */
  return (
    <div className="perm-panel">
      <div className="perm-section">
        <div className="perm-header">
          <span className="lbl">{t("permCatTitle")}</span>
          <span className="hint">(héritées par les salons)</span>
        </div>
        <div className="perm-body">
          {roleBtns}
          {renderGroupedPerms(getCatPerm, setCatPerm)}
          <div className="perm-add-role">
            <select value="" onChange={e => { if (e.target.value) { addRole(e.target.value); e.target.value = ""; } }}>
              <option value="">+ {t("permAddRole")}</option>
              {ROLES.filter(r => !catRoles.includes(r) && r !== 'membre' && r !== 'everyone').map(r => (
                <option key={r} value={r}>{roleName(r)}</option>
              ))}
            </select>
            <span style={{fontSize:11, color:"var(--tx-m)"}}>
              {catRoles.map(r => (
                <span key={r} className="chip" style={{marginRight:4}} onClick={() => removeRole(r)}>
                  {roleName(r)} ✕
                </span>
              ))}
            </span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   COMPOSANT PRINCIPAL App
═══════════════════════════════════════════════════════════════ */
function App() {
  const [topics,       setTopics]       = useState({});
  const [instructions, setInstructions] = useState({});
  const [posts,        setPosts]        = useState({});
  const [modifs,       setModifs]       = useState({});
  const [catPerms,     setCatPerms]     = useState(SEED.catPerms);
  const [chPerms,      setChPerms]      = useState(SEED.chPerms);
  const [validated,    setValidated]    = useState({});
  const [selected,     setSelected]     = useState(null);
  const [tab,          setTab]          = useState("content");
  const [collapsed,    setCollapsed]    = useState({});
  const [light,        setLight]        = useState(false);
  const [lang,         setLang]         = useState("fr");
  const [showLang,     setShowLang]     = useState(false);
  const [autoFlash,    setAutoFlash]    = useState(false);
  const [copied,       setCopied]       = useState(false);
  const [showSave,     setShowSave]     = useState(false);
  const [saveMsg,      setSaveMsg]      = useState(null);
  const [urlFlash,     setUrlFlash]     = useState(false);
  const [importTxt,    setImportTxt]    = useState("");
  const [importMsg,    setImportMsg]    = useState(null);
  const loaded = useRef(false);

  const selectCategory = useCallback((catId) => {
    setSelected({ type: 'category', id: catId });
    setTab('perms');
  }, []);
  const selectChannel = useCallback((catId, ch) => {
    setSelected({ type: 'channel', catId, ch });
    setTab('content');
  }, []);

  useEffect(() => {
    document.body.classList.toggle("light", light);
    try { localStorage.setItem(S_THEME, light?"light":"dark"); } catch(_) {}
  }, [light]);

  LANG_REF.v = lang;
  useEffect(() => {
    try { localStorage.setItem(S_LANG, lang); } catch(_) {}
    document.documentElement.lang = lang;
    document.title = t("serverTitle").replace(/^🎮\s*/, "") + " — Simulation";
  }, [lang]);

  useEffect(() => {
    if (!showLang) return;
    const h = () => setShowLang(false);
    document.addEventListener("click", h);
    return () => document.removeEventListener("click", h);
  }, [showLang]);

  useEffect(() => {
    try { if (localStorage.getItem(S_THEME)==="light") setLight(true); } catch(_) {}
    try { const lg = localStorage.getItem(S_LANG); if (lg && LANGS.some(l=>l.v===lg)) setLang(lg); } catch(_) {}
    let live = true;
    (async () => {
      const fromHash    = hashRead();
      const fromStorage = !fromHash ? await sGet() : null;
      if (!live) return;
      const d = fromHash || fromStorage || SEED;
      setTopics(d.topics||{});
      setInstructions(d.instructions||{});
      setPosts(d.posts||{});
      setModifs(d.modifs||{});
      /* Conversion données legacy si nécessaire */
      let cPerms = d.catPerms || {};
      let chPermsData = d.chPerms || {};
      let needsConversion = false;
      for (const catId in cPerms) {
        if (cPerms[catId] && typeof cPerms[catId].everyone === 'string') {
          needsConversion = true; break;
        }
      }
      if (needsConversion) {
        const newCatPerms = {};
        for (const catId in cPerms) {
          const old = cPerms[catId];
          const roles = old.roles || [];
          const perms = {};
          if (old.everyone) {
            const val = old.everyone === 'see' ? true : old.everyone === 'hide' ? false : undefined;
            if (val !== undefined) perms.everyone = { view: val };
          }
          if (old.membre) {
            const val = old.membre === 'see' ? true : old.membre === 'hide' ? false : undefined;
            if (val !== undefined) perms.membre = { view: val };
          }
          (roles || []).forEach(r => { perms[r] = { view: true }; });
          newCatPerms[catId] = { roles, perms };
        }
        cPerms = newCatPerms;
      }
      // Merge : SEED fournit la base, les données sauvées écrasent entrée par entrée
      setCatPerms({ ...SEED.catPerms, ...cPerms });
      setChPerms({ ...SEED.chPerms,  ...chPermsData });
      setValidated(d.validated||{});
      loaded.current = true;
    })();
    return () => { live = false; };
  }, []);

  useEffect(() => {
    if (!loaded.current) return;
    sSet({ topics, instructions, posts, modifs, catPerms, chPerms, validated });
    setAutoFlash(true);
    const ti = setTimeout(()=>setAutoFlash(false), 800);
    return () => clearTimeout(ti);
  }, [topics, instructions, posts, modifs, catPerms, chPerms, validated]);

  const allTxt   = STRUCTURE.flatMap(c => c.channels.filter(x => x.type==="text"));
  const total    = allTxt.length;
  const nFilled  = allTxt.filter(c => (topics[c.id]||"").trim()||(posts[c.id]||"").trim()).length;
  const nVal     = allTxt.filter(c => validated[c.id]).length;
  const isFilled = id => !!(( topics[id]||"").trim()||(posts[id]||"").trim());
  const hasCustomP = id => !!(chPerms[id] && !chPerms[id].inheritAll && Object.keys(chPerms[id].perms||{}).length > 0);
  const allData  = () => ({ topics, instructions, posts, modifs, catPerms, chPerms, validated });

  const toggleVal      = useCallback(id => setValidated(p=>({...p,[id]:!p[id]})), []);
  const toggleCollapse = useCallback(id => setCollapsed(p=>({...p,[id]:!p[id]})), []);
  const copyPost = useCallback(id => {
    navigator.clipboard?.writeText(posts[id]||"").then(()=>{
      setCopied(true); setTimeout(()=>setCopied(false), 1500);
    });
  }, [posts]);

  const saveToUrl = () => {
    const ok = hashWrite(allData());
    if (ok) {
      setUrlFlash(true);
      setSaveMsg({ok:true, txt:"🔗 URL copiée dans le presse-papier"});
      setTimeout(()=>setUrlFlash(false), 2500);
    } else {
      setSaveMsg({ok:false, txt:"Erreur lors de l'encodage"});
    }
  };
  const getJson = () => JSON.stringify(allData(), null, 2);
  const dlJson  = () => {
    const a = document.createElement("a");
    a.href = "data:application/json;charset=utf-8,"+encodeURIComponent(getJson());
    a.download = "discord-gaming-backup.json"; a.click();
  };

  const factoryReset = () => {
    if (!confirm("⚠️ Remettre à zéro TOUTES les données ?\n\nTout ce que tu as écrit sera effacé définitivement.\nCette action est irréversible.")) return;
    setTopics({}); setInstructions({}); setPosts({}); setModifs({});
    setCatPerms({}); setChPerms({}); setValidated({});
    window.location.hash = "";
    try { localStorage.removeItem(S_KEY); } catch(_) {}
    if (window.storage?.delete) { try { window.storage.delete(S_KEY); } catch(_) {} }
    setSaveMsg({ ok:true, txt:t("msgReset") });
  };
  const applyImport = (mode) => {
    try {
      const d = JSON.parse(importTxt);
      if (mode==="merge") {
        const m = (a,b) => ({...a,...b});
        if (d.topics)       setTopics(p=>m(p,d.topics));
        if (d.instructions) setInstructions(p=>m(p,d.instructions));
        if (d.posts)        setPosts(p=>m(p,d.posts));
        if (d.modifs)       setModifs(p=>m(p,d.modifs));
        if (d.catPerms)     setCatPerms(p=>m(p,d.catPerms));
        if (d.chPerms)      setChPerms(p=>m(p,d.chPerms));
        if (d.validated)    setValidated(p=>m(p,d.validated));
        setImportMsg({ok:true, txt:t("msgMerged")});
      } else {
        if (!confirm(t("cfReplace"))) return;
        if (d.topics!==undefined)       setTopics(d.topics);
        if (d.instructions!==undefined) setInstructions(d.instructions);
        if (d.posts!==undefined)        setPosts(d.posts);
        if (d.modifs!==undefined)       setModifs(d.modifs);
        if (d.catPerms!==undefined)     setCatPerms(d.catPerms);
        if (d.chPerms!==undefined)      setChPerms(d.chPerms);
        if (d.validated!==undefined)    setValidated(d.validated);
        setImportMsg({ok:true, txt:t("msgReplaced")});
      }
    } catch(e) { setImportMsg({ok:false, txt:t("msgBadJson")+e.message}); }
  };

  const selCat   = selected?.type === 'category' ? STRUCTURE.find(c=>c.id===selected.id) : null;
  const selCh    = selected?.type === 'channel' ? selected.ch : null;
  const selCatId = selected?.type === 'category' ? selected.id : selected?.catId;
  const selZone  = (selCat || (selCh ? STRUCTURE.find(c=>c.id===selected.catId) : null))?.zone;
  const zoneObj  = selZone ? ZONES[selZone] : null;

  const isCategorySelected = selected?.type === 'category';
  const isChannelSelected  = selected?.type === 'channel';
  const displayId          = isChannelSelected ? selected.ch.id : null;

  const renderCh = (cat, c) => {
    const voice  = c.type==="voice";
    const active = selCh?.id===c.id;
    const isVal  = !!validated[c.id];
    const filled = isFilled(c.id);
    const custP  = hasCustomP(c.id);
    const cls    = ["ch",voice&&"voice",active&&"active",isVal&&"val"].filter(Boolean).join(" ");
    return (
      <div key={c.id} className={cls}
        onClick={()=>!voice&&selectChannel(cat.id, c)}
        onDoubleClick={e=>{if(!voice){e.stopPropagation();toggleVal(c.id);}}}
      >
        <span className="ch-ico">{voice?"🔊":"#"}</span>
        <span className="ch-n">{chName(c)}</span>
        {isVal&&<div className="dot p"/>}
        {!isVal&&filled&&<div className="dot g"/>}
        {custP&&<div className="dot b"/>}
      </div>
    );
  };

  const renderSaveModal = () => (
    <div className="overlay" onClick={()=>{setShowSave(false);setSaveMsg(null);setImportMsg(null);}}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">{t("modalTitle")}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--tx-s)",textTransform:"uppercase",letterSpacing:".4px"}}>{t("urlSecT")}</div>
          <div className="modal-sub">{t("urlSecD")}</div>
          <button className={`btn ${urlFlash?"ok":"prim"}`} style={{alignSelf:"flex-start"}} onClick={saveToUrl}>
            {urlFlash?t("urlBtnOk"):t("urlBtn")}
          </button>
          {window.location.hash.length>1&&(
            <div className="modal-code">{window.location.href.slice(0,80)}…</div>
          )}
          {saveMsg&&<div className={`msg ${saveMsg.ok?"ok":"err"}`}>{saveMsg.txt}</div>}
        </div>
        <div className="modal-sep"/>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--tx-s)",textTransform:"uppercase",letterSpacing:".4px"}}>{t("jsonExpT")}</div>
          <div className="modal-sub">{t("jsonExpD")}</div>
          <textarea className="mta" readOnly value={getJson()} onClick={e=>e.target.select()} />
          <div className="modal-row">
            <button className="btn ghost" onClick={()=>navigator.clipboard?.writeText(getJson())}>{t("copy")}</button>
            <button className="btn ghost" onClick={dlJson}>{t("dlJson")}</button>
          </div>
        </div>
        <div className="modal-sep"/>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--tx-s)",textTransform:"uppercase",letterSpacing:".4px"}}>{t("jsonImpT")}</div>
          <div className="modal-sub">{t("jsonImpD")}</div>
          <textarea className="mta imp" placeholder={t("jsonImpPh")} value={importTxt} onChange={e=>{setImportTxt(e.target.value);setImportMsg(null);}} />
          {importMsg&&<div className={`msg ${importMsg.ok?"ok":"err"}`}>{importMsg.txt}</div>}
          <div className="modal-row">
            <button className="btn ghost" onClick={()=>applyImport("merge")}>{t("merge")}</button>
            <button className="btn warn"  onClick={()=>applyImport("replace")}>{t("replaceAll")}</button>
          </div>
        </div>
        <div className="modal-sep"/>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--red)",textTransform:"uppercase",letterSpacing:".4px"}}>{t("resetT")}</div>
          <div className="modal-sub">{t("resetD")}</div>
          <button className="btn warn" style={{alignSelf:"flex-start"}} onClick={factoryReset}>
            {t("resetBtn")}
          </button>
        </div>
        <div className="modal-sep"/>
      </div>
    </div>
  );

  return (
    <div className="app">
      {/* ── SIDEBAR ── */}
      <div className="sidebar">
        <div className="s-head">
          <div className="s-title">{t("serverTitle")}</div>
          <div className="prog-wrap">
            <div className="prog-bar"><div className="prog-fill pf-green"  style={{width:total?Math.round(nFilled/total*100)+"%":"0%"}}/></div>
            <div className="prog-lbl"><span className="c-green">📝 {nFilled} {t("filled")}</span><span>{total} {t("channels")}</span></div>
          </div>
          <div className="prog-wrap">
            <div className="prog-bar"><div className="prog-fill pf-purple" style={{width:total?Math.round(nVal/total*100)+"%":"0%"}}/></div>
            <div className="prog-lbl"><span className="c-purple">✓ {nVal} {t("validated")}</span><span>{total-nVal} {t("remaining")}</span></div>
          </div>
        </div>
        <div className="s-scroll">
          {STRUCTURE.map(cat=>{
            const zone = ZONES[cat.zone]||{};
            const open = !collapsed[cat.id];
            const nf   = cat.channels.filter(c=>isFilled(c.id)).length;
            const isActiveCat = selected?.type === 'category' && selected.id === cat.id;
            if (cat.nocat) return (
              <div key={cat.id}>
                <div className="nocat-lbl">{t("noCategory")}</div>
                <div className="ch-list">{cat.channels.map(c=>renderCh(cat,c))}</div>
              </div>
            );
            return (
              <div key={cat.id}>
                <div className={`cat-h${isActiveCat ? ' active-cat' : ''}`}>
                  <div className="cat-click" onClick={() => selectCategory(cat.id)}>
                    <div className="cat-dot" style={{background:zone.color}}/>
                    <span className="cat-n">{catName(cat)}</span>
                    {nf>0&&<span className="cat-count">{nf}</span>}
                  </div>
                  <span className="cat-chev-click" onClick={(e) => { e.stopPropagation(); toggleCollapse(cat.id); }}>
                    <span className="cat-chev" style={{transform:open?"rotate(0)":"rotate(-90deg)"}}>▼</span>
                  </span>
                </div>
                {open&&cat.channels.length>0&&(
                  <div className="ch-list">{cat.channels.map(c=>renderCh(cat,c))}</div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* ── MAIN ── */}
      <div className="main">
        <div className="bar">
          <div className="bar-l">
            {isCategorySelected && (
              <><span className="bar-title">{catName(selCat)}</span>
                {zoneObj&&<span className="badge" style={{background:zoneObj.color+"22",color:zoneObj.color}}>{zoneName(selZone)}</span>}
              </>
            )}
            {isChannelSelected && (
              <><span className="bar-title">{chName(selCh)}</span>
                {zoneObj&&<span className="badge" style={{background:zoneObj.color+"22",color:zoneObj.color}}>{zoneName(selZone)}</span>}
              </>
            )}
            {!selected && (
              <span className="bar-title" style={{color:"var(--tx-m)"}}>{t("editorTitle")}</span>
            )}
          </div>
          <div className="bar-r">
            <span className={`auto-save${autoFlash?" on":""}`}>●</span>
            <button className="ico-btn" title={light?t("darkMode"):t("lightMode")} onClick={()=>setLight(v=>!v)}>
              {light?"🌙":"☀️"}
            </button>
            <div style={{position:"relative"}}>
              <button className="ico-btn" title={t("language")} onClick={(e)=>{e.stopPropagation();setShowLang(v=>!v);}}>
                🌐
              </button>
              {showLang&&(
                <div className="lang-menu" onClick={e=>e.stopPropagation()}>
                  {LANGS.map(l=>(
                    <button key={l.v} className={`lang-opt${l.v===lang?" on":""}`} onClick={()=>{setLang(l.v);setShowLang(false);}}>
                      <span style={{fontSize:15}}>{l.em}</span><span>{l.n}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
            <button className={`ico-btn${urlFlash?" active-save":""}`} title={t("saveData")} onClick={()=>{setShowSave(true);setSaveMsg(null);setImportMsg(null);}}>
              💾
            </button>
          </div>
        </div>

        {selected ? (
          <>
            <div className="tabs">
              <div className={`tab${tab==="content"?" on":""}`} onClick={()=>setTab("content")}>{t("tabContent")}</div>
              <div className={`tab${tab==="perms"?" on":""}`}   onClick={()=>setTab("perms")}>{t("tabPerms")}</div>
            </div>

            {tab==="content" ? (
              isChannelSelected ? (
                <div className="panel">
                  <div className="sec sujet">
                    <div className="sec-h">
                      <div><div className="sec-lbl">{t("topicLbl")}</div><div className="sec-sub">{t("topicSub")}</div></div>
                    </div>
                    <div className="sec-body">
                      <textarea rows={3} maxLength={1024} placeholder={t("topicPh")}
                        value={topics[displayId]||""} onChange={e=>setTopics(p=>({...p,[displayId]:e.target.value}))} style={{paddingBottom:22}}/>
                      <span className="char-c">{(topics[displayId]||"").length}/1024</span>
                    </div>
                  </div>
                  <div className="sec inst">
                    <div className="sec-h">
                      <div><div className="sec-lbl">{t("instLbl")}</div><div className="sec-sub">{t("instSub")}</div></div>
                    </div>
                    <div className="sec-body">
                      <textarea className="t-inst" rows={4} placeholder={t("instPh")}
                        value={instructions[displayId]||""} onChange={e=>setInstructions(p=>({...p,[displayId]:e.target.value}))}/>
                    </div>
                  </div>
                  <div className="sec post">
                    <div className="sec-h">
                      <div><div className="sec-lbl">{t("postLbl")}</div><div className="sec-sub">{t("postSub")}</div></div>
                      <button className={`btn ${copied?"ok":"ghost"}`} style={{padding:"4px 10px",fontSize:11}} onClick={()=>copyPost(displayId)}>
                        {copied?t("copied"):t("copy")}
                      </button>
                    </div>
                    <div className="sec-body">
                      <textarea rows={6} placeholder={t("postPh")}
                        value={posts[displayId]||""} onChange={e=>setPosts(p=>({...p,[displayId]:e.target.value}))}/>
                    </div>
                  </div>
                  <div className="sec modif">
                    <div className="sec-h">
                      <div><div className="sec-lbl">{t("modifLbl")}</div><div className="sec-sub">{t("modifSub")}</div></div>
                    </div>
                    <div className="sec-body">
                      <textarea className="t-modif" rows={3} placeholder={t("modifPh")}
                        value={modifs[displayId]||""} onChange={e=>setModifs(p=>({...p,[displayId]:e.target.value}))}/>
                    </div>
                  </div>
                </div>
              ) : (
                <div className="panel" style={{display:"flex",alignItems:"center",justifyContent:"center",color:"var(--tx-m)"}}>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:40,marginBottom:12}}>📂</div>
                    <div style={{fontSize:14}}>Sélectionne un salon pour voir son contenu</div>
                  </div>
                </div>
              )
            ) : (
              <PermsPanel
                catId={isCategorySelected ? selected.id : selected.catId}
                chId={isChannelSelected ? selected.ch.id : null}
                catPerms={catPerms} setCatPerms={setCatPerms}
                chPerms={chPerms}   setChPerms={setChPerms}
              />
            )}
          </>
        ) : (
          <div className="empty">
            <div className="empty-ico">🎮</div>
            <div className="empty-txt">{t("emptyTxt")}<br/><span style={{fontSize:11,opacity:.6}}>{t("emptyHint")}</span></div>
          </div>
        )}
      </div>

      {showSave&&renderSaveModal()}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   MONTAGE
═══════════════════════════════════════════════════════════════ */
const rootEl = document.getElementById("root");
if (ReactDOM.createRoot) {
  ReactDOM.createRoot(rootEl).render(<App/>);
} else {
  ReactDOM.render(<App/>, rootEl);
}
</script>
</body>
</html>
