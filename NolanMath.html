        // =====================
        // TETRIS
        // =====================
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 20;
        const TETRIS_OFFSET_X = (canvas.width - COLS * BLOCK_SIZE) / 2;

        const TETROMINOS = {
            I: { shape: [[1,1,1,1]], color: '#00f0f0' },
            O: { shape: [[1,1],[1,1]], color: '#f0f000' },
            T: { shape: [[0,1,0],[1,1,1]], color: '#a000f0' },
            S: { shape: [[0,1,1],[1,1,0]], color: '#00f000' },
            Z: { shape: [[1,1,0],[0,1,1]], color: '#f00000' },
            J: { shape: [[1,0,0],[1,1,1]], color: '#0000f0' },
            L: { shape: [[0,0,1],[1,1,1]], color: '#f0a000' }
        };
        const TETRO_KEYS = Object.keys(TETROMINOS);

        let tetrisBoard = [];
        let currentPiece = null;
        let tetrisScore = 0;
        let tetrisRunning = false;
        let tetrisInterval = null;

        function createBoard() {
            return Array(ROWS).fill().map(() => Array(COLS).fill(0));
        }

        function randomPiece() {
            const key = TETRO_KEYS[Math.floor(Math.random() * TETRO_KEYS.length)];
            const t = TETROMINOS[key];
            return {
                shape: t.shape.map(row => [...row]),
                color: t.color,
                x: Math.floor((COLS - t.shape[0].length) / 2),
                y: 0
            };
        }

        function drawTetris() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    ctx.strokeRect(TETRIS_OFFSET_X + c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                }
            }

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (tetrisBoard[r][c]) {
                        ctx.fillStyle = tetrisBoard[r][c];
                        ctx.fillRect(TETRIS_OFFSET_X + c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                    }
                }
            }

            if (currentPiece) {
                ctx.fillStyle = currentPiece.color;
                for (let r = 0; r < currentPiece.shape.length; r++) {
                    for (let c = 0; c < currentPiece.shape[r].length; c++) {
                        if (currentPiece.shape[r][c]) {
                            const x = TETRIS_OFFSET_X + (currentPiece.x + c) * BLOCK_SIZE;
                            const y = (currentPiece.y + r) * BLOCK_SIZE;
                            ctx.fillRect(x, y, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                        }
                    }
                }
            }

            if (!tetrisRunning && appState === 'tetris_unlocked') {
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.font = 'bold 20px "Comic Sans MS"';
                ctx.textAlign = 'center';
                ctx.fillText('Game Over', canvas.width/2, canvas.height/2 - 20);
                ctx.font = '16px "Comic Sans MS"';
                ctx.fillText('Appuie sur Espace pour rejouer', canvas.width/2, canvas.height/2 + 20);
            }
        }

        function collides(shape, x, y) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const boardX = x + c;
                        const boardY = y + r;
                        if (boardX < 0 || boardX >= COLS || boardY >= ROWS) return true;
                        if (boardY >= 0 && tetrisBoard[boardY][boardX]) return true;
                    }
                }
            }
            return false;
        }

        function lockPiece() {
            for (let r = 0; r < currentPiece.shape.length; r++) {
                for (let c = 0; c < currentPiece.shape[r].length; c++) {
                    if (currentPiece.shape[r][c]) {
                        const boardY = currentPiece.y + r;
                        const boardX = currentPiece.x + c;
                        if (boardY < 0) {
                            tetrisGameOver();
                            return;
                        }
                        tetrisBoard[boardY][boardX] = currentPiece.color;
                    }
                }
            }

            playPieceLockSound();

            for (let row = ROWS - 1; row >= 0; row--) {
                if (tetrisBoard[row].every(cell => cell !== 0)) {
                    tetrisBoard.splice(row, 1);
                    tetrisBoard.unshift(new Array(COLS).fill(0));
                    tetrisScore += 100;
                    row++; // re-check same index after splice
                    playLineClearSound();
                    if (tetrisEasterMode) {
                        gameScoreDisplay.textContent = '🧱 Score : ' + tetrisScore + ' / Objectif : 2 000';
                        checkTetrisEasterVictory();
                        if (!tetrisRunning) return;
                    } else {
                        gameScoreDisplay.textContent = '🧱 Score : ' + tetrisScore;
                    }
                }
            }

            currentPiece = randomPiece();
            if (collides(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                tetrisGameOver();
            }
        }

        function tetrisGameOver() {
            tetrisRunning = false;
            clearInterval(tetrisInterval);
            tetrisInterval = null;
            stopTetrisMusic();
            drawTetris();

            if (tetrisEasterMode && easterStep === 5) {
                setTimeout(() => {
                    showEasterModal(
                        '😢 PAS ENCORE 2 000 POINTS...',
                        `Tu as fait <strong>${tetrisScore} points</strong>, mais Peach est toujours enfermée !<br><br>` +
                        'Bowser rigole… Mais toi tu ne lâches jamais, hein Nolan ? 💪<br><br>' +
                        'Tu veux retenter ?',
                        '🧱😤',
                        'Je réessaye ! 🔄',
                        startTetrisEasterGame
                    );
                }, 800);
            }
        }

        function moveDown() {
            if (!tetrisRunning) return;
            if (!collides(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
                currentPiece.y++;
            } else {
                lockPiece();
            }
            drawTetris();
        }

        function moveLeft() {
            if (!tetrisRunning) return;
            if (!collides(currentPiece.shape, currentPiece.x - 1, currentPiece.y)) {
                currentPiece.x--;
            }
            drawTetris();
        }

        function moveRight() {
            if (!tetrisRunning) return;
            if (!collides(currentPiece.shape, currentPiece.x + 1, currentPiece.y)) {
                currentPiece.x++;
            }
            drawTetris();
        }

        function rotatePiece() {
            if (!tetrisRunning) return;
            const shape = currentPiece.shape;
            const rotated = shape[0].map((_, idx) => shape.map(row => row[idx]).reverse());
            if (!collides(rotated, currentPiece.x, currentPiece.y)) {
                currentPiece.shape = rotated;
            }
            drawTetris();
        }

        function hardDrop() {
            if (!tetrisRunning) return;
            while (!collides(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
                currentPiece.y++;
            }
            playHardDropSound();
            lockPiece();
            drawTetris();
        }

        function startTetrisGame() {
            stopTetrisMusic();
            tetrisBoard = createBoard();
            tetrisScore = 0;
            gameScoreDisplay.textContent = '🧱 Score : 0';
            currentPiece = randomPiece();
            tetrisRunning = true;
            drawTetris();
            if (tetrisInterval) clearInterval(tetrisInterval);
            tetrisInterval = setInterval(moveDown, 800);
            startTetrisMusic();
        }

        // =====================
        // GESTIONNAIRE DE TOUCHES
        // =====================
        function handleKeyDown(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'D') {
                e.preventDefault();
                initAudio();
                if (!easterActive) {
                    skipQuiz();
                } else if (easterStep === 1) {
                    // Skip mario quiz
                    if (marioTimer) { clearInterval(marioTimer); marioTimer = null; }
                    timerDisplay.classList.add('hidden');
                    quizActive = false;
                    quizFinished = true;
                    answerInput.disabled = true;
                    validateBtn.disabled = true;
                    marioQuizScore = TOTAL_QUESTIONS;
                    progressBar.style.width = '100%';
                    progressBar.textContent = TOTAL_QUESTIONS + '/' + TOTAL_QUESTIONS;
                    marioChallengeComplete();
                } else if (easterStep === 4) {
                    // Skip code quiz
                    quizActive = false;
                    quizFinished = true;
                    answerInput.disabled = true;
                    validateBtn.disabled = true;
                    const remaining = TOTAL_QUESTIONS - step4QuizScore;
                    for (let i = 0; i < remaining; i++) step4CodeSum += 42;
                    progressBar.style.width = '100%';
                    progressBar.textContent = TOTAL_QUESTIONS + '/' + TOTAL_QUESTIONS;
                    step4QuizComplete();
                }
                return;
            }

            if (quizActive && !quizFinished) {
                if (e.code === 'Equal' || e.code === 'NumpadAdd') {
                    e.preventDefault();
                    if (easterActive && easterStep === 1) checkMarioAnswer();
                    else if (easterActive && easterStep === 4) checkCodeAnswer();
                    else checkAnswer();
                    return;
                }
                if (e.code === 'Minus' || e.code === 'NumpadSubtract') {
                    e.preventDefault();
                    clearAnswer();
                    return;
                }
            }

            if (quizActive) return;

            const key = e.key;
            if (key.startsWith('Arrow')) e.preventDefault();

            if ((appState === 'snake_unlocked' || snakeEasterMode) && snakeRunning) {
                if (key === 'ArrowUp' && direction.y === 0) direction = {x: 0, y: -1};
                else if (key === 'ArrowDown' && direction.y === 0) direction = {x: 0, y: 1};
                else if (key === 'ArrowLeft' && direction.x === 0) direction = {x: -1, y: 0};
                else if (key === 'ArrowRight' && direction.x === 0) direction = {x: 1, y: 0};
            } else if ((appState === 'tetris_unlocked' || (tetrisEasterMode && easterStep === 5)) && tetrisRunning) {
                if (key === 'ArrowLeft') moveLeft();
                else if (key === 'ArrowRight') moveRight();
                else if (key === 'ArrowDown') moveDown();
                else if (key === 'ArrowUp') rotatePiece();
                else if (key === ' ') { hardDrop(); e.preventDefault(); }
            }

            if (appState === 'tetris_unlocked' && !tetrisRunning && key === ' ') {
                e.preventDefault();
                startTetrisGame();
            }
        }

        document.addEventListener('keydown', handleKeyDown);

        // =====================
        // TOUCH CONTROLS
        // =====================
        const touchControls  = document.getElementById('touchControls');
        const snakeDpad      = document.getElementById('snakeDpad');
        const tetrisCtrl     = document.getElementById('tetrisCtrl');
        const restartTetrisBtn = document.getElementById('restartTetrisBtn');

        function showTouchControls(mode) {
            // mode: 'none' | 'snake' | 'tetris'
            touchControls.classList.toggle('hidden', mode === 'none');
            snakeDpad.classList.toggle('hidden',  mode !== 'snake');
            tetrisCtrl.classList.toggle('hidden', mode !== 'tetris');
            restartTetrisBtn.classList.add('hidden');
        }

        // D-pad
        function setDir(dx, dy) {
            if ((appState === 'snake_unlocked' || snakeEasterMode) && snakeRunning) {
                if (dx !== 0 && direction.x === 0) direction = {x: dx, y: 0};
                else if (dy !== 0 && direction.y === 0) direction = {x: 0, y: dy};
            }
        }
        document.getElementById('dpadUp')   .addEventListener('touchstart', e => { e.preventDefault(); setDir(0,-1); }, {passive:false});
        document.getElementById('dpadDown') .addEventListener('touchstart', e => { e.preventDefault(); setDir(0, 1); }, {passive:false});
        document.getElementById('dpadLeft') .addEventListener('touchstart', e => { e.preventDefault(); setDir(-1,0); }, {passive:false});
        document.getElementById('dpadRight').addEventListener('touchstart', e => { e.preventDefault(); setDir( 1,0); }, {passive:false});

        // Tetris buttons
        document.getElementById('tLeft')  .addEventListener('touchstart', e => { e.preventDefault(); moveLeft();   }, {passive:false});
        document.getElementById('tRight') .addEventListener('touchstart', e => { e.preventDefault(); moveRight();  }, {passive:false});
        document.getElementById('tRotate').addEventListener('touchstart', e => { e.preventDefault(); rotatePiece();}, {passive:false});
        document.getElementById('tSoft')  .addEventListener('touchstart', e => { e.preventDefault(); moveDown();   }, {passive:false});
        document.getElementById('tHard')  .addEventListener('touchstart', e => { e.preventDefault(); hardDrop();   }, {passive:false});

        // Mouse fallback (desktop)
        document.getElementById('dpadUp')   .addEventListener('mousedown', () => setDir(0,-1));
        document.getElementById('dpadDown') .addEventListener('mousedown', () => setDir(0, 1));
        document.getElementById('dpadLeft') .addEventListener('mousedown', () => setDir(-1,0));
        document.getElementById('dpadRight').addEventListener('mousedown', () => setDir( 1,0));
        document.getElementById('tLeft')  .addEventListener('click', moveLeft);
        document.getElementById('tRight') .addEventListener('click', moveRight);
        document.getElementById('tRotate').addEventListener('click', rotatePiece);
        document.getElementById('tSoft')  .addEventListener('click', moveDown);
        document.getElementById('tHard')  .addEventListener('click', hardDrop);

        // Restart tetris button (game over on touch device)
        restartTetrisBtn.addEventListener('click', () => {
            restartTetrisBtn.classList.add('hidden');
            if (tetrisEasterMode) startTetrisEasterGame();
            else startTetrisGame();
        });

        // ---- Swipe on canvas (Snake & Tetris) ----
        let swipeTouchStartX = 0;
        let swipeTouchStartY = 0;
        let swipeTouchTime   = 0;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            swipeTouchStartX = e.touches[0].clientX;
            swipeTouchStartY = e.touches[0].clientY;
            swipeTouchTime   = Date.now();
        }, {passive: false});

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const dx = e.changedTouches[0].clientX - swipeTouchStartX;
            const dy = e.changedTouches[0].clientY - swipeTouchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);
            const dt    = Date.now() - swipeTouchTime;

            // Snake swipe
            if ((appState === 'snake_unlocked' || snakeEasterMode) && snakeRunning) {
                if (absDx < 15 && absDy < 15) return; // too small
                if (absDx > absDy) {
                    if (dx > 0 && direction.x === 0) direction = {x: 1, y: 0};
                    else if (dx < 0 && direction.x === 0) direction = {x: -1, y: 0};
                } else {
                    if (dy > 0 && direction.y === 0) direction = {x: 0, y: 1};
                    else if (dy < 0 && direction.y === 0) direction = {x: 0, y: -1};
                }
                return;
            }

            // Tetris swipe / tap
            if ((appState === 'tetris_unlocked' || (tetrisEasterMode && easterStep === 5)) && tetrisRunning) {
                if (absDx < 15 && absDy < 15) {
                    // Tap = rotate
                    rotatePiece();
                    return;
                }
                if (absDx > absDy) {
                    if (dx > 0) moveRight(); else moveLeft();
                } else {
                    if (dy > 0) {
                        if (absDy > 100 && dt < 400) hardDrop(); else moveDown();
                    } else {
                        rotatePiece();
                    }
                }
            }
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); }, {passive: false});

        // ---- Patch startSnakeGame / startTetrisGame / snakeGameOver / tetrisGameOver ----
        // to show/hide touch controls automatically
        const _origStartSnake = startSnakeGame;
        startSnakeGame = function() {
            _origStartSnake();
            showTouchControls('snake');
        };

        const _origStopSnake = stopSnake;
        stopSnake = function() {
            _origStopSnake();
        };

        const _origSnakeGameOver = snakeGameOver;
        snakeGameOver = function() {
            _origSnakeGameOver();
            showTouchControls('none');
        };

        const _origStartTetrisGame = startTetrisGame;
        startTetrisGame = function() {
            _origStartTetrisGame();
            showTouchControls('tetris');
        };

        const _origStartTetrisEasterGame = startTetrisEasterGame;
        startTetrisEasterGame = function() {
            _origStartTetrisEasterGame();
            showTouchControls('tetris');
        };

        const _origTetrisGameOver = tetrisGameOver;
        tetrisGameOver = function() {
            _origTetrisGameOver();
            showTouchControls('none');
            // Show restart button only if not easter (easter has its own modal retry)
            if (!tetrisEasterMode) {
                restartTetrisBtn.classList.remove('hidden');
            }
        };

        const _origResetNormalMode = resetNormalMode;
        resetNormalMode = function() {
            _origResetNormalMode();
            showTouchControls('none');
        };

        validateBtn.addEventListener('click', () => {
            if (easterActive && easterStep === 1) checkMarioAnswer();
            else if (easterActive && easterStep === 4) checkCodeAnswer();
            else checkAnswer();
        });

        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (easterActive && easterStep === 1) checkMarioAnswer();
                else if (easterActive && easterStep === 4) checkCodeAnswer();
                else checkAnswer();
            }
        });

        // =====================
        // INTRO CINÉMATIQUE
        // =====================
        const INTRO_SCENES = [
            {
                emoji: '🌌✨',
                title: 'Une histoire commence…',
                subtitle: 'Ce message est spécialement pour toi, Nolan.',
                bg: 'linear-gradient(135deg, #05050f, #12073a)'
            },
            {
                emoji: '🏰🌸',
                title: 'Le Royaume Champignon',
                subtitle: 'Un monde magique et paisible,\nplein de couleurs et de bonheur.',
                bg: 'linear-gradient(135deg, #0e2e10, #1a5c1a)'
            },
            {
                emoji: '👸💜',
                title: 'La Princesse Peach',
                subtitle: 'Elle régnait avec douceur et gentillesse\nsur tout le royaume.',
                bg: 'linear-gradient(135deg, #3e104e, #7a2090)'
            },
            {
                emoji: '🐢👑💢',
                title: 'SOUDAIN… BOWSER !',
                subtitle: '"Wahaha ! Le Royaume Champignon est à MOI !"',
                bg: 'linear-gradient(135deg, #5e0808, #8b0a0a)',
                shake: true
            },
            {
                emoji: '😱👸🔒',
                title: "L'enlèvement !",
                subtitle: "Bowser a kidnappé Peach et l'a enfermée\ndans son sombre château !",
                bg: 'linear-gradient(135deg, #2a0505, #580000)',
                shake: true
            },
            {
                emoji: '🍄👨🟢',
                title: 'Mario et Luigi sont bloqués…',
                subtitle: "Ils ont besoin d'un héros capable de résoudre\nleurs défis mathématiques.",
                bg: 'linear-gradient(135deg, #12214e, #1e3880)'
            },
            {
                emoji: '⭐🦸',
                title: 'NOLAN !',
                subtitle: "Tu es le SEUL assez courageux et intelligent\npour les aider. Le Royaume compte sur toi !",
                bg: 'linear-gradient(135deg, #4e3400, #7a5500)',
                pulse: true
            }
        ];

        let introSceneIdx = 0;
        let introTimer = null;
        let introRunning = false;
        const SCENE_DURATION = 3200;

        function initIntro() {
            const starCanvas = document.getElementById('starCanvas');
            starCanvas.width  = window.innerWidth;
            starCanvas.height = window.innerHeight;
            const sc = starCanvas.getContext('2d');
            for (let i = 0; i < 200; i++) {
                const x = Math.random() * starCanvas.width;
                const y = Math.random() * starCanvas.height;
                const r = Math.random() * 1.6 + 0.3;
                sc.beginPath();
                sc.arc(x, y, r, 0, Math.PI * 2);
                sc.fillStyle = `rgba(255,255,255,${Math.random() * 0.7 + 0.2})`;
                sc.fill();
            }

            const dotsEl = document.getElementById('introDots');
            INTRO_SCENES.forEach((_, i) => {
                const d = document.createElement('span');
                d.className = 'i-dot';
                dotsEl.appendChild(d);
            });

            document.getElementById('introSkipBtn').addEventListener('click', skipToLastIntroScene);
            document.getElementById('introStartBtn').addEventListener('click', launchGame);
            document.addEventListener('keydown', introKeyHandler);

            // Tap on overlay to advance scene (mobile — excludes buttons)
            document.getElementById('introOverlay').addEventListener('click', (e) => {
                if (!introRunning) return;
                if (e.target.tagName === 'BUTTON') return;
                clearTimeout(introTimer);
                if (introSceneIdx >= INTRO_SCENES.length - 1) launchGame();
                else showIntroScene(introSceneIdx + 1);
            });

            introRunning = true;
            showIntroScene(0);
        }

        function introKeyHandler(e) {
            if (!introRunning) return;
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                if (introSceneIdx >= INTRO_SCENES.length - 1) {
                    launchGame();
                } else {
                    clearTimeout(introTimer);
                    showIntroScene(introSceneIdx + 1);
                }
            }
            if (e.key === 'Escape') skipToLastIntroScene();
        }

        function showIntroScene(idx) {
            introSceneIdx = idx;
            const scene   = INTRO_SCENES[idx];
            const content = document.getElementById('introContent');
            const bg      = document.getElementById('introBg');
            const dots    = document.querySelectorAll('.i-dot');
            const skipBtn  = document.getElementById('introSkipBtn');
            const startBtn = document.getElementById('introStartBtn');

            content.classList.remove('intro-enter');
            content.classList.add('intro-exit');

            setTimeout(() => {
                content.classList.remove('intro-exit');
                bg.style.background = scene.bg;

                document.getElementById('introEmoji').textContent    = scene.emoji;
                document.getElementById('introTitle').textContent    = scene.title;
                document.getElementById('introSubtitle').innerHTML   = scene.subtitle.replace(/\n/g, '<br>');

                const emojiEl = document.getElementById('introEmoji');
                emojiEl.style.animation = 'none';
                void emojiEl.offsetWidth;
                if (scene.shake) emojiEl.style.animation = 'introShake 0.65s ease 0.15s';
                else if (scene.pulse) emojiEl.style.animation = 'introPulse 1.3s ease infinite';

                dots.forEach((d, i) => {
                    d.className = 'i-dot' + (i < idx ? ' i-done' : i === idx ? ' i-active' : '');
                });

                const isLast = idx === INTRO_SCENES.length - 1;
                skipBtn.style.display  = isLast ? 'none'  : '';
                startBtn.style.display = isLast ? 'block' : 'none';

                content.classList.add('intro-enter');
            }, 270);

            clearTimeout(introTimer);
            if (idx < INTRO_SCENES.length - 1) {
                introTimer = setTimeout(() => showIntroScene(idx + 1), SCENE_DURATION);
            }
        }

        function skipToLastIntroScene() {
            clearTimeout(introTimer);
            showIntroScene(INTRO_SCENES.length - 1);
        }

        function launchGame() {
            if (!introRunning) return;
            introRunning = false;
            clearTimeout(introTimer);
            document.removeEventListener('keydown', introKeyHandler);

            const el = document.documentElement;
            try {
                if (el.requestFullscreen)            el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            } catch(e) {}

            const overlay = document.getElementById('introOverlay');
            overlay.classList.add('fade-out');

            setTimeout(() => {
                overlay.style.display = 'none';
                const gw = document.getElementById('gameWrapper');
                gw.style.display = 'flex';

                generateQuestion();
                updateProgress();
                lockOverlay.classList.remove('hidden');
                lockOverlay.style.display = 'flex';
                drawSnake();

                initAudio();
                activateEasterEgg();
            }, 720);
        }

        // Cacher le bouton start au départ (affiché seulement à la dernière scène)
        document.getElementById('introStartBtn').style.display = 'none';

        window.addEventListener('load', initIntro);
    </script>
</body>
