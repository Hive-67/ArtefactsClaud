let AC=null,mGain,sfxG,ambG;
function initAudio(){
    if(AC){if(AC.state==='suspended')AC.resume();return;}
    AC=new(window.AudioContext||window.webkitAudioContext)();
    const master=AC.createGain();master.gain.value=0.88;master.connect(AC.destination);
    mGain=AC.createGain();mGain.gain.value=0.20;mGain.connect(master);
    sfxG=AC.createGain();sfxG.gain.value=0.55;sfxG.connect(master);
    ambG=AC.createGain();ambG.gain.value=0.16;ambG.connect(master);
}
function tone(f,d,type='sine',v=0.3,dest=null,delay=0){
    if(!AC)return;
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.frequency.value=f;
    const t0=AC.currentTime+delay;
    g.gain.setValueAtTime(v,t0);g.gain.exponentialRampToValueAtTime(0.0001,t0+d);
    o.connect(g);g.connect(dest||sfxG);o.start(t0);o.stop(t0+d+0.02);
}
function nshot(d,v=0.1,dest=null,delay=0){
    if(!AC)return;
    const len=Math.ceil(AC.sampleRate*(d+0.01));
    const buf=AC.createBuffer(1,len,AC.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*Math.exp(-i/(len*0.2));
    const src=AC.createBufferSource(),g=AC.createGain();
    src.buffer=buf;g.gain.value=v;src.connect(g);g.connect(dest||sfxG);
    src.start(AC.currentTime+delay);
}

let mIval=null,mBeat=0;
function startMusic(lvl){
    stopMusic();if(!AC)return;
    const c=MCFG[Math.min(lvl,MCFG.length-1)];const bms=60000/c.bpm;mBeat=0;
    mIval=setInterval(()=>{
        const b=mBeat%8,r=c.root;
        if(b===0||b===4)tone(r/2,bms*1.6/1000,'triangle',0.12,mGain);
        if(b===2||b===6)tone(r/4,bms*0.8/1000,'triangle',0.08,mGain);
        if(b%2===0){const ni=Math.floor(Math.random()*c.mode.length);const oct=b<4?2:1;tone(r*Math.pow(2,c.mode[ni]/12)*oct,bms*1.2/1000,'sine',0.065,mGain);}
        if(b===0||b===2||b===4||b===6)nshot(0.06,0.042,mGain);
        if(b===1||b===5)nshot(0.04,0.026,mGain);
        mBeat++;
    },bms);
}
function stopMusic(){if(mIval){clearInterval(mIval);mIval=null;}}

// Ambient
let ambNodes=[],ambTOs=[];
function stopAmbient(){ambNodes.forEach(n=>{try{n.stop();}catch(e){}});ambNodes=[];ambTOs.forEach(id=>clearTimeout(id));ambTOs=[];}
function mkNoise(color){
    if(!AC)return null;
    const len=AC.sampleRate*3,buf=AC.createBuffer(1,len,AC.sampleRate),d=buf.getChannelData(0);
    if(color==='white'){for(let i=0;i<len;i++)d[i]=Math.random()*2-1;}
    else if(color==='pink'){let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(let i=0;i<len;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;b2=0.969*b2+w*0.153852;b3=0.8665*b3+w*0.3104856;b4=0.55*b4+w*0.5329522;b5=-0.7616*b5-w*0.016898;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;b6=w*0.115926;}}
    else{let last=0;for(let i=0;i<len;i++){const w=Math.random()*2-1;last=(last+0.02*w)/1.02;d[i]=last*3.5;}}
    return buf;
}
function ambNoise(color,ftype,freq,Q,vol){
    if(!AC)return;const buf=mkNoise(color);if(!buf)return;
    const src=AC.createBufferSource();src.buffer=buf;src.loop=true;
    const f=AC.createBiquadFilter();f.type=ftype;f.frequency.value=freq;if(Q)f.Q.value=Q;
    const g=AC.createGain();g.gain.value=vol;
    src.connect(f);f.connect(g);g.connect(ambG);src.start();ambNodes.push(src);
}
function ambOsc(freq,type,vol,vibRate=0,vibAmt=0){
    if(!AC)return;
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.frequency.value=freq;g.gain.value=vol;
    if(vibRate>0){const lfo=AC.createOscillator(),lg=AC.createGain();lfo.frequency.value=vibRate;lg.gain.value=vibAmt;lfo.connect(lg);lg.connect(o.frequency);lfo.start();ambNodes.push(lfo);}
    o.connect(g);g.connect(ambG);o.start();ambNodes.push(o);
}
function schedRepeat(fn,minMs,maxMs){function run(){if(!AC)return;fn();const id=setTimeout(run,minMs+Math.random()*(maxMs-minMs));ambTOs.push(id);}const id=setTimeout(run,minMs*0.3);ambTOs.push(id);}
function startAmbient(w){
    stopAmbient();if(!AC)return;
    if(w===0){ambNoise('pink','lowpass',700,1,0.65);ambNoise('white','bandpass',2200,4,0.07);schedRepeat(()=>{tone(1800+Math.random()*1200,0.06,'sine',0.035,ambG);tone(2200+Math.random()*800,0.05,'sine',0.025,ambG,0.07);},1200,3500);}
    else if(w===1){ambNoise('brown','lowpass',280,1,0.85);ambOsc(52,'sine',0.04,0.25,2);schedRepeat(()=>tone(700+Math.random()*400,0.18,'sine',0.045,ambG),600,2200);}
    else if(w===2){ambNoise('pink','lowpass',480,1,0.6);ambNoise('brown','lowpass',180,1,0.38);schedRepeat(()=>{const f=280+Math.random()*180;tone(f,0.1,'sine',0.04,ambG);tone(f*1.12,0.08,'sine',0.03,ambG,0.05);},300,1100);schedRepeat(()=>tone(180+Math.random()*80,0.25,'sine',0.05,ambG),1800,4000);}
    else if(w===3){ambNoise('white','highpass',380,0.8,0.48);ambNoise('white','bandpass',900,2.5,0.18);schedRepeat(()=>{nshot(0.9,0.055,ambG);tone(75,0.7,'sine',0.03,ambG);},5000,10000);}
    else if(w===4){ambNoise('pink','bandpass',340,2,0.78);ambOsc(78,'sine',0.045,0.08,14);ambNoise('white','highpass',1400,1,0.14);}
    else if(w===5){ambNoise('brown','lowpass',240,1,0.95);ambOsc(38,'sine',0.055,0.12,3);schedRepeat(()=>nshot(0.06,0.09,ambG),80,380);}
    else if(w===6){ambOsc(110,'sine',0.075,0.45,7);ambOsc(165,'triangle',0.04,0.28,4);ambOsc(220,'sine',0.025);ambNoise('brown','lowpass',180,1,0.28);schedRepeat(()=>{tone(220,0.4,'sine',0.04,ambG);tone(330,0.3,'sine',0.03,ambG,0.15);},2500,6000);}
    else{ambOsc(52,'sine',0.09,0.09,9);ambOsc(78,'triangle',0.055,0.18,7);ambNoise('pink','bandpass',1100,2,0.13);ambNoise('white','highpass',3200,1,0.04);}
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function burst(x,y,col,n=12,spd=130,sz=7){
    for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,v=spd*(0.4+Math.random()*0.6);particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-spd*0.3,sz:sz*(0.5+Math.random()*0.5),col,life:1,dec:0.018+Math.random()*0.025});}
}
function tickParticles(dt){particles=particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=280*dt;p.life-=p.dec*dt*60;return p.life>0;});}
function drawParticles(){ctx.save();for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();}ctx.restore();}
function popup(x,y,txt,col='#ffff44'){floats.push({x,y,txt,col,life:1,vy:-55});}
function tickFloats(dt){floats=floats.filter(f=>{f.y+=f.vy*dt;f.life-=dt*1.8;return f.life>0;});}
function drawFloats(){ctx.save();ctx.textAlign='center';ctx.font='bold 22px Arial';for(const f of floats){ctx.globalAlpha=f.life;ctx.strokeStyle='rgba(0,0,0,0.6)';ctx.lineWidth=3;ctx.strokeText(f.txt,f.x,f.y);ctx.fillStyle=f.col;ctx.fillText(f.txt,f.x,f.y);}ctx.restore();}

const snowFlakes=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,r:1+Math.random()*3,spd:30+Math.random()*60,sw:Math.random()*Math.PI*2}));

function drawBG(lvl){
    const b=BG[Math.min(lvl,BG.length-1)];
    const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,b.top);g.addColorStop(1,b.bot);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

    ctx.save();
    for(const d of bgDots){d.y-=d.spd*0.007;if(d.y<0){d.y=H;d.x=Math.random()*W;}const gl=(Math.sin(now*1.8+d.ph)+1)*0.5;ctx.globalAlpha=d.op*(0.5+gl*0.5);ctx.fillStyle=b.star;ctx.shadowBlur=5*gl;ctx.shadowColor=b.star;ctx.beginPath();ctx.arc(d.x,d.y,d.r*(0.8+gl*0.4),0,Math.PI*2);ctx.fill();}
    ctx.restore();
    if(lvl===2){const fg=ctx.createLinearGradient(0,H*0.55,0,H);fg.addColorStop(0,'rgba(20,60,10,0)');fg.addColorStop(1,'rgba(30,80,20,0.22)');ctx.fillStyle=fg;ctx.fillRect(0,H*0.55,W,H*0.45);}
    if(lvl===4){ctx.save();ctx.fillStyle='rgba(200,220,255,0.72)';for(const s of snowFlakes){s.y+=s.spd*0.012;s.x+=Math.sin(now+s.sw)*0.5;if(s.y>H){s.y=0;s.x=Math.random()*W;}ctx.globalAlpha=0.4+Math.random()*0.3;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}ctx.restore();}
    if(lvl===5){const lv=ctx.createLinearGradient(0,H*0.72,0,H);lv.addColorStop(0,'rgba(255,60,0,0)');lv.addColorStop(1,'rgba(255,80,0,0.2)');ctx.fillStyle=lv;ctx.fillRect(0,H*0.72,W,H*0.28);}
    if(lvl===7){ctx.save();ctx.globalAlpha=0.06+Math.sin(now*0.5)*0.04;const rv=ctx.createRadialGradient(W*0.5,H*0.4,50,W*0.5,H*0.4,400);rv.addColorStop(0,'#cc44ff');rv.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=rv;ctx.fillRect(0,0,W,H);ctx.restore();}

}

let dropZones=[];
function initDropZones(){
    dropZones=[];
    if(level<2)return;
    const zone0={idx:0,x:110,y:H/2,r:52,col:'#44ffaa',active:true};
    const zone1={idx:1,x:W-110,y:H/2,r:52,col:'#44aaff',active:true};
    if(level===2||level===3)dropZones=[zone0];
    else dropZones=[zone0,zone1];
}
function drawDropZones(){
    if(dropZones.length===0)return;
    const now=Date.now()/1000;
    for(const z of dropZones){
        // Check if a compatible soul is near
        let near=false;
        if(captureHeld&&(captureHeld.zoneIdx===z.idx)){
            const d=Math.hypot(capX-z.x,capY-z.y);
            near=d<z.r+60;
        }
        const pulse=Math.sin(now*2.5)*0.15;
        const rr=z.r*(near?1.18:1)+pulse*6;
        ctx.save();ctx.translate(z.x,z.y);
        // Glow fill
        const glow=ctx.createRadialGradient(0,0,0,0,0,rr);
        glow.addColorStop(0,near?z.col+'55':'rgba(255,255,255,0.04)');
        glow.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=glow;ctx.beginPath();ctx.arc(0,0,rr+20,0,Math.PI*2);ctx.fill();
        // Ring
        ctx.shadowBlur=near?35:18;ctx.shadowColor=z.col;
        ctx.strokeStyle=z.col;ctx.lineWidth=near?4:2.5;
        ctx.globalAlpha=0.7+pulse;
        ctx.beginPath();ctx.arc(0,0,rr,0,Math.PI*2);ctx.stroke();
        // Inner ring
        ctx.globalAlpha=0.3;ctx.lineWidth=1.5;ctx.setLineDash([6,8]);
        ctx.beginPath();ctx.arc(0,0,rr*0.65,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
        // Icon: small cauldron-like symbol
        ctx.globalAlpha=near?0.85:0.5;ctx.shadowBlur=0;ctx.strokeStyle=z.col;ctx.lineWidth=2.5;ctx.lineCap='round';
        ctx.beginPath();ctx.arc(0,4,14,0,Math.PI);ctx.stroke();
        ctx.beginPath();ctx.moveTo(-14,4);ctx.lineTo(-18,-4);ctx.moveTo(14,4);ctx.lineTo(18,-4);ctx.stroke();
        ctx.beginPath();ctx.moveTo(-10,-4);ctx.lineTo(10,-4);ctx.stroke();
        // Sparkles when near
        if(near){
            ctx.globalAlpha=0.7;ctx.fillStyle=z.col;
            for(let i=0;i<4;i++){const a=now*3+i*Math.PI/2;ctx.beginPath();ctx.arc(Math.cos(a)*(rr+10),Math.sin(a)*(rr+10),3,0,Math.PI*2);ctx.fill();}
        }
        ctx.restore();
    }
}

const TTYPE=[
    {col:'#ff6b9e',glow:'#ff8bc8',sz:34,pts:100,life:4200,name:'mushroom'},
    {col:'#6baaff',glow:'#9bccff',sz:30,pts:120,life:3600,name:'crystal'},

    {col:'#d0eeff',glow:'#ffffff',sz:38,pts:115,life:3500,name:'cloud'},
    {col:'#aaccff',glow:'#ddeeff',sz:32,pts:130,life:3200,name:'snowflake'},
    {col:'#ff5520',glow:'#ff8860',sz:32,pts:160,life:2600,name:'gem'},
    {col:'#ffcc44',glow:'#ffee88',sz:31,pts:145,life:3000,name:'rune'},
    {col:'#ff88ff',glow:'#ffaaff',sz:35,pts:140,life:3200,name:'star'},
];
// Soul zone colors per index
const ZONE_COLS=['#44ffaa','#44aaff'];
const ZONE_DARK=['#004422','#002244'];

function spawnTarget(){
    const mg=90,pad=185;
    const x=mg+Math.random()*(W-mg*2),y=80+Math.random()*(H-pad-80);
    const tt=TTYPE[Math.min(level,TTYPE.length-1)];
    const poison=level>=1&&Math.random()<(0.09+level*0.027);
    // Soul chance from level 2+
    const soulChance=level<2?0:(0.12+level*0.015);
    const isSoul=!poison&&Math.random()<soulChance;
    if(isSoul){
        const zoneIdx=dropZones.length>1?(Math.random()>0.5?1:0):0;
        const zcol=ZONE_COLS[zoneIdx]||'#44ffaa';
        if(!hintsShown.has('soul')){hintsShown.add('soul');hintText=t('soul_hint');hintLife=3.8;}
        targets.push({x,y,col:zcol,glow:zcol,sz:32,pts:280+level*30,life:5500,name:'soul',
            born:Date.now(),scale:0,pulse:0,poison:false,isSoul:true,zoneIdx,
            vx:(Math.random()-0.5)*35,vy:(Math.random()-0.5)*35});
        return;
    }
    // Power-up target (rare, from level 1+)
    // handled separately via powerupSpawnTimer
    const moving=level>=1&&Math.random()<0.28;
    targets.push({x,y,col:tt.col,glow:tt.glow,sz:tt.sz,pts:tt.pts,life:tt.life,name:tt.name,
        born:Date.now(),scale:0,pulse:0,poison,isSoul:false,
        vx:moving?(Math.random()-0.5)*110:0,vy:moving?(Math.random()-0.5)*80:0});
}

function spawnPowerup(){
    const types=['slowmo','double','blast','heart'];
    const ptype=types[Math.floor(Math.random()*types.length)];
    const mg=150,pad=200;
    const x=mg+Math.random()*(W-mg*2),y=80+Math.random()*(H-pad-80);
    if(!hintsShown.has('powerup')){hintsShown.add('powerup');hintText=t('power_hint');hintLife=3.8;}
    targets.push({x,y,col:'#ffdd00',glow:'#ffff88',sz:33,pts:0,life:6000,name:'powerup',
        born:Date.now(),scale:0,pulse:0,poison:false,isSoul:false,isPowerup:true,ptype,
        vx:0,vy:0,spin:0});
}

function tickTargets(dt){
    const now=Date.now();
    targets=targets.filter(t=>{
        t.scale=Math.min(1,t.scale+dt*5);t.pulse+=dt*3.2;
        if(t.isPowerup)t.spin=(t.spin||0)+dt*2;
        // Move
        if(t.vx||t.vy){
            t.x+=t.vx*dt;t.y+=t.vy*dt;
            const minX=60,maxX=W-60,minY=60,maxY=H-180;
            if(t.x<minX){t.x=minX;t.vx=Math.abs(t.vx);}
            if(t.x>maxX){t.x=maxX;t.vx=-Math.abs(t.vx);}
            if(t.y<minY){t.y=minY;t.vy=Math.abs(t.vy);}
            if(t.y>maxY){t.y=maxY;t.vy=-Math.abs(t.vy);}
        }
        if(now-t.born>t.life){combo=0;SFX.miss();burst(t.x,t.y,'#ff4455',6,80,6);return false;}
        return true;
    });
}

function drawTargets(){
    const now=Date.now();
    for(const t of targets){
        const age=now-t.born,tr=1-age/t.life,ps=t.scale*(1+Math.sin(t.pulse)*0.06),r=t.sz*ps;
        ctx.save();ctx.translate(t.x,t.y);
        if(t.isPowerup){ctx.rotate(t.spin||0);}
        // Timer ring
        if(!t.isPowerup){
            ctx.beginPath();ctx.arc(0,0,r+7,-Math.PI/2,-Math.PI/2+Math.PI*2*tr);
            ctx.strokeStyle=t.poison?'#ff0044':(tr>0.3?'#44ff88':'#ff4444');ctx.lineWidth=t.poison?4:3;ctx.stroke();
        }
        // Soul special: ghostly ring
        if(t.isSoul){
            ctx.globalAlpha=0.4+Math.sin(t.pulse)*0.15;
            ctx.strokeStyle=t.col;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,r+12,0,Math.PI*2);ctx.stroke();
            ctx.globalAlpha=1;
        }
        ctx.shadowBlur=t.isPowerup?25:18+Math.sin(t.pulse)*7;
        ctx.shadowColor=t.poison?'#ff0055':t.glow;
        const g2=ctx.createRadialGradient(0,0,0,0,0,r);
        if(t.isPowerup){g2.addColorStop(0,'#fffff0');g2.addColorStop(0.5,'#ffee44');g2.addColorStop(1,'#ff8800');}
        else if(t.isSoul){g2.addColorStop(0,t.glow+'cc');g2.addColorStop(1,t.col+'88');}
        else{g2.addColorStop(0,t.poison?'#ff88aa':t.glow);g2.addColorStop(1,t.poison?'#880033':t.col);}
        ctx.globalAlpha=t.isSoul?0.82:1;
        ctx.fillStyle=g2;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;ctx.globalAlpha=1;
        if(t.isPowerup)drawPowerupIcon(ctx,t.ptype,r*0.5,t.spin||0);
        else if(t.isSoul)drawSoulIcon(ctx,r*0.5,t.pulse);
        else drawTIcon(ctx,t.name,r*0.48,t.poison);
        // Soul zone arrow
        if(t.isSoul&&dropZones[t.zoneIdx]){
            const z=dropZones[t.zoneIdx];
            const ang=Math.atan2(z.y-t.y,z.x-t.x);
            ctx.save();ctx.globalAlpha=0.55;ctx.strokeStyle=t.col;ctx.lineWidth=2;ctx.lineCap='round';
            ctx.beginPath();ctx.moveTo(Math.cos(ang)*(r+10),Math.sin(ang)*(r+10));ctx.lineTo(Math.cos(ang)*(r+20),Math.sin(ang)*(r+20));ctx.stroke();
            ctx.beginPath();ctx.moveTo(Math.cos(ang)*(r+20)+Math.cos(ang-2.4)*6,Math.sin(ang)*(r+20)+Math.sin(ang-2.4)*6);ctx.lineTo(Math.cos(ang)*(r+20),Math.sin(ang)*(r+20));ctx.lineTo(Math.cos(ang)*(r+20)+Math.cos(ang+2.4)*6,Math.sin(ang)*(r+20)+Math.sin(ang+2.4)*6);ctx.stroke();
            ctx.restore();
        }
        ctx.restore();
    }
}

function drawSoulIcon(cx,sz,pulse){
    cx.save();cx.globalAlpha=0.8;cx.strokeStyle='rgba(255,255,255,0.85)';cx.lineWidth=2;cx.lineCap='round';
    const t2=pulse*0.5;
    cx.beginPath();cx.moveTo(0,-sz);cx.bezierCurveTo(sz*0.8,-sz*0.5,sz*0.8,sz*0.5,-sz*0.2,sz*0.3);cx.bezierCurveTo(-sz*0.8,sz*0.8,-sz,0,0,-sz);cx.stroke();
    cx.restore();
}

function drawPowerupIcon(cx,ptype,sz,spin){
    cx.save();cx.rotate(-spin);
    cx.fillStyle='rgba(255,255,255,0.9)';
    // Star shape
    for(let i=0;i<5;i++){const a=(i*4*Math.PI/5)-Math.PI/2,b=a+Math.PI/5;if(i===0)cx.beginPath();if(i===0)cx.moveTo(Math.cos(a)*sz,Math.sin(a)*sz);else cx.lineTo(Math.cos(a)*sz,Math.sin(a)*sz);cx.lineTo(Math.cos(b)*sz*0.4,Math.sin(b)*sz*0.4);}
    cx.closePath();cx.fill();
    // Letter in center
    cx.fillStyle='rgba(80,40,0,0.85)';cx.font=`bold ${sz*0.7}px Arial`;cx.textAlign='center';cx.textBaseline='middle';
    const icons={slowmo:'❄',double:'×',blast:'💥',heart:'♥'};
    cx.fillText(icons[ptype]||'?',0,1);
    cx.restore();
}

function drawTIcon(cx,name,sz,poison){
    if(poison){
        // Skull icon
        cx.fillStyle='rgba(255,40,80,0.9)';
        cx.beginPath();cx.arc(0,-sz*0.1,sz*0.72,0,Math.PI*2);cx.fill();
        cx.fillRect(-sz*0.35,-sz*0.1,sz*0.7,sz*0.7);
        cx.fillStyle='#1a0008';cx.beginPath();
        cx.arc(-sz*0.24,-sz*0.14,sz*0.22,0,Math.PI*2);cx.arc(sz*0.24,-sz*0.14,sz*0.22,0,Math.PI*2);cx.fill();
        cx.fillStyle='rgba(255,40,80,0.9)';cx.beginPath();
        for(let t=0;t<3;t++){cx.rect(-sz*0.3+t*sz*0.26,sz*0.36,sz*0.18,sz*0.3);}cx.fill();
        return;
    }
    cx.fillStyle='rgba(255,255,255,0.88)';
    cx.beginPath();
    if(name==='mushroom'){cx.arc(0,-sz*0.15,sz*0.75,Math.PI,0);cx.fill();cx.fillRect(-sz*0.22,-sz*0.15,sz*0.44,sz*0.65);}
    else if(name==='crystal'){cx.moveTo(0,-sz);cx.lineTo(sz*0.55,0);cx.lineTo(0,sz);cx.lineTo(-sz*0.55,0);cx.closePath();cx.fill();}
    else if(name==='wisp'){for(let i=0;i<6;i++){const a=i*Math.PI/3,ar=sz*(0.65+Math.sin(i*1.3)*0.3);if(i===0)cx.moveTo(Math.cos(a)*ar,Math.sin(a)*ar);else cx.lineTo(Math.cos(a)*ar,Math.sin(a)*ar);}cx.closePath();cx.fill();}
    else if(name==='cloud'){cx.arc(-sz*0.35,0,sz*0.52,0,Math.PI*2);cx.arc(sz*0.35,0,sz*0.52,0,Math.PI*2);cx.arc(0,-sz*0.18,sz*0.62,0,Math.PI*2);cx.fill();}
    else if(name==='snowflake'){cx.save();cx.strokeStyle='rgba(255,255,255,0.88)';cx.lineWidth=sz*0.18;cx.lineCap='round';for(let i=0;i<6;i++){cx.save();cx.rotate(i*Math.PI/3);cx.beginPath();cx.moveTo(0,0);cx.lineTo(0,-sz);cx.stroke();cx.beginPath();cx.moveTo(sz*0.3,-sz*0.52);cx.lineTo(0,-sz*0.66);cx.lineTo(-sz*0.3,-sz*0.52);cx.stroke();cx.restore();}cx.restore();}
    else if(name==='gem'){cx.moveTo(0,-sz);cx.lineTo(sz*0.5,-sz*0.25);cx.lineTo(sz*0.5,sz*0.5);cx.lineTo(-sz*0.5,sz*0.5);cx.lineTo(-sz*0.5,-sz*0.25);cx.closePath();cx.fill();}
    else if(name==='rune'){cx.save();cx.strokeStyle='rgba(255,255,255,0.88)';cx.lineWidth=sz*0.2;cx.lineCap='round';cx.beginPath();cx.moveTo(-sz*0.5,-sz);cx.lineTo(sz*0.5,-sz);cx.moveTo(0,-sz);cx.lineTo(0,sz);cx.moveTo(-sz*0.5,0);cx.lineTo(sz*0.5,0);cx.stroke();cx.restore();}
    else{for(let i=0;i<5;i++){const a=(i*4*Math.PI/5)-Math.PI/2,b=a+Math.PI/5;if(i===0)cx.moveTo(Math.cos(a)*sz,Math.sin(a)*sz);else cx.lineTo(Math.cos(a)*sz,Math.sin(a)*sz);cx.lineTo(Math.cos(b)*sz*0.42,Math.sin(b)*sz*0.42);}cx.closePath();cx.fill();}
}

// ── CHAIN TARGETS ────────────────────────────────────────────────────────────
const CHAIN_COLS=['#ff8866','#ffcc44','#66aaff'];
function spawnChainGroup(){
    if(level<3)return;
    chainGroup=[];chainExpected=0;
    if(!hintsShown.has('chain')){hintsShown.add('chain');hintText=t('chain_hint');hintLife=3.8;}
    for(let i=0;i<3;i++){
        const mg=160,pad=200;
        chainGroup.push({x:mg+Math.random()*(W-mg*2),y:80+Math.random()*(H-pad-80),
            sz:32,order:i,state:'waiting',scale:0,pulse:0,born:Date.now(),col:CHAIN_COLS[i]});
    }
}
function tickChain(dt){
    if(chainGroup.length===0)return;
    const age=Date.now()-chainGroup[0].born;
    chainGroup.forEach(ct=>{ct.scale=Math.min(1,ct.scale+dt*4);ct.pulse+=dt*3;});
    if(age>8500&&chainGroup.some(ct=>ct.state==='waiting')){
        chainGroup=[];chainExpected=0;combo=0;SFX.miss();
    }
    chainGroup=chainGroup.filter(ct=>ct.state!=='done'||Date.now()-ct.doneAt<400);
}
function drawChain(){
    if(chainGroup.length===0)return;
    // Draw dotted lines connecting them
    const waiting=chainGroup.filter(ct=>ct.state==='waiting');
    for(let i=0;i<waiting.length-1;i++){
        ctx.save();ctx.setLineDash([6,8]);ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(waiting[i].x,waiting[i].y);ctx.lineTo(waiting[i+1].x,waiting[i+1].y);ctx.stroke();ctx.restore();
    }
    for(const ct of chainGroup){
        if(ct.state==='done')continue;
        const r=ct.sz*ct.scale*(1+Math.sin(ct.pulse)*0.05);
        const isNext=ct.order===chainExpected;
        ctx.save();ctx.translate(ct.x,ct.y);
        ctx.shadowBlur=isNext?25:12;ctx.shadowColor=ct.col;
        const g=ctx.createRadialGradient(0,0,0,0,0,r);
        g.addColorStop(0,isNext?ct.col:'rgba(150,150,150,0.5)');g.addColorStop(1,isNext?ct.col+'88':'rgba(80,80,80,0.3)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
        if(isNext){ctx.strokeStyle=ct.col;ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(0,0,r+5,0,Math.PI*2);ctx.stroke();}
        ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,0.95)';ctx.font=`bold ${r*0.85}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(ct.order+1,0,1);
        ctx.restore();
    }
}

// ── CAPTURE MECHANIC ──────────────────────────────────────────────────────────
function drawCapturedSoul(){
    if(!captureHeld)return;
    const now=Date.now()/1000;
    const pulse=Math.sin(now*5)*0.12;
    // Trail
    ctx.save();
    for(let i=0;i<capTrail.length;i++){
        const pt=capTrail[i];
        ctx.globalAlpha=pt.l*0.4;ctx.fillStyle=captureHeld.col;
        ctx.beginPath();ctx.arc(pt.x,pt.y,captureHeld.sz*0.5*(i/capTrail.length),0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
    // Soul at cursor
    ctx.save();ctx.translate(capX,capY);
    ctx.shadowBlur=28+pulse*10;ctx.shadowColor=captureHeld.glow;
    const g=ctx.createRadialGradient(0,0,0,0,0,captureHeld.sz);
    g.addColorStop(0,captureHeld.glow+'cc');g.addColorStop(1,captureHeld.col+'88');
    ctx.globalAlpha=0.9;ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,captureHeld.sz*(1+pulse),0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.45+pulse*0.2;ctx.strokeStyle=captureHeld.col;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,captureHeld.sz*1.6,0,Math.PI*2);ctx.stroke();
    drawSoulIcon(ctx,captureHeld.sz*0.5,now*3);
    ctx.restore();
    // Dashed line to zone
    const z=dropZones[captureHeld.zoneIdx];
    if(z){
        ctx.save();ctx.globalAlpha=0.4;ctx.strokeStyle=captureHeld.col;ctx.lineWidth=1.5;ctx.setLineDash([6,9]);
        ctx.beginPath();ctx.moveTo(capX,capY);ctx.lineTo(z.x,z.y);ctx.stroke();
        ctx.restore();
    }
}

// ── PROJECTILES ───────────────────────────────────────────────────────────────
const PTYPE=[
    {name:'acorn',    col:'#c4891e',trailCol:'#e8c060',sz:18,dmg:1},
    {name:'iceshard', col:'#88ccff',trailCol:'#ccf0ff',sz:19,dmg:1},
    {name:'slimeball',col:'#66dd22',trailCol:'#aaff55',sz:20,dmg:1},
    {name:'lightning',col:'#ffe000',trailCol:'#ffff88',sz:17,dmg:2},
    {name:'iceblast', col:'#aaddff',trailCol:'#eef8ff',sz:21,dmg:2},
    {name:'lavaball', col:'#ff4400',trailCol:'#ff8844',sz:22,dmg:2},
    {name:'firearrow',col:'#ff8800',trailCol:'#ffcc44',sz:16,dmg:2},
    {name:'orb',      col:'#dd44ff',trailCol:'#ff88ff',sz:24,dmg:3},
];
const SLOTS=[W/2-130,W/2,W/2+130],SLOT_Y=H-62;
function initSlots(){projectiles=[];for(let i=0;i<3;i++)addSlot(i);}
function addSlot(idx){const pt=PTYPE[Math.min(level,PTYPE.length-1)];projectiles.push({x:SLOTS[idx],y:SLOT_Y,col:pt.col,trailCol:pt.trailCol,sz:pt.sz,dmg:pt.dmg,name:pt.name,scale:0,slot:idx});}
function refillSlots(){for(let i=0;i<3;i++){if(!projectiles.find(p=>p.slot===i))addSlot(i);}}
function tickProjectiles(dt){
    projectiles.forEach(p=>{p.scale=Math.min(1,p.scale+dt*5);});
    flying=flying.filter(fp=>{
        fp.x+=fp.vx*dt;fp.y+=fp.vy*dt;fp.vy+=580*dt;
        fp.pts.push({x:fp.x,y:fp.y,l:1});
        if(fp.pts.length>18)fp.pts.shift();
        fp.pts.forEach(p=>p.l-=dt*4);
        return fp.x>-60&&fp.x<W+60&&fp.y<H+60&&fp.y>-120;
    });
}
function drawProjectiles(){
    // Launch platform bar
    ctx.save();
    const pg2=ctx.createLinearGradient(0,SLOT_Y-40,0,H);
    pg2.addColorStop(0,'rgba(30,20,60,0)');pg2.addColorStop(1,'rgba(20,10,50,0.7)');
    ctx.fillStyle=pg2;ctx.fillRect(0,SLOT_Y-40,W,H-(SLOT_Y-40));
    ctx.restore();
    // Slot rings
    const now2=Date.now()/1000;
    for(const sx of SLOTS){
        ctx.save();
        ctx.shadowBlur=14;ctx.shadowColor='rgba(180,140,255,0.8)';
        ctx.globalAlpha=0.55+Math.sin(now2*2+sx)*0.15;
        ctx.strokeStyle='rgba(200,170,255,0.85)';ctx.lineWidth=2.5;
        ctx.setLineDash([5,4]);ctx.beginPath();ctx.arc(sx,SLOT_Y,30,0,Math.PI*2);ctx.stroke();
        ctx.setLineDash([]);ctx.restore();
    }
    // "DRAG ↑" labels above slots
    ctx.save();ctx.textAlign='center';ctx.font='bold 12px Arial';ctx.fillStyle='rgba(200,170,255,0.65)';
    for(const sx of SLOTS){ctx.fillText('▲ DRAG',sx,SLOT_Y-40);}
    ctx.restore();
    for(const p of projectiles){
        if(drag&&drag===p)continue;
        ctx.save();ctx.translate(p.x,p.y);ctx.scale(p.scale,p.scale);
        ctx.shadowBlur=14;ctx.shadowColor=p.col;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(0,0,p.sz,0,Math.PI*2);ctx.fill();
        drawPIcon(ctx,p.name,p.sz*0.5);ctx.restore();
    }
    for(const fp of flying){
        for(let i=0;i<fp.pts.length;i++){const pt=fp.pts[i];ctx.save();ctx.globalAlpha=Math.max(0,pt.l)*0.55;ctx.fillStyle=fp.trailCol;ctx.beginPath();ctx.arc(pt.x,pt.y,fp.sz*0.35*(i/fp.pts.length),0,Math.PI*2);ctx.fill();ctx.restore();}
        ctx.save();ctx.translate(fp.x,fp.y);ctx.shadowBlur=20;ctx.shadowColor=fp.col;ctx.fillStyle=fp.col;ctx.beginPath();ctx.arc(0,0,fp.sz,0,Math.PI*2);ctx.fill();ctx.restore();
    }
}
function drawPIcon(cx,name,sz){
    cx.fillStyle='rgba(255,255,255,0.75)';
    if(name==='acorn'){cx.beginPath();cx.arc(0,-sz*0.2,sz*0.72,Math.PI,0);cx.fill();cx.fillRect(-sz*0.18,-sz*0.2,sz*0.36,sz*0.75);}
    else if(name==='iceshard'||name==='firearrow'){cx.beginPath();cx.moveTo(0,-sz);cx.lineTo(sz*0.4,sz*0.3);cx.lineTo(0,sz*0.6);cx.lineTo(-sz*0.4,sz*0.3);cx.closePath();cx.fill();}
    else if(name==='lightning'){cx.beginPath();cx.moveTo(sz*0.2,-sz);cx.lineTo(-sz*0.3,sz*0.1);cx.lineTo(sz*0.1,sz*0.1);cx.lineTo(-sz*0.2,sz);cx.lineTo(sz*0.3,-sz*0.1);cx.lineTo(-sz*0.1,-sz*0.1);cx.closePath();cx.fill();}
    else{cx.beginPath();cx.arc(0,0,sz*0.7,0,Math.PI*2);cx.fill();cx.fillStyle='rgba(255,255,255,0.38)';cx.beginPath();cx.arc(-sz*0.2,-sz*0.2,sz*0.3,0,Math.PI*2);cx.fill();}
}
function drawTrajectory(){
    if(!drag)return;
    const dx=dragAt.x-dragFrom.x,dy=dragAt.y-dragFrom.y;
    if(Math.abs(dx)<8&&Math.abs(dy)<8){drawHeld();return;}
    let vx=dx*1.15,vy=dy*1.15;const dt2=0.045;let px=drag.x,py=drag.y;
    ctx.save();ctx.setLineDash([7,6]);ctx.strokeStyle='rgba(255,255,200,0.65)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(px,py);
    for(let i=0;i<35;i++){px+=vx*dt2;py+=vy*dt2;vy+=580*dt2;ctx.lineTo(px,py);if(py>H||px<0||px>W)break;}
    ctx.stroke();
    ctx.setLineDash([]);const ang=Math.atan2(vy,vx);
    ctx.strokeStyle='rgba(255,255,100,0.9)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(px-Math.cos(ang-0.38)*13,py-Math.sin(ang-0.38)*13);ctx.lineTo(px,py);ctx.lineTo(px-Math.cos(ang+0.38)*13,py-Math.sin(ang+0.38)*13);ctx.stroke();
    ctx.restore();drawHeld();
}
function drawHeld(){
    if(!drag)return;
    ctx.save();ctx.translate(dragAt.x,dragAt.y);ctx.shadowBlur=22;ctx.shadowColor=drag.col;ctx.fillStyle=drag.col;ctx.beginPath();ctx.arc(0,0,drag.sz*1.25,0,Math.PI*2);ctx.fill();drawPIcon(ctx,drag.name,drag.sz*0.6);ctx.restore();
}

function spawnEnemy(forced=null){
    const et=ETYPE[forced!==null?forced:Math.min(level,ETYPE.length-1)];
    const y=et.ymin+Math.random()*(et.ymax-et.ymin);const fromL=Math.random()>0.5;
    enemies.push({x:fromL?-70:W+70,y,col:et.col,sz:et.sz,hp:et.hp,maxHp:et.hp,spd:et.spd*(fromL?1:-1),pts:et.pts,flash:0,wave:Math.random()*Math.PI*2,scale:0});
}
function spawnBoss(){
    if(bossSummoned)return;bossSummoned=true;SFX.boss();burst(W/2,H/2,'#ff44ff',30,200,14);
    bossEntity={x:W/2,y:H*0.25,col:'#ff00aa',sz:75,hp:18+level*4,maxHp:18+level*4,spd:0,pts:1000+level*300,flash:0,wave:0,scale:0,boss:true,vx:55+level*18};
    enemies.push(bossEntity);
}
function tickEnemies(dt){
    const spdMult=slowMoTimer>0?0.38:1;
    enemies=enemies.filter(e=>{
        e.scale=Math.min(1,e.scale+dt*2.5);e.wave+=dt*2.2;e.flash=Math.max(0,e.flash-dt*6);
        if(e.boss){e.x+=e.vx*dt*spdMult;e.y=H*0.25+Math.sin(e.wave)*38;if(e.x>W-e.sz||e.x<e.sz)e.vx*=-1;}
        else{e.x+=e.spd*dt*spdMult;e.y+=Math.sin(e.wave*1.2)*0.8;}
        if(!e.boss&&((e.spd>0&&e.x>W+110)||(e.spd<0&&e.x<-110))){lives--;SFX.miss();burst(e.spd>0?W-30:30,e.y,'#ff4444',14,140,10);if(lives<=0)endGame();return false;}
        return true;
    });
    flying=flying.filter(fp=>{
        for(let i=enemies.length-1;i>=0;i--){
            const e=enemies[i];
            if(Math.hypot(fp.x-e.x,fp.y-e.y)<fp.sz+e.sz){
                e.hp-=fp.dmg;e.flash=1;burst(fp.x,fp.y,fp.col,10,110,7);SFX.hit();
                if(e.hp<=0){
                    const pts=Math.floor(e.pts*(doubleTimer>0?2:1)*(1+combo*0.08));
                    score+=pts;combo++;maxCombo=Math.max(maxCombo,combo);
                    burst(e.x,e.y,e.col,22,160,12);SFX.kill();popup(e.x,e.y-e.sz,`+${pts}`,'#ffff44');
                    if(e.boss){bossSummoned=false;bossEntity=null;}enemies.splice(i,1);
                }
                return false;
            }
        }
        return true;
    });
}
function drawEnemies(){
    for(const e of enemies){
        ctx.save();ctx.translate(e.x,e.y+Math.sin(e.wave)*7);ctx.scale(e.scale,e.scale);
        ctx.shadowBlur=e.boss?30:14;ctx.shadowColor=e.col;ctx.fillStyle=e.flash>0?'#ffffff':e.col;
        ctx.beginPath();ctx.arc(0,0,e.sz,0,Math.PI*2);ctx.fill();
        // Angry brows
        ctx.shadowBlur=0;ctx.strokeStyle='#000';ctx.lineWidth=e.sz*0.09;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(-e.sz*0.48,-e.sz*0.36);ctx.lineTo(-e.sz*0.14,-e.sz*0.28);ctx.stroke();
        ctx.beginPath();ctx.moveTo(e.sz*0.14,-e.sz*0.28);ctx.lineTo(e.sz*0.48,-e.sz*0.36);ctx.stroke();
        // Red angry eyes
        ctx.fillStyle='#ff2200';ctx.beginPath();ctx.arc(-e.sz*0.28,-e.sz*0.18,e.sz*0.14,0,Math.PI*2);ctx.arc(e.sz*0.28,-e.sz*0.18,e.sz*0.14,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-e.sz*0.24,-e.sz*0.2,e.sz*0.055,0,Math.PI*2);ctx.arc(e.sz*0.32,-e.sz*0.2,e.sz*0.055,0,Math.PI*2);ctx.fill();
        // Frown
        ctx.strokeStyle='#000';ctx.lineWidth=e.sz*0.09;ctx.beginPath();ctx.arc(0,e.sz*0.35,e.sz*0.32,Math.PI,0,true);ctx.stroke();
        if(e.boss){ctx.strokeStyle='rgba(255,100,255,0.5)';ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,0,e.sz+9,0,Math.PI*2);ctx.stroke();}
        if(e.maxHp>1){const bw=e.sz*2.3;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(-e.sz*1.15,-e.sz-15,bw,7);ctx.fillStyle=e.boss?`hsl(${280+e.hp/e.maxHp*60},100%,60%)`:'#44ff66';ctx.fillRect(-e.sz*1.15,-e.sz-15,bw*(e.hp/e.maxHp),7);}
        ctx.restore();
    }
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
function cPos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)};}
function inBtn(p,b){return b&&p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h;}

canvas.addEventListener('mousedown',e=>{
    initAudio();const p=cPos(e);
    if(state===S.MENU){if(inBtn(p,MENU_LANG)){lang=lang==='en'?'fr':'en';return;}if(inBtn(p,menuBtn)){startGame();return;}return;}
    if(state===S.GAMEOVER){if(inBtn(p,overBtn))resetGame();return;}
    if(state===S.VICTORY){if(inBtn(p,winBtn))resetGame();return;}
    if(state===S.TUTORIAL){tutStep++;if(tutStep>=5)state=S.PLAY;return;}
    if(state!==S.PLAY)return;
    if(inBtn(p,LANG_BTN)){lang=lang==='en'?'fr':'en';return;}
    // 1) Soul target (capture mechanic)
    if(!captureHeld){
        for(let i=targets.length-1;i>=0;i--){
            const tg=targets[i];
            if(tg.isSoul&&Math.hypot(p.x-tg.x,p.y-tg.y)<tg.sz*tg.scale){
                captureHeld=tg;capX=p.x;capY=p.y;capTrail=[];
                targets.splice(i,1);SFX.capture();return;
            }
        }
    }
    if(captureHeld)return; // while holding soul, nothing else
    // 2) Projectile grab
    for(const p2 of projectiles){
        if(Math.hypot(p.x-p2.x,p.y-p2.y)<p2.sz+32){drag=p2;dragFrom={x:p.x,y:p.y};dragAt={x:p.x,y:p.y};SFX.fling();return;}
    }
    // 3) Chain targets
    if(chainGroup.length>0){
        for(let i=0;i<chainGroup.length;i++){
            const ct=chainGroup[i];if(ct.state!=='waiting')continue;
            if(Math.hypot(p.x-ct.x,p.y-ct.y)<ct.sz*ct.scale){
                if(ct.order===chainExpected){
                    ct.state='done';ct.doneAt=Date.now();chainExpected++;
                    const pts=Math.floor([150,250,400][ct.order]*(doubleTimer>0?2:1)*(1+combo*0.1));
                    score+=pts;combo++;maxCombo=Math.max(maxCombo,combo);
                    burst(ct.x,ct.y,ct.col,12,120,8);SFX.chainOk();popup(ct.x,ct.y-ct.sz,`+${pts}`,'#ffee44');
                    if(chainExpected>=3){setTimeout(()=>{chainGroup=[];chainExpected=0;},400);}
                } else {
                    chainGroup.forEach(c=>{if(c.state==='waiting'){burst(c.x,c.y,'#ff4444',6,70,5);}c.state='failed';});
                    combo=0;SFX.chainFail();popup(ct.x,ct.y-ct.sz,t('wrong_order'),'#ff4444');
                    setTimeout(()=>{chainGroup=[];chainExpected=0;},500);
                }
                return;
            }
        }
    }
    // 4) Regular targets & powerups
    for(let i=targets.length-1;i>=0;i--){
        const tg=targets[i];
        if(Math.hypot(p.x-tg.x,p.y-tg.y)<tg.sz*tg.scale){
            if(tg.isPowerup){
                activatePowerup(tg.ptype,tg.x,tg.y);targets.splice(i,1);return;
            }
            if(tg.poison){combo=0;lives=Math.max(0,lives-1);burst(tg.x,tg.y,'#ff0055',14,110,9);SFX.poison();popup(tg.x,tg.y-tg.sz,t('poison'),'#ff4488');if(lives<=0)endGame();}
            else{const pts=Math.floor(tg.pts*(doubleTimer>0?2:1)*(1+combo*0.1));score+=pts;combo++;maxCombo=Math.max(maxCombo,combo);burst(tg.x,tg.y,tg.glow,14,110,8);SFX.click();popup(tg.x,tg.y-tg.sz,`+${pts}`,'#ffff44');}
            targets.splice(i,1);break;
        }
    }
});

canvas.addEventListener('mousemove',e=>{
    const p=cPos(e);
    if(captureHeld){
        capTrail.push({x:capX,y:capY,l:1});
        if(capTrail.length>12)capTrail.shift();
        capTrail.forEach(pt=>pt.l-=0.06);
        capX=p.x;capY=p.y;
    }
    if(drag)dragAt=p;
});

function handleMouseUp(e){
    if(state!==S.PLAY&&state!==S.TUTORIAL)return;
    if(captureHeld){
        const p=cPos(e);let deposited=false;
        for(const z of dropZones){
            if(captureHeld.zoneIdx===z.idx&&Math.hypot(p.x-z.x,p.y-z.y)<z.r+22){
                deposited=true;
                const pts=Math.floor(captureHeld.pts*(doubleTimer>0?2:1)*(1+combo*0.1));
                score+=pts;combo++;maxCombo=Math.max(maxCombo,combo);
                burst(z.x,z.y,z.col,22,160,12);SFX.deposit();
                popup(z.x,z.y-z.r,`+${pts}`,'#88ffaa');break;
            }
        }
        if(!deposited){combo=0;burst(p.x,p.y,'#ff4444',8,80,6);SFX.miss();}
        captureHeld=null;capTrail=[];return;
    }
    if(!drag)return;
    const p=cPos(e);const dx=p.x-dragFrom.x,dy=p.y-dragFrom.y,dist=Math.hypot(dx,dy);
    if(dist>28){
        const spd=Math.min(dist*1.15,1250);
        flying.push({x:drag.x,y:drag.y,vx:(dx/dist)*spd,vy:(dy/dist)*spd,col:drag.col,trailCol:drag.trailCol,sz:drag.sz,dmg:drag.dmg,pts:[]});
        const si=drag.slot;projectiles=projectiles.filter(pp=>pp!==drag);
        setTimeout(()=>{if(state===S.PLAY&&!projectiles.find(pp=>pp.slot===si))addSlot(si);},1500);
        SFX.fling();
    }
    drag=null;
}
canvas.addEventListener('mouseup',handleMouseUp);
window.addEventListener('mouseup',e=>{if(drag||captureHeld)handleMouseUp(e);});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

// ── POWER-UPS ─────────────────────────────────────────────────────────────────
function activatePowerup(ptype,x,y){
    SFX.powerupGet();
    if(ptype==='slowmo'){slowMoTimer=5;SFX.slowmoSfx();popup(x,y-40,t('slowmo'),'#44aaff');}
    else if(ptype==='double'){doubleTimer=6;popup(x,y-40,t('doublex'),'#ffcc00');}
    else if(ptype==='blast'){
        SFX.blastSfx();
        enemies.forEach(e=>{
            const pts=Math.floor(e.pts*0.5*(doubleTimer>0?2:1));score+=pts;
            burst(e.x,e.y,e.col,18,150,11);popup(e.x,e.y-e.sz,`+${pts}`,'#ff8844');
        });
        enemies=[];bossSummoned=false;bossEntity=null;
        popup(x,y-40,t('blast'),'#ff8844');
    }
    else if(ptype==='heart'){
        lives=Math.min(3,lives+1);
        popup(x,y-40,t('heart_up'),'#ff4488');
        burst(x,y,'#ff4488',15,120,10);
    }
}

// ── GAME FLOW ─────────────────────────────────────────────────────────────────
function spawnRate(){return Math.max(0.48,2.6-level*0.24-lvlTimer*0.013);}
function enemyRate(){return Math.max(2.2,7.2-level*0.92);}
function maxTgts(){return 4+level*2;}

function startGame(){
    level=0;score=0;combo=0;maxCombo=0;lives=3;timeLeft=LEVEL_DUR[0];totalScore=0;
    targets=[];enemies=[];flying=[];particles=[];floats=[];
    tgtTimer=0;enmTimer=0;lvlTimer=0;bossSummoned=false;bossEntity=null;
    tutStep=0;drag=null;captureHeld=null;capTrail=[];
    chainGroup=[];chainExpected=0;chainTimer=0;
    slowMoTimer=0;doubleTimer=0;powerupSpawnTimer=0;
    hintText='';hintLife=0;hintsShown.clear();
    initSlots();initDropZones();startMusic(0);startAmbient(0);state=S.TUTORIAL;
}

function endGame(){stopMusic();stopAmbient();SFX.die();for(let i=0;i<5;i++)setTimeout(()=>burst(W*Math.random(),H*Math.random(),'#ff4455',18,170,12),i*220);state=S.GAMEOVER;}

function levelDone(){
    totalScore+=score;stopMusic();stopAmbient();SFX.up();
    if(level>=7){state=S.VICTORY;celebrate();return;}
    transMsg=`${tw(level)} — ${t('done')}`;
    transSubMsg=`${t('sc')} ${Math.floor(score)} / ${LEVEL_GOALS[level]}`;
    transTimer=0;state=S.TRANS;
    setTimeout(()=>{
        level++;score=0;combo=0;targets=[];enemies=[];flying=[];particles=[];floats=[];
        tgtTimer=0;enmTimer=0;lvlTimer=0;timeLeft=LEVEL_DUR[level];
        bossSummoned=false;bossEntity=null;drag=null;captureHeld=null;capTrail=[];
        chainGroup=[];chainExpected=0;chainTimer=0;slowMoTimer=0;doubleTimer=0;powerupSpawnTimer=0;
        initSlots();initDropZones();startMusic(level);startAmbient(level);state=S.PLAY;
    },3800);
}

function celebrate(){const cols=['#ff4444','#44ff44','#4488ff','#ffff44','#ff44ff','#44ffff'];for(let i=0;i<14;i++)setTimeout(()=>burst(120+Math.random()*(W-240),100+Math.random()*(H*0.55),cols[i%cols.length],28,210,11),i*250);SFX.win();}
function resetGame(){particles=[];floats=[];stopMusic();stopAmbient();score=0;totalScore=0;combo=0;maxCombo=0;captureHeld=null;state=S.MENU;}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
let lastT=0;
function update(dt){
    if(state===S.PLAY){
        timeLeft-=dt;lvlTimer+=dt;
        if(slowMoTimer>0)slowMoTimer-=dt;
        if(doubleTimer>0)doubleTimer-=dt;
        if(hintLife>0)hintLife-=dt;
        if(timeLeft<=0){timeLeft=0;if(score>=LEVEL_GOALS[level])levelDone();else endGame();return;}
        if(score>=LEVEL_GOALS[level]&&lvlTimer>4){levelDone();return;}
        // Targets
        tgtTimer-=dt;if(tgtTimer<=0){if(targets.length<maxTgts())spawnTarget();tgtTimer=spawnRate();}
        // Enemies
        enmTimer-=dt;if(enmTimer<=0){spawnEnemy();enmTimer=enemyRate();}
        // Boss
        if(level>=5&&lvlTimer>LEVEL_DUR[level]*0.5&&!bossSummoned)spawnBoss();
        // Chain targets (level 3+)
        if(level>=3&&chainGroup.length===0){
            chainTimer+=dt;
            if(chainTimer>18+Math.random()*4){chainTimer=0;spawnChainGroup();}
        }
        // Power-ups
        powerupSpawnTimer+=dt;
        if(powerupSpawnTimer>25+Math.random()*10){powerupSpawnTimer=0;spawnPowerup();}
        refillSlots();
        tickTargets(dt);tickChain(dt);tickProjectiles(dt);tickEnemies(dt);tickParticles(dt);tickFloats(dt);
    } else if(state===S.TRANS){transTimer+=dt;tickParticles(dt);}
    else if(state===S.GAMEOVER||state===S.VICTORY){tickParticles(dt);tickFloats(dt);}
}

function render(){
    ctx.clearRect(0,0,W,H);
    if(state===S.MENU)drawMenu();
    else if(state===S.GAMEOVER){drawBG(level);drawParticles();drawGameOver();}
    else if(state===S.VICTORY){drawBG(7);drawParticles();drawVictory();}
    else if(state===S.TRANS){drawTransition();drawParticles();}
    else{
        drawBG(level);
        drawDropZones();
        drawEnemies();drawTargets();drawChain();
        drawProjectiles();drawTrajectory();
        drawCapturedSoul();
        drawParticles();drawFloats();
        drawHUD();drawHint();
        if(state===S.TUTORIAL)drawTutorial();
    }
}

function loop(ts){const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;update(dt);render();requestAnimationFrame(loop);}
requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
</script>
