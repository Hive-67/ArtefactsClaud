<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMS Consulting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&family=Share+Tech+Mono&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== SEED_APP ===== */
:root{--font-h:'Syne',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--tx);font-size:15px;overflow:hidden;position:relative}
input,select,textarea,button{font-family:inherit;font-size:16px}

/* ===== THEMES ===== */
.theme-hiveos{--bg:#111;--bg2:#1c1c1c;--bg3:#262626;--bg4:#303030;--brd:#7d206f33;--tx:#f5f5f5;--tx2:#b8a7b5;--ac:#b01678;--ok:#50fa7b;--warn:#ffb86c;--danger:#ff5555;--font-h:'Syne',sans-serif}
.theme-hiveos.day{--bg:#fef9f4;--bg2:#f5eaf0;--bg3:#ecdae6;--bg4:#e0c8d8;--brd:rgba(125,32,111,0.12);--tx:#180812;--tx2:#5f4057;--ac:#9a145f;--ok:#197a00;--warn:#8a6000;--danger:#cc0022}
.theme-hiveos #header,.theme-hiveos.day #header{background:linear-gradient(135deg,#7d206f,#b01678,#c21758,#da1d33,#eb1925)}
.theme-hiveos.day #app-bg{background:radial-gradient(ellipse 75% 75% at -5% -5%,rgba(125,32,111,0.22) 0%,transparent 60%),radial-gradient(ellipse 75% 75% at 105% 105%,rgba(220,30,50,0.18) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 105% -5%,rgba(176,22,120,0.12) 0%,transparent 55%),radial-gradient(ellipse 50% 50% at -5% 105%,rgba(192,23,88,0.10) 0%,transparent 55%),#fef9f4}

.theme-bleu{--bg:#06080f;--bg2:#0b0e1c;--bg3:#141828;--bg4:#1e2438;--brd:#2a306040;--tx:#e8eaf8;--tx2:#8890c8;--ac:#4f8ef7;--ok:#50fa7b;--warn:#ffb86c;--danger:#ff5555;--font-h:'Syne',sans-serif}
.theme-bleu.day{--bg:#f4f6ff;--bg2:#eaedff;--bg3:#d8deff;--bg4:#c4ccff;--brd:#8896e840;--tx:#070b24;--tx2:#3040a0;--ac:#1a4fc4;--ok:#197a00;--warn:#8a6000;--danger:#cc0022}

.theme-dracula{--bg:#282a36;--bg2:#21222c;--bg3:#44475a;--bg4:#6272a4;--brd:#44475a;--tx:#f8f8f2;--tx2:#b8bdd9;--ac:#ff79c6;--ok:#50fa7b;--warn:#ffb86c;--danger:#ff5555;--font-h:'Syne',sans-serif}
.theme-dracula.day{--bg:#fff5fb;--bg2:#f4e8f2;--bg3:#e8d7e6;--bg4:#d7c1d2;--brd:#b58aa8;--tx:#21121d;--tx2:#65485c;--ac:#9a0060;--ok:#197a00;--warn:#8a6000;--danger:#cc0022}

.theme-spectre{--bg:#090c0b;--bg2:#0f1412;--bg3:#161e1b;--bg4:#1e2a26;--brd:#2dd4a022;--tx:#bcccc8;--tx2:#6a9488;--ac:#2dd4a0;--ok:#2dd4a0;--warn:#ffb86c;--danger:#ff5555;--font-h:'Syne',sans-serif}
.theme-spectre.day{--bg:#f0f7f4;--bg2:#e0ede8;--bg3:#cce0d8;--bg4:#b5d0c6;--brd:#1a8c6a30;--tx:#071410;--tx2:#255040;--ac:#1a8c6a;--ok:#1a8c6a;--warn:#8a6000;--danger:#cc0022}
.theme-spectre body::before,.theme-spectre #main::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(45,212,160,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(45,212,160,.04) 1px,transparent 1px);background-size:40px 40px}
.theme-spectre.day body::before{background-image:linear-gradient(rgba(26,140,106,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(26,140,106,.06) 1px,transparent 1px)}

.theme-win95{--bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;--bg4:#383838;--brd:#707070;--brd-light:#909090;--brd-dark:#111;--tx:#e8e8e8;--tx2:#a0a0a0;--ac:#5a8fd6;--ok:#00aa00;--warn:#aa8800;--danger:#cc0000;--font-h:'Courier New',monospace;--title-from:#1a3a8a;--title-to:#2a5ab8}
.theme-win95.day{--bg:#c8c4bc;--bg2:#d4d0c8;--bg3:#dedad2;--bg4:#e8e4dc;--brd:#808080;--brd-light:#fff;--brd-dark:#404040;--tx:#000;--tx2:#444;--ac:#000080;--ok:#006600;--warn:#886600;--danger:#990000;--title-from:#000080;--title-to:#1084d0}

.theme-win-vintage{--bg:#1c1c1c;--bg2:#2a2a2a;--bg3:#333;--bg4:#404040;--brd:#606060;--brd-light:#606060;--brd-dark:#111;--tx:#e8e8e8;--tx2:#a0a0a0;--ac:#4a7cc4;--ok:#00aa00;--warn:#aa8800;--danger:#cc0000;--font-h:'Courier New',monospace;--title-from:#1a3a8a;--title-to:#4a8ad4}
.theme-win-vintage.day{--bg:#c8c4bc;--bg2:#d4d0c8;--bg3:#dedad2;--bg4:#e8e4dc;--brd:#808080;--brd-light:#e8e8e8;--brd-dark:#606060;--tx:#000;--tx2:#444;--ac:#2a5ab8;--ok:#006600;--warn:#886600;--danger:#990000;--title-from:#000080;--title-to:#4a8ad4}

.theme-terminal{--bg:#000;--bg2:#0a0a0a;--bg3:#111;--bg4:#1a1a1a;--brd:#2a2a2a;--tx:#d4d4d4;--tx2:#6a6a6a;--ac:#e0e0e0;--ok:#00ff88;--warn:#ffcc00;--danger:#ff3300;--font-h:'Courier New',monospace}
.theme-terminal.day{--bg:#fff;--bg2:#fafafa;--bg3:#f0f0f0;--bg4:#e8e8e8;--brd:#d0d0d0;--tx:#1a1a1a;--tx2:#666;--ac:#000;--ok:#006b38;--warn:#8a6000;--danger:#cc0022}

.theme-vt100{--bg:#050f05;--bg2:#071007;--bg3:#0a1a0a;--bg4:#0d200d;--brd:#1a4a1a;--tx:#33ff33;--tx2:#1a8c1a;--ac:#33ff33;--ok:#00ff88;--warn:#ffcc00;--danger:#ff3300;--font-h:'Share Tech Mono','Courier New',monospace}
.theme-vt100.day{--bg:#f0fff0;--bg2:#e0f7e0;--bg3:#c8ecc8;--bg4:#b0ddb0;--brd:#1a8c1a40;--tx:#0a240a;--tx2:#1a6a1a;--ac:#0a6a0a;--ok:#006b38;--warn:#8a6000;--danger:#cc0022}

.theme-ibmpc{--bg:#0a0700;--bg2:#100e00;--bg3:#181200;--bg4:#201800;--brd:#3a2a00;--tx:#ffb000;--tx2:#a07000;--ac:#ffb000;--ok:#00ff88;--warn:#ffcc00;--danger:#ff3300;--font-h:'Share Tech Mono','Courier New',monospace}
.theme-ibmpc.day{--bg:#fffaf0;--bg2:#f8f0d8;--bg3:#ece0b8;--bg4:#ddd098;--brd:#a07000;--tx:#1a1200;--tx2:#6a4a00;--ac:#6a4a00;--ok:#006b38;--warn:#8a6000;--danger:#cc0022}

.theme-bunker{--bg:#08080a;--bg2:#10100e;--bg3:#181610;--bg4:#201e14;--brd:#c9a84c30;--tx:#f0ead4;--tx2:#9a8860;--ac:#c9a84c;--ok:#3cbe6e;--warn:#e07b39;--danger:#e04444;--font-h:'Syne',sans-serif}
.theme-bunker.day{--bg:#faf8f0;--bg2:#f0ead4;--bg3:#e4d8b4;--bg4:#d4c490;--brd:#c9a84c40;--tx:#1a1408;--tx2:#6a5a30;--ac:#8a6a1a;--ok:#1e6e3e;--warn:#884400;--danger:#aa2020}

/* Scanlines */
.theme-vt100:not(.day)::after,.theme-ibmpc:not(.day)::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.15) 0px,rgba(0,0,0,0.15) 2px,transparent 2px,transparent 4px)}
.theme-vt100:not(.day) *,.theme-ibmpc:not(.day) *{text-shadow:0 0 8px currentColor}

/* Win95 bevel */
.theme-win95 .card,.theme-win95 .modal-box,.theme-win95 .btn,.theme-win-vintage .card,.theme-win-vintage .modal-box,.theme-win-vintage .btn{border-radius:0;border-style:solid;border-width:2px;border-color:var(--brd-light) var(--brd-dark) var(--brd-dark) var(--brd-light)}
.theme-win95 input,.theme-win95 select,.theme-win95 textarea,.theme-win-vintage input,.theme-win-vintage select,.theme-win-vintage textarea{border-radius:0;border-style:solid;border-width:2px;border-color:var(--brd-dark) var(--brd-light) var(--brd-light) var(--brd-dark)}

/* ===== STRUCTURE ===== */
.hive-stripe{height:3px;background:linear-gradient(90deg,#7d206f,#b01678,#c21758,#da1d33,#eb1925);position:relative;z-index:10}
#app-bg{position:fixed;inset:0;z-index:-1;background:var(--bg)}
#header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:54px;background:var(--bg2);border-bottom:1px solid var(--brd);position:relative;z-index:10}
.hdr-left{display:flex;align-items:center;gap:12px;min-width:0}
.hdr-logo{cursor:pointer;font-size:24px;line-height:1;user-select:none;transition:transform .2s}
.hdr-logo:hover{transform:scale(1.15) rotate(-8deg)}
.hdr-sep{opacity:.4}
.hdr-app-name{font-family:var(--font-h);font-weight:800;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.theme-hiveos #header *,.theme-hiveos.day #header *{color:#fff}
.theme-hiveos .hdr-app-ver,.theme-hiveos.day .hdr-app-ver{color:rgba(255,255,255,.8)}
.hdr-app-ver{font-size:12px;opacity:.7;font-weight:600}
.hdr-right{display:flex;align-items:center;gap:4px}
.hdr-btn{background:transparent;border:none;cursor:pointer;font-size:19px;width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--tx);transition:background .15s}
.hdr-btn:hover{background:rgba(128,128,128,.2)}
.theme-hiveos .hdr-btn:hover,.theme-hiveos.day .hdr-btn:hover{background:rgba(255,255,255,.18)}

#app{display:flex;height:calc(100vh - 57px);position:relative}
#sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--brd);padding:14px 10px;display:flex;flex-direction:column;gap:4px;flex-shrink:0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:9px;cursor:pointer;color:var(--tx2);font-weight:600;font-size:14.5px;transition:all .15s;user-select:none;border:1px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--tx)}
.nav-item.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.theme-win95 .nav-item,.theme-win-vintage .nav-item{border-radius:0}
.nav-ico{font-size:17px;width:22px;text-align:center}
.nav-spacer{flex:1}
.nav-foot{font-size:11px;color:var(--tx2);padding:8px 13px;opacity:.6}

#main{flex:1;overflow-y:auto;padding:24px;position:relative}
.view{display:none;animation:fade .25s}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

h1.view-title{font-family:var(--font-h);font-size:26px;font-weight:800;margin-bottom:4px}
.view-sub{color:var(--tx2);font-size:14px;margin-bottom:22px}

.card{background:var(--bg2);border:1px solid var(--brd);border-radius:13px;padding:16px}
.grid{display:grid;gap:14px}
.stats-grid{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
.stat{background:var(--bg2);border:1px solid var(--brd);border-radius:13px;padding:18px}
.theme-win95 .stat,.theme-win-vintage .stat,.theme-win95 .card,.theme-win-vintage .card{border-radius:0}
.stat-val{font-family:var(--font-h);font-size:32px;font-weight:800;color:var(--ac);line-height:1}
.stat-lbl{color:var(--tx2);font-size:13px;margin-top:6px}
.section-title{font-family:var(--font-h);font-weight:700;font-size:16px;margin:24px 0 12px}

.row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--brd);border-radius:11px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,transform .1s}
.row:hover{border-color:var(--ac)}
.theme-win95 .row,.theme-win-vintage .row{border-radius:0}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:14px}
.theme-win95 .avatar,.theme-win-vintage .avatar{border-radius:0}
.row-main{flex:1;min-width:0}
.row-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{color:var(--tx2);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-actions{display:flex;gap:6px;flex-shrink:0}

.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px}
.theme-win95 .badge,.theme-win-vintage .badge{border-radius:0}
.b-prospect{background:var(--warn);color:#000}
.b-actif{background:var(--ok);color:#000}
.b-inactif{background:var(--bg4);color:var(--tx2)}
.b-haute{background:var(--danger);color:#fff}
.b-normale{background:var(--ac);color:#fff}
.b-basse{background:var(--bg4);color:var(--tx)}

.btn{background:var(--bg3);color:var(--tx);border:1px solid var(--brd);padding:9px 15px;border-radius:9px;cursor:pointer;font-weight:600;font-size:14px;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:var(--bg4)}
.btn-pri{background:var(--ac);color:#fff;border-color:var(--ac)}
.btn-pri:hover{opacity:.88}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-sm{padding:5px 9px;font-size:12.5px;border-radius:7px}
.icon-btn{background:transparent;border:none;cursor:pointer;font-size:16px;padding:4px 7px;border-radius:6px;color:var(--tx2)}
.icon-btn:hover{background:var(--bg3);color:var(--tx)}

input,select,textarea{width:100%;background:var(--bg);color:var(--tx);border:1px solid var(--brd);border-radius:8px;padding:10px 12px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--ac)}
textarea{resize:vertical;min-height:90px;font-family:inherit}
label{display:block;font-size:13px;color:var(--tx2);margin-bottom:5px;font-weight:600}
.field{margin-bottom:13px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:180px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:7px 14px;border-radius:20px;background:var(--bg2);border:1px solid var(--brd);cursor:pointer;font-size:13px;font-weight:600;color:var(--tx2)}
.chip.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.theme-win95 .chip,.theme-win-vintage .chip{border-radius:0}

.empty{text-align:center;padding:40px 20px;color:var(--tx2)}
.empty-ico{font-size:42px;margin-bottom:10px;opacity:.5}

/* FAB */
#fab{position:fixed;bottom:24px;right:24px;width:58px;height:58px;border-radius:50%;background:var(--ac);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.35);z-index:50;display:flex;align-items:center;justify-content:center;transition:transform .2s}
#fab:hover{transform:scale(1.08)}
.theme-win95 #fab,.theme-win-vintage #fab{border-radius:0}
#fab-menu{position:fixed;bottom:92px;right:24px;z-index:50;display:none;flex-direction:column;gap:8px}
#fab-menu.open{display:flex}
.fab-opt{background:var(--bg2);border:1px solid var(--brd);color:var(--tx);padding:11px 18px;border-radius:11px;cursor:pointer;font-weight:600;box-shadow:0 4px 14px rgba(0,0,0,.25);white-space:nowrap;text-align:right}
.fab-opt:hover{background:var(--bg3)}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--brd);border-radius:15px;width:100%;max-width:520px;padding:22px;position:relative;animation:slideDown .25s;margin-bottom:40px}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-family:var(--font-h);font-weight:800;font-size:20px}
.modal-close{background:transparent;border:none;font-size:22px;cursor:pointer;color:var(--tx2);width:34px;height:34px;border-radius:8px}
.modal-close:hover{background:var(--bg3);color:var(--tx)}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}

/* Client panel */
#client-panel{position:fixed;top:0;right:0;height:100%;width:420px;max-width:92vw;background:var(--bg2);border-left:1px solid var(--brd);z-index:150;transform:translateX(100%);transition:transform .3s;overflow-y:auto;box-shadow:-8px 0 30px rgba(0,0,0,.3)}
#client-panel.open{transform:translateX(0)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:18px;border-bottom:1px solid var(--brd);position:sticky;top:0;background:var(--bg2);z-index:2}
.panel-body{padding:18px}
.info-line{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--brd);font-size:14px}
.info-line .k{color:var(--tx2)}
.info-line .v{text-align:right;font-weight:600;word-break:break-word}
.task-item{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--bg3);border-radius:9px;margin-bottom:7px}
.task-item.done .task-txt{text-decoration:line-through;opacity:.55}
.task-item input[type=checkbox]{width:auto}
.task-txt{flex:1}

/* Notepad */
#notepad{position:fixed;top:90px;right:60px;width:340px;background:var(--bg2);border:1px solid var(--brd);border-radius:13px;z-index:300;display:none;flex-direction:column;box-shadow:0 10px 40px rgba(0,0,0,.45);overflow:hidden}
#notepad.open{display:flex}
.np-head{padding:10px 14px;background:var(--bg3);cursor:move;display:flex;align-items:center;justify-content:space-between;user-select:none;font-weight:700;font-family:var(--font-h)}
.np-body{padding:12px;display:flex;flex-direction:column;gap:9px}
.np-body textarea{min-height:140px}
.np-hint{font-size:11.5px;color:var(--tx2)}
.np-btns{display:flex;gap:7px;flex-wrap:wrap}
.np-btns .btn{flex:1;justify-content:center;padding:8px;font-size:12.5px}
.np-improve-menu{display:none;flex-direction:column;gap:5px;background:var(--bg3);border-radius:9px;padding:7px}
.np-improve-menu.open{display:flex}
.np-improve-menu button{background:var(--bg);text-align:left;padding:8px 11px}
.np-result{display:none;flex-direction:column;gap:7px;background:var(--bg3);border-radius:9px;padding:10px}
.np-result.open{display:flex}
.np-result-txt{font-size:13px;white-space:pre-wrap;max-height:160px;overflow-y:auto;line-height:1.45}

/* Theme dropdown */
#theme-menu{position:absolute;top:52px;right:120px;background:var(--bg2);border:1px solid var(--brd);border-radius:12px;z-index:310;display:none;flex-direction:column;padding:6px;min-width:190px;box-shadow:0 10px 30px rgba(0,0,0,.4)}
#theme-menu.open{display:flex}
.tm-item{padding:9px 13px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:600;font-size:14px;position:relative}
.tm-item:hover{background:var(--bg3)}
.tm-item.active-theme{color:var(--ac)}
.tm-sub{display:none;flex-direction:column;position:absolute;right:100%;top:0;background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:6px;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.4);margin-right:4px}
.tm-item.has-sub:hover .tm-sub{display:flex}

/* Tour */
#tour-overlay{position:fixed;inset:0;z-index:400;display:none}
#tour-overlay.open{display:block}
#tour-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(2px)}
.tour-highlight{position:absolute;border:3px solid var(--ac);border-radius:11px;box-shadow:0 0 0 9999px rgba(0,0,0,.7);z-index:401;pointer-events:none;transition:all .3s}
#tour-pop{position:absolute;z-index:402;background:var(--bg2);border:1px solid var(--ac);border-radius:13px;padding:18px;width:300px;max-width:90vw;box-shadow:0 10px 40px rgba(0,0,0,.5)}
#tour-pop h3{font-family:var(--font-h);font-size:17px;margin-bottom:7px}
#tour-pop p{color:var(--tx2);font-size:14px;line-height:1.5;margin-bottom:14px}
.tour-nav{display:flex;justify-content:space-between;align-items:center}

/* Toast */

.toast{background:var(--bg2);border:1px solid var(--brd);border-left:4px solid var(--ac);border-radius:10px;padding:12px 18px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.3);animation:slideIn .3s}
.toast.err{border-left-color:var(--danger)}
.toast.ok{border-left-color:var(--ok)}

/* Agenda */

<script>
/* ===================== SEED_APP ===================== */
const APP = {
  name: "RMS Consulting",
  version: "v2.0",
  description: "CRM personnel pour Margaux — clients, rendez-vous, tâches, agenda et communication.",
  author: "HiveOS — Hive (Quentin)",
  url: "https://hivetools.netlify.app"
};

const store = window.storage || localStorage;

/* ===================== SEED_START ===================== */
let state = {
  clients: [],
  rdvs: [],
  taches: [],
  redigerHistorique: [],
  redigerTemplates: [
    { id:'t1', nom:'Premier contact', sujet:'Prise de contact — RMS Consulting', corps:'Bonjour [PRÉNOM],\n\nJ\'ai eu l\'occasion de découvrir votre profil et je souhaitais me présenter...\n\nCordialement,\nMargaux' },
    { id:'t2', nom:'Relance client', sujet:'Relance — Suite à notre échange', corps:'Bonjour [PRÉNOM],\n\nJe me permets de revenir vers vous suite à notre dernier échange...\n\nCordialement,\nMargaux' },
    { id:'t3', nom:'Confirmation RDV', sujet:'Confirmation de notre rendez-vous', corps:'Bonjour [PRÉNOM],\n\nJe vous confirme notre rendez-vous prévu le [DATE] à [HEURE]...\n\nCordialement,\nMargaux' }
  ],
  params: { profil: 'Margaux', objectifRdvHebdo: 5 }
};
/* ===================== SEED_END ===================== */

/* ===================== SEED_TOUR_START ===================== */
const TOUR_STEPS_APP = [
  { target: '#nav-dashboard', title: 'Dashboard', text: 'Vue synthétique : stats, alertes anniversaires, prochains RDV et tâches en attente.', position: 'right' },
  { target: '#nav-relances', title: 'Relances', text: 'Liste des clients à rappeler. Filtre par priorité et statut.', position: 'right' },
  { target: '#nav-repertoire', title: 'Répertoire', text: 'Tous tes clients. Recherche, ajoute, modifie ou supprime une fiche.', position: 'right' },
  { target: '#nav-agenda', title: 'Agenda', text: 'Calendrier de tes rendez-vous. Vue semaine et mois.', position: 'right' },
  { target: '#nav-rediger', title: 'Rédiger', text: 'Prépare des emails depuis tes templates. Traduction EN↔FR en un clic.', position: 'right' },
  { target: '#nav-cr', title: 'Envoyer CR', text: 'Envoie un compte rendu complet du dashboard à Margaux en un clic.', position: 'right' },
  { target: '#fab', title: 'Action rapide', text: 'Ajoute rapidement un client, un RDV ou une tâche.', position: 'top' },
];
/* ===================== SEED_TOUR_END ===================== */

const STATE_KEY='app_data_state', THEME_KEY='app-theme', DAY_KEY='app-day-mode', TOUR_KEY='hiveos_tour_done', NOTE_KEY='hiveos_notepad', APIKEY_KEY='hiveos_api_key';

/* ---------- persistence ---------- */
function saveState(){ try{ store.setItem(STATE_KEY, JSON.stringify(state)); }catch(e){} }
function loadState(){
  try{ const raw=store.getItem(STATE_KEY); if(raw){ const p=JSON.parse(raw); state=Object.assign(state,p); } }catch(e){}
  if(location.hash.length>1){
    try{ const data=JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(1))))); state=Object.assign(state,data); saveState(); history.replaceState(null,'',location.pathname); toast('Données importées depuis le lien','ok'); }catch(e){}
  }
}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---------- toast ---------- */
function toast(msg,type){
  const t=document.createElement('div'); t.className='toast'+(type?' '+type:''); t.textContent=msg;
  document.getElementById('toast-wrap').appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); },3000);
}

/* ===================== THEMES ===================== */
const THEMES=[
  {id:'hiveos',label:'🐝 HiveOS'},
  {id:'bleu',label:'🔵 Bleu'},
  {id:'dracula',label:'🧛 Dracula'},
  {id:'spectre',label:'👾 Spectre'},
  {id:'win',label:'🪟 Windows',sub:[{id:'win95',label:'Windows 95'},{id:'win-vintage',label:'Windows Vintage'}]},
  {id:'term',label:'💻 Terminal',sub:[{id:'terminal',label:'Terminal'},{id:'vt100',label:'VT100'},{id:'ibmpc',label:'IBM PC'}]},
  {id:'bunker',label:'🏚 Bunker'},
];
const ALL_THEME_IDS=['hiveos','bleu','dracula','spectre','win95','win-vintage','terminal','vt100','ibmpc','bunker'];
let curTheme='hiveos', dayMode=false;

function applyTheme(){
  document.body.className='theme-'+curTheme+(dayMode?' day':'');
  document.getElementById('btn-daymode').textContent=dayMode?'☀️':'🌙';
  store.setItem(THEME_KEY,curTheme); store.setItem(DAY_KEY,dayMode?'1':'0');
}
function buildThemeMenu(){
  const m=document.getElementById('theme-menu'); m.innerHTML='';
  THEMES.forEach(t=>{
    const item=document.createElement('div');
    item.className='tm-item'+(t.sub?' has-sub':'')+((!t.sub&&curTheme===t.id)?' active-theme':'');
    item.innerHTML='<span>'+t.label+'</span>'+(t.sub?'<span>▶</span>':'');
    if(t.sub){
      const sub=document.createElement('div'); sub.className='tm-sub';
      t.sub.forEach(s=>{
        const si=document.createElement('div'); si.className='tm-item'+(curTheme===s.id?' active-theme':''); si.innerHTML='<span>'+s.label+'</span>';
        si.onclick=e=>{e.stopPropagation();curTheme=s.id;applyTheme();closeThemeMenu();buildThemeMenu();};
        sub.appendChild(si);
      });
      item.appendChild(sub);
    } else {
      item.onclick=()=>{curTheme=t.id;applyTheme();closeThemeMenu();buildThemeMenu();};
    }
    m.appendChild(item);
  });
}
function closeThemeMenu(){document.getElementById('theme-menu').classList.remove('open');}

/* ===================== MODAL ===================== */
let modalOnClose=null;
function openModal(title,html,onClose){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal').classList.add('open');
  modalOnClose=onClose||null;
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); if(modalOnClose)modalOnClose(); modalOnClose=null; }
document.getElementById('modal-x').onclick=closeModal;

/* ===================== NAV / ROUTER ===================== */
let curView='dashboard';
function nav(view){
  curView=view;
  document.querySelectorAll('#sidebar .nav-item').forEach(n=>n.classList.toggle('active',n.dataset.view===view));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='view-'+view));
  render();
}
document.querySelectorAll('#sidebar .nav-item[data-view]').forEach(n=>n.onclick=()=>nav(n.dataset.view));
document.getElementById('nav-cr').onclick=sendCR;
document.getElementById('nav-pointeuse').onclick=openPointeuse;

function render(){
  if(curView==='dashboard')renderDashboard();
  else if(curView==='relances')renderRelances();
  else if(curView==='repertoire')renderRepertoire();
  else if(curView==='agenda')renderAgenda();
  else if(curView==='rediger')renderRediger();
}

/* ---------- helpers ---------- */
function initials(c){ return ((c.prenom||'')[0]||'')+((c.nom||'')[0]||'')||'?'; }
function fullName(c){ return ((c.prenom||'')+' '+(c.nom||'')).trim()||'(sans nom)'; }
function clientById(id){ return state.clients.find(c=>c.id===id); }
function fmtDate(d){ if(!d)return '—'; const dt=new Date(d); return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateTime(d){ if(!d)return '—'; const dt=new Date(d); return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})+' '+dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function startOfWeek(d){ const dt=new Date(d); const day=(dt.getDay()+6)%7; dt.setHours(0,0,0,0); dt.setDate(dt.getDate()-day); return dt; }
function rdvsThisWeek(){ const s=startOfWeek(new Date()); const e=new Date(s); e.setDate(e.getDate()+7); return state.rdvs.filter(r=>{const d=new Date(r.date);return d>=s&&d<e;}); }
function upcomingBirthdays(){
  const today=new Date(); today.setHours(0,0,0,0); const res=[];
  state.clients.forEach(c=>{ if(!c.dateNaissance)return; const dn=new Date(c.dateNaissance); const next=new Date(today.getFullYear(),dn.getMonth(),dn.getDate()); if(next<today)next.setFullYear(next.getFullYear()+1); const diff=Math.round((next-today)/86400000); if(diff>=0&&diff<=7)res.push({c,diff}); });
  return res.sort((a,b)=>a.diff-b.diff);
}

/* ===================== DASHBOARD ===================== */
function renderDashboard(){
  const bdays=upcomingBirthdays();
  const week=rdvsThisWeek();
  const pendingTasks=state.taches.filter(t=>!t.done);
  const nextRdvs=[...state.rdvs].filter(r=>new Date(r.date)>=new Date(Date.now()-86400000)).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,5);
  const urgentTasks=pendingTasks.slice().sort((a,b)=>(a.echeance||'9999')<(b.echeance||'9999')?-1:1).slice(0,5);
  const recent=[...state.clients].sort((a,b)=>b.createdAt-a.createdAt).slice(0,5);

  let html='<h1 class="view-title">Dashboard</h1><div class="view-sub">Bonjour '+esc(state.params.profil)+' 👋 — voici ta journée</div>';

  if(bdays.length){
    html+='<div class="alert-bday">🎂 Anniversaires à venir : '+bdays.map(b=>esc(fullName(b.c))+(b.diff===0?" (aujourd'hui !)":' (dans '+b.diff+'j)')).join(' · ')+'</div>';
  }

  html+='<div class="grid stats-grid">';
  html+=stat(state.clients.length,'Clients');
  html+=stat(week.length+' / '+state.params.objectifRdvHebdo,'RDV cette semaine');
  html+=stat(pendingTasks.length,'Tâches en attente');
  const pct=Math.min(100,Math.round(week.length/Math.max(1,state.params.objectifRdvHebdo)*100));
  html+=stat(pct+'%','Objectif hebdo');
  html+='</div>';

  html+='<div class="section-title">📅 Prochains RDV</div>';
  if(nextRdvs.length) html+=nextRdvs.map(r=>{const c=clientById(r.clientId);return '<div class="row" onclick="editRdv(\''+r.id+'\')"><div class="avatar">📅</div><div class="row-main"><div class="row-name">'+esc(r.titre||'RDV')+(c?' — '+esc(fullName(c)):'')+'</div><div class="row-sub">'+fmtDateTime(r.date)+(r.lieu?' · '+esc(r.lieu):'')+'</div></div></div>';}).join('');
  else html+='<div class="empty"><div class="empty-ico">📅</div>Aucun RDV à venir</div>';

  html+='<div class="section-title">✅ Tâches urgentes</div>';
  if(urgentTasks.length) html+=urgentTasks.map(t=>{const c=clientById(t.clientId);return '<div class="row" style="cursor:default"><div class="avatar">✓</div><div class="row-main"><div class="row-name">'+esc(t.titre)+'</div><div class="row-sub">'+(t.echeance?'Échéance '+fmtDate(t.echeance):'Sans échéance')+(c?' · '+esc(fullName(c)):'')+'</div></div><button class="btn btn-sm" onclick="toggleTask(\''+t.id+'\')">Terminer</button></div>';}).join('');
  else html+='<div class="empty"><div class="empty-ico">✅</div>Tout est à jour !</div>';

  html+='<div class="section-title">🆕 Clients récents</div>';
  if(recent.length) html+=recent.map(c=>clientRow(c)).join('');
  else html+='<div class="empty"><div class="empty-ico">📇</div>Aucun client. Ajoute-en un via le bouton +</div>';

  document.getElementById('view-dashboard').innerHTML=html;
}
function stat(v,l){return '<div class="stat"><div class="stat-val">'+v+'</div><div class="stat-lbl">'+l+'</div></div>';}
function clientRow(c){
  return '<div class="row" onclick="openClientPanel(\''+c.id+'\')"><div class="avatar">'+esc(initials(c).toUpperCase())+'</div><div class="row-main"><div class="row-name">'+esc(fullName(c))+' <span class="badge b-'+c.statut+'">'+c.statut+'</span></div><div class="row-sub">'+esc(c.metier||c.domaine||'—')+(c.email?' · '+esc(c.email):'')+'</div></div></div>';
}

/* ===================== RELANCES ===================== */
let relanceFilter='all';
function renderRelances(){
  let html='<h1 class="view-title">Relances</h1><div class="view-sub">Clients à rappeler</div>';
  html+='<div class="chips">'+['all','haute','normale','basse'].map(p=>'<div class="chip'+(relanceFilter===p?' active':'')+'" onclick="relanceFilter=\''+p+'\';renderRelances()">'+(p==='all'?'Tous':p.charAt(0).toUpperCase()+p.slice(1))+'</div>').join('')+'</div>';
  let list=state.clients.filter(c=>c.statut==='prospect'||c.statut==='actif');
  if(relanceFilter!=='all')list=list.filter(c=>c.priorite===relanceFilter);
  list.sort((a,b)=>({haute:0,normale:1,basse:2}[a.priorite]-{haute:0,normale:1,basse:2}[b.priorite]));
  if(list.length){
    html+=list.map(c=>{
      const lastRdv=state.rdvs.filter(r=>r.clientId===c.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
      return '<div class="row" onclick="openClientPanel(\''+c.id+'\')"><div class="avatar">'+esc(initials(c).toUpperCase())+'</div><div class="row-main"><div class="row-name">'+esc(fullName(c))+' <span class="badge b-'+c.priorite+'">'+c.priorite+'</span></div><div class="row-sub">'+esc(c.statut)+' · Dernier contact : '+(lastRdv?fmtDate(lastRdv.date):'jamais')+'</div></div></div>';
    }).join('');
  } else html+='<div class="empty"><div class="empty-ico">🔔</div>Aucun client à relancer</div>';
  document.getElementById('view-relances').innerHTML=html;
}

/* ===================== REPERTOIRE ===================== */
let repSearch='';
function renderRepertoire(){
  let html='<h1 class="view-title">Répertoire</h1><div class="view-sub">'+state.clients.length+' client(s)</div>';
  html+='<div class="search-bar"><input id="rep-search" placeholder="🔍 Rechercher..." value="'+esc(repSearch)+'"><button class="btn btn-pri" onclick="openClientModal()">+ Client</button></div>';
  let list=state.clients.slice().sort((a,b)=>fullName(a).localeCompare(fullName(b)));
  if(repSearch){ const q=repSearch.toLowerCase(); list=list.filter(c=>(fullName(c)+' '+(c.email||'')+' '+(c.metier||'')+' '+(c.domaine||'')+' '+(c.telephone||'')).toLowerCase().includes(q)); }
  if(list.length){

/* ===================== AGENDA ===================== */
let calRef=new Date();
function renderAgenda(){
  calRef.setDate(1);
  const y=calRef.getFullYear(),m=calRef.getMonth();
  const monthName=calRef.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  let html='<h1 class="view-title">Agenda</h1><div class="view-sub">Vue mensuelle des rendez-vous</div>';
  html+='<div class="cal-head"><button class="btn btn-sm" onclick="calMove(-1)">← Préc.</button><strong style="font-family:var(--font-h);font-size:18px;text-transform:capitalize">'+monthName+'</strong><button class="btn btn-sm" onclick="calMove(1)">Suiv. →</button></div>';
  html+='<div class="cal-grid">'+['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].map(d=>'<div class="cal-dow">'+d+'</div>').join('');
  const first=new Date(y,m,1); const startDay=(first.getDay()+6)%7;
  const start=new Date(y,m,1-startDay);
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<42;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const other=d.getMonth()!==m;
    const dayRdvs=state.rdvs.filter(r=>{const rd=new Date(r.date);return rd.getFullYear()===d.getFullYear()&&rd.getMonth()===d.getMonth()&&rd.getDate()===d.getDate();});
    const isToday=d.getTime()===today.getTime();
    const iso=d.toISOString();
    html+='<div class="cal-cell'+(other?' other':'')+(isToday?' today':'')+'" onclick="showDay(\''+iso+'\')"><div class="cal-num">'+d.getDate()+'</div><div class="cal-dots">'+dayRdvs.slice(0,4).map(()=>'<span class="cal-dot"></span>').join('')+'</div></div>';
  }
  html+='</div>';
  document.getElementById('view-agenda').innerHTML=html;
}
function calMove(dir){ calRef.setMonth(calRef.getMonth()+dir); renderAgenda(); }
function showDay(iso){
  const d=new Date(iso);
  const dayRdvs=state.rdvs.filter(r=>{const rd=new Date(r.date);return rd.getFullYear()===d.getFullYear()&&rd.getMonth()===d.getMonth()&&rd.getDate()===d.getDate();}).sort((a,b)=>new Date(a.date)-new Date(b.date));
  let html='';
  if(dayRdvs.length){ html+=dayRdvs.map(r=>{const c=clientById(r.clientId);return '<div class="row" onclick="closeModal();editRdv(\''+r.id+'\')"><div class="avatar">'+new Date(r.date).toLocaleTimeString('fr-FR',{hour:'2-digit'})+'</div><div class="row-main"><div class="row-name">'+esc(r.titre||'RDV')+'</div><div class="row-sub">'+new Date(r.date).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})+(c?' · '+esc(fullName(c)):'')+(r.lieu?' · '+esc(r.lieu):'')+'</div></div></div>';}).join(''); }
  else html='<div class="empty"><div class="empty-ico">📅</div>Aucun RDV ce jour</div>';
  html+='<div class="modal-foot"><button class="btn btn-pri" onclick="closeModal();openRdvModal(null,\''+iso+'\')">+ Ajouter un RDV</button></div>';
  openModal(d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}),html);
}

let redClientId='', redTranslated=false, redOriginalFR=null;
function renderRediger(){
  let html='<h1 class="view-title">Rédiger</h1><div class="view-sub">Compose tes emails depuis tes templates</div>';
  html+='<div class="card">';
  html+='<div class="field autocomplete"><label>Client</label><input id="red-client" placeholder="Rechercher un client..." value="'+esc(redClientId?fullName(clientById(redClientId)):'')+'"><div class="ac-list" id="red-ac"></div></div>';
  html+='<div class="field"><label>Template</label><select id="red-template"><option value="">— Aucun —</option>'+state.redigerTemplates.map(t=>'<option value="'+t.id+'">'+esc(t.nom)+'</option>').join('')+'</select></div>';
  html+='<div class="field"><label>Sujet</label><input id="red-sujet"></div>';
  html+='<div class="field"><label>Corps</label><textarea id="red-corps" style="min-height:200px"></textarea></div>';
  html+='<div class="modal-foot" style="justify-content:flex-start"><button class="btn" id="red-translate">🌐 FR → EN</button><button class="btn" id="red-restore" style="display:none">↩️ Restaurer FR</button><button class="btn btn-pri" id="red-send">📨 Envoyer</button></div>';
  html+='</div>';
  if(state.redigerHistorique.length){
    html+='<div class="section-title">📜 Historique (10 derniers)</div>';
    html+=state.redigerHistorique.slice(0,10).map(h=>'<div class="row" style="cursor:default"><div class="avatar">✉️</div><div class="row-main"><div class="row-name">'+esc(h.sujet||'(sans sujet)')+'</div><div class="row-sub">'+esc(h.to||'')+' · '+fmtDateTime(h.date)+'</div></div></div>').join('');
  }
  document.getElementById('view-rediger').innerHTML=html;

  const tpl=document.getElementById('red-template');
  tpl.onchange=()=>{ const t=state.redigerTemplates.find(x=>x.id===tpl.value); if(t){ let corps=t.corps,sujet=t.sujet; const c=clientById(redClientId); if(c){corps=corps.replace(/\[PRÉNOM\]/g,c.prenom||'');} document.getElementById('red-sujet').value=sujet; document.getElementById('red-corps').value=corps; redTranslated=false;redOriginalFR=null;document.getElementById('red-restore').style.display='none';document.getElementById('red-translate').textContent='🌐 FR → EN';} };

  const ci=document.getElementById('red-client'), ac=document.getElementById('red-ac');
  ci.oninput=()=>{ const q=ci.value.toLowerCase(); const matches=state.clients.filter(c=>fullName(c).toLowerCase().includes(q)).slice(0,6); ac.innerHTML=matches.map(c=>'<div class="ac-item" data-id="'+c.id+'">'+esc(fullName(c))+'</div>').join(''); ac.classList.toggle('open',matches.length>0&&q.length>0); ac.querySelectorAll('.ac-item').forEach(el=>el.onclick=()=>{redClientId=el.dataset.id;ci.value=fullName(clientById(redClientId));ac.classList.remove('open');}); };
  ci.onblur=()=>setTimeout(()=>ac.classList.remove('open'),200);

  document.getElementById('red-translate').onclick=translateRed;
  document.getElementById('red-restore').onclick=()=>{ if(redOriginalFR){document.getElementById('red-corps').value=redOriginalFR.corps;document.getElementById('red-sujet').value=redOriginalFR.sujet;redTranslated=false;document.getElementById('red-restore').style.display='none';document.getElementById('red-translate').textContent='🌐 FR → EN';} };
  document.getElementById('red-send').onclick=sendRediger;
}
async function gtranslate(text,sl,tl){
  if(!text.trim())return text;
  const url='https://translate.googleapis.com/translate_a/single?client=gtx&sl='+sl+'&tl='+tl+'&dt=t&q='+encodeURIComponent(text);
  const r=await fetch(url); const j=await r.json(); return j[0].map(seg=>seg[0]).join('');
}
async function translateRed(){
  const corpsEl=document.getElementById('red-corps'),sujetEl=document.getElementById('red-sujet');
  const btn=document.getElementById('red-translate');
  try{
    if(!redTranslated){
      redOriginalFR={corps:corpsEl.value,sujet:sujetEl.value};
      btn.textContent='⏳...';
      corpsEl.value=await gtranslate(corpsEl.value,'fr','en');
      sujetEl.value=await gtranslate(sujetEl.value,'fr','en');
      redTranslated=true; btn.textContent='🌐 EN → FR';
      document.getElementById('red-restore').style.display='inline-flex';
    } else {
      btn.textContent='⏳...';
      corpsEl.value=await gtranslate(corpsEl.value,'en','fr');
      sujetEl.value=await gtranslate(sujetEl.value,'en','fr');
      redTranslated=false; btn.textContent='🌐 FR → EN';
    }
    toast('Traduction effectuée','ok');
  }catch(e){ toast('Erreur de traduction','err'); btn.textContent='🌐 FR → EN'; }
}
function sendRediger(){
  const c=clientById(redClientId);
  const sujet=document.getElementById('red-sujet').value, corps=document.getElementById('red-corps').value;
  const to=c?c.email:'';
  if(!to){ toast('Sélectionne un client avec un email','err'); return; }
  state.redigerHistorique.unshift({id:uid(),to,sujet,date:Date.now()});
  state.redigerHistorique=state.redigerHistorique.slice(0,30);
  saveState();
  window.location.href='mailto:'+encodeURIComponent(to)+'?subject='+encodeURIComponent(sujet)+'&body='+encodeURIComponent(corps);
  toast('Email préparé','ok'); renderRediger();
}

function confirmDelete(type,id){

function doDelete(type,id){
  if(type==='client'){
    state.clients=state.clients.filter(c=>c.id!==id);
    state.rdvs=state.rdvs.filter(r=>r.clientId!==id);
    state.taches.forEach(t=>{ if(t.clientId===id)t.clientId=''; });
    if(clientPanelId===id)closeClientPanel();
    toast('Client supprimé','ok');
  } else if(type==='rdv'){ state.rdvs=state.rdvs.filter(r=>r.id!==id); toast('RDV supprimé','ok'); }

}

/* ===================== POINTEUSE ===================== */
let ptTimer=null, ptStart=null, ptElapsed=0, ptSessions=[];
function openPointeuse(){
  const html=`<div class="pointeuse-time" id="pt-display">00:00:00</div>
    <div class="modal-foot" style="justify-content:center"><button class="btn btn-pri" id="pt-start">▶️ Démarrer</button><button class="btn" id="pt-pause">⏸️ Pause</button><button class="btn btn-danger" id="pt-stop">⏹️ Stop</button></div>
    <div class="section-title">Sessions du jour</div><div id="pt-sessions"></div>
    <div class="info-line" style="margin-top:10px"><span class="k">Total aujourd'hui</span><span class="v" id="pt-total">00:00:00</span></div>`;
  openModal('⏱️ Pointeuse',html,()=>{ if(ptTimer){clearInterval(ptTimer);ptTimer=null;} });
  document.getElementById('pt-start').onclick=ptStartFn;
  document.getElementById('pt-pause').onclick=ptPauseFn;
  document.getElementById('pt-stop').onclick=ptStopFn;
  updatePtDisplay(); renderSessions();
  if(ptStart){ ptTimer=setInterval(updatePtDisplay,1000); }
}
function fmtDur(ms){ const s=Math.floor(ms/1000); return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor(s%3600/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
function updatePtDisplay(){ const el=document.getElementById('pt-display'); if(!el)return; const cur=ptElapsed+(ptStart?Date.now()-ptStart:0); el.textContent=fmtDur(cur); }
function ptStartFn(){ if(ptStart)return; ptStart=Date.now(); ptTimer=setInterval(updatePtDisplay,1000); }
function ptPauseFn(){ if(!ptStart)return; ptElapsed+=Date.now()-ptStart; ptStart=null; clearInterval(ptTimer);ptTimer=null; updatePtDisplay(); }
function ptStopFn(){ const total=ptElapsed+(ptStart?Date.now()-ptStart:0); if(total>0){ ptSessions.unshift({dur:total,end:Date.now()}); } ptElapsed=0;ptStart=null; if(ptTimer){clearInterval(ptTimer);ptTimer=null;} updatePtDisplay(); renderSessions(); }
function renderSessions(){
  const el=document.getElementById('pt-sessions'); if(!el)return;
  const today=new Date();today.setHours(0,0,0,0);
  const todaySessions=ptSessions.filter(s=>s.end>=today.getTime());
  el.innerHTML=todaySessions.length?todaySessions.map(s=>'<div class="sess-item"><span>'+new Date(s.end).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})+'</span><span>'+fmtDur(s.dur)+'</span></div>').join(''):'<div style="color:var(--tx2);font-size:13px">Aucune session.</div>';
  const total=todaySessions.reduce((a,s)=>a+s.dur,0);
  const tEl=document.getElementById('pt-total'); if(tEl)tEl.textContent=fmtDur(total);
}

function sendCR(){
  const bdays=upcomingBirthdays();
  const week=rdvsThisWeek();
  const pending=state.taches.filter(t=>!t.done);
  const nextRdvs=[...state.rdvs].filter(r=>new Date(r.date)>=new Date(Date.now()-86400000)).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,8);
  let body='COMPTE RENDU — RMS Consulting\n'+new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+'\n\n';
  body+='=== STATS ===\n';
  body+='Clients : '+state.clients.length+'\n';
  body+='RDV cette semaine : '+week.length+' / '+state.params.objectifRdvHebdo+'\n';
  body+='Tâches en attente : '+pending.length+'\n\n';
  body+='=== PROCHAINS RDV ===\n';
  body+=nextRdvs.length?nextRdvs.map(r=>{const c=clientById(r.clientId);return '- '+fmtDateTime(r.date)+' : '+(r.titre||'RDV')+(c?' ('+fullName(c)+')':'');}).join('\n'):'Aucun';
  body+='\n\n=== TÂCHES EN ATTENTE ===\n';
  body+=pending.length?pending.map(t=>'- '+t.titre+(t.echeance?' (éch. '+fmtDate(t.echeance)+')':'')).join('\n'):'Aucune';
  body+='\n\n=== ANNIVERSAIRES (7j) ===\n';
  body+=bdays.length?bdays.map(b=>'- '+fullName(b.c)+(b.diff===0?" (aujourd'hui)":' (dans '+b.diff+'j)')).join('\n'):'Aucun';
  body+='\n\n— '+state.params.profil;
  window.location.href='mailto:rms-consulting@outlook.fr?subject='+encodeURIComponent('Compte rendu — RMS Consulting')+'&body='+encodeURIComponent(body);
  toast('Compte rendu préparé','ok');
}

(function(){
  const head=document.getElementById('np-head'); let drag=false,ox,oy;
  function start(x,y){ drag=true; const r=notepad.getBoundingClientRect(); ox=x-r.left; oy=y-r.top; notepad.style.right='auto'; }
  function move(x,y){ if(!drag)return; notepad.style.left=(x-ox)+'px'; notepad.style.top=(y-oy)+'px'; }
  function end(){ drag=false; }
  head.addEventListener('mousedown',e=>start(e.clientX,e.clientY));
  document.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  document.addEventListener('mouseup',end);
  head.addEventListener('touchstart',e=>{const t=e.touches[0];start(t.clientX,t.clientY);},{passive:true});
  document.addEventListener('touchmove',e=>{if(drag){const t=e.touches[0];move(t.clientX,t.clientY);}},{passive:true});
  document.addEventListener('touchend',end);
})();

const IMPROVE_MODES={
  dev:"Reformule ce texte en instructions claires, précises et actionnables pour un développeur. Utilise des verbes d'action. Structure en points si nécessaire.",
  liste:"Transforme ce texte en liste numérotée structurée. Chaque point doit être une action, un bug ou une amélioration distincte. Court et précis.",
  correction:"Corrige le français et améliore la clarté de ce texte sans changer le fond ni le sens. Garde le ton naturel.",
  resume:"Résume ce texte en 2-3 phrases maximum. Va à l'essentiel.",
  prompt:"Transforme ce texte en un prompt clair et contextualisé, prêt à être collé dans n'importe quelle conversation IA. Commence par donner le contexte : RMS Consulting v2.0 — CRM personnel pour Margaux. Formule la demande de façon précise."
};

async function improveNote(mode){
  const text=npText.value.trim();
  if(!text){ toast("Écris une note d'abord",'err'); return; }
  let apiKey=store.getItem(APIKEY_KEY);
  if(!apiKey){ apiKey=prompt('Clé API Claude (stockée localement) :'); if(!apiKey)return; store.setItem(APIKEY_KEY,apiKey); }
  const rt=document.getElementById('np-result-txt'); const rwrap=document.getElementById('np-result');
  rwrap.classList.add('open'); rt.textContent='⏳ Amélioration en cours...';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'content-type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,messages:[{role:'user',content:IMPROVE_MODES[mode]+'\n\nTexte :\n'+text}]})
    });
    const j=await r.json();
    if(j.error){ rt.textContent='Erreur : '+j.error.message; return; }
    const out=j.content.map(c=>c.text||'').join('');
    rt.textContent=out;
    document.getElementById('np-res-replace').onclick=()=>{ npText.value=out; store.setItem(NOTE_KEY,out); rwrap.classList.remove('open'); toast('Note remplacée','ok'); };
    document.getElementById('np-res-copy').onclick=()=>copyText(out);
  }catch(e){ rt.textContent='Erreur réseau : '+e.message; }
}
function copyText(txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(()=>toast('Copié','ok')).catch(()=>fallbackCopy(txt)); }
  else fallbackCopy(txt);
}
function fallbackCopy(txt){ const ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');toast('Copié','ok');}catch(e){toast('Copie impossible','err');} ta.remove(); }
document.getElementById('np-copy').onclick=()=>copyText(npText.value);
document.getElementById('np-send').onclick=()=>{ window.location.href='mailto:systemhiveos@gmail.com?subject='+encodeURIComponent('[RMS Consulting v2.0] — Notes & Retours')+'&body='+encodeURIComponent(npText.value); };

/* ===================== SAVE MODAL ===================== */
document.getElementById('btn-save').onclick=openSaveModal;
function openSaveModal(){
  const html=`<div class="grid" style="gap:10px">
    <button class="btn" onclick="exportJSON()">📤 Export JSON</button>
    <button class="btn" onclick="document.getElementById('import-file').click()">📥 Import JSON</button>
    <input type="file" id="import-file" accept=".json" style="display:none">
    <button class="btn" onclick="copyShareURL()">🔗 Copier URL (partage)</button>
    <button class="btn" onclick="downloadHTML()">📦 Télécharger HTML</button>
    <button class="btn btn-danger" onclick="resetApp1()">♻️ Remise à zéro</button>
  </div>`;
  openModal('💾 Sauvegarde',html);
  document.getElementById('import-file').onchange=importJSON;
}
async function exportJSON(){
  const data=JSON.stringify(state,null,2);
  const fname='rms-consulting-'+new Date().toISOString().slice(0,10)+'.json';
  if(window.showSaveFilePicker){
    try{ const h=await window.showSaveFilePicker({suggestedName:fname,types:[{description:'JSON',accept:{'application/json':['.json']}}]}); const w=await h.createWritable(); await w.write(data); await w.close(); toast('Exporté','ok'); return; }catch(e){ if(e.name==='AbortError')return; }
  }
  downloadBlob(data,fname,'application/json'); toast('Exporté','ok');
}
function downloadBlob(content,name,type){ const b=new Blob([content],{type}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }
function importJSON(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); state=Object.assign(state,d); saveState(); render(); closeModal(); toast('Importé','ok'); }catch(err){ toast('Fichier invalide','err'); } };
  r.readAsText(f);
}
function copyShareURL(){
  try{ const hash=btoa(unescape(encodeURIComponent(JSON.stringify(state)))); const url=location.origin+location.pathname+'#'+hash; copyText(url); }catch(e){ toast('Erreur','err'); }
}
function downloadHTML(){ downloadBlob('<!DOCTYPE html>\n'+document.documentElement.outerHTML,'RMS_Consulting.html','text/html'); toast('HTML téléchargé','ok'); }

const TOUR_SYSTEM=[
  {target:null,title:'Bienvenue 🐝',text:'Bienvenue dans '+APP.name+' '+APP.version+' ! Faisons un tour rapide de l\'interface.'},
  {target:'#hdr-logo',title:'Logo HiveOS',text:'Clique sur le logo pour en savoir plus.',position:'bottom'},
  {target:'#hdr-name',title:'Nom de l\'app',text:'RMS Consulting v2.0',position:'bottom'},
  {target:'#btn-notepad',title:'📝 Bloc-notes',text:'Tes notes personnelles.',position:'bottom'},
  {target:'#btn-theme',title:'🎨 Thème',text:'10 thèmes disponibles.',position:'bottom'},
  {target:'#btn-daymode',title:'☀️/🌙 Jour/Nuit',text:'Bascule sombre/clair.',position:'bottom'},
  {target:'#btn-save',title:'💾 Sauvegarde',text:'Export, import, partage.',position:'bottom'},
  {target:'#btn-help',title:'❓ Aide',text:'Rejoue la visite.',position:'bottom'},
];
const TOUR_ALL=[...TOUR_SYSTEM,...TOUR_STEPS_APP];
let tourIdx=0;
function startTour(){ tourIdx=0; document.getElementById('tour-overlay').classList.add('open'); showTourStep(); }
function endTour(){ document.getElementById('tour-overlay').classList.remove('open'); store.setItem(TOUR_KEY,'1'); }
function showTourStep(){
  const step=TOUR_ALL[tourIdx];
  document.getElementById('tour-title').textContent=step.title;
  document.getElementById('tour-text').textContent=step.text;
  document.getElementById('tour-dots').textContent=(tourIdx+1)+' / '+TOUR_ALL.length;
  document.getElementById('tour-prev').style.visibility=tourIdx===0?'hidden':'visible';
  document.getElementById('tour-next').textContent=tourIdx===TOUR_ALL.length-1?'Terminer ✓':'Suivant →';
  const hl=document.getElementById('tour-highlight'), pop=document.getElementById('tour-pop');
  const el=step.target?document.querySelector(step.target):null;
  if(el){
    const r=el.getBoundingClientRect();
    hl.style.display='block';
    hl.style.left=(r.left-6)+'px'; hl.style.top=(r.top-6)+'px'; hl.style.width=(r.width+12)+'px'; hl.style.height=(r.height+12)+'px';
    let pl,pt; const pw=300,ph=150;
    if(step.position==='right'){ pl=r.right+16; pt=r.top; }
    else if(step.position==='top'){ pl=r.left-pw+r.width; pt=r.top-ph-10; }
    else if(step.position==='bottom'){ pl=r.left; pt=r.bottom+14; }
    else { pl=r.right+16; pt=r.top; }
    pl=Math.max(10,Math.min(pl,window.innerWidth-pw-10));
    pt=Math.max(10,Math.min(pt,window.innerHeight-ph-10));
    pop.style.left=pl+'px'; pop.style.top=pt+'px'; pop.style.transform='none';
  } else {
    hl.style.display='none';
    pop.style.left='50%'; pop.style.top='50%'; pop.style.transform='translate(-50%,-50%)';
  }
}
document.getElementById('tour-next').onclick=()=>{ if(tourIdx<TOUR_ALL.length-1){tourIdx++;showTourStep();}else endTour(); };
document.getElementById('tour-prev').onclick=()=>{ if(tourIdx>0){tourIdx--;showTourStep();} };
document.getElementById('btn-help').onclick=e=>{ e.stopPropagation(); startTour(); };
document.addEventListener('keydown',e=>{
  if(!document.getElementById('tour-overlay').classList.contains('open'))return;
  if(e.key==='ArrowRight'){ if(tourIdx<TOUR_ALL.length-1){tourIdx++;showTourStep();}else endTour(); }
  else if(e.key==='ArrowLeft'){ if(tourIdx>0){tourIdx--;showTourStep();} }
  else if(e.key==='Escape'){ endTour(); }
});
window.addEventListener('resize',()=>{ if(document.getElementById('tour-overlay').classList.contains('open'))showTourStep(); });

/* ===================== POINTEUSE SHORTCUT ===================== */
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&(e.key==='c'||e.key==='C')){
    const tag=(document.activeElement&&document.activeElement.tagName)||'';
    const inInput=tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT';
    const hasSel=window.getSelection&&window.getSelection().toString().length>0;
    if(!inInput&&!hasSel){ e.preventDefault(); openPointeuse(); }
  }
});
