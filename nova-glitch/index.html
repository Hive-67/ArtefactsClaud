<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>NOVA &amp; LE GLITCH — Mission Système</title>
<!-- Polices CDN optionnelles : le jeu fonctionne sans (fallbacks testés) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   NOVA & LE GLITCH — Mission Système
   Jeu éducatif mono-fichier — HTML/CSS/JS vanilla
   ============================================================ */

/* ---------- Tokens de la direction artistique (§6.2) ---------- */
:root{
  --fond:#0B1026;
  --fond-halo:#1B2350;
  --panneau:#131B3D;
  --bord:#2E3A72;
  --texte:#F2F5FF;
  --texte-2:#9AA6D6;
  --cyan:#4DE3FF;
  --or:#FFD23F;
  --vert:#5CFF8F;
  --corail:#FF5C8A;
  --violet-glitch:#B14CFF;
  --rouge-glitch:#FF4D4D;
  --font-titre:"Baloo 2", system-ui, sans-serif;
  --font-mono:"Space Mono", ui-monospace, Menlo, Consolas, monospace;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  height:100%;
  overflow:hidden;
  background:var(--fond);
  color:var(--texte);
  font-family:var(--font-mono);
  font-size:18px;
}

/* ---------- Fond étoilé + halo ---------- */
#fond{
  position:fixed; inset:0; z-index:0;
  background:radial-gradient(ellipse at 50% 40%, var(--fond-halo) 0%, var(--fond) 70%);
}
.etoiles{ position:absolute; inset:0; }
.etoile{
  position:absolute; border-radius:50%;
  background:var(--texte);
  animation:scintille var(--dur,4s) ease-in-out infinite;
  animation-delay:var(--del,0s);
}
@keyframes scintille{ 0%,100%{opacity:.4} 50%{opacity:.9} }

/* ---------- Structure générale : 1 écran, pas de scroll de page ---------- */
#app{
  position:relative; z-index:1;
  height:100dvh;
  max-width:760px;
  margin:0 auto;
  display:flex; flex-direction:column;
  padding:0 10px;
}

/* ---------- Header ---------- */
header{
  flex:0 0 auto;
  display:flex; align-items:center; justify-content:space-between;
  gap:8px; padding:8px 4px;
  border-bottom:1px solid var(--bord);
}
#titre-jeu{
  font-family:var(--font-titre); font-weight:800;
  font-size:20px; color:var(--or);
  text-shadow:0 0 12px rgba(255,210,63,.45);
  white-space:nowrap;
}
#titre-jeu .court{ display:none; }
#progression{ display:flex; gap:6px; align-items:center; }
.icone-module{
  width:28px; height:28px; display:flex; align-items:center; justify-content:center;
  font-size:18px; border-radius:8px;
  background:var(--panneau); border:1px solid var(--bord);
  filter:grayscale(1); opacity:.45;
  transition:filter .4s, opacity .4s;
}
.icone-module.ok{
  filter:none; opacity:1;
  border-color:var(--or);
  animation:pop .5s ease;
}
@keyframes pop{ 0%{transform:scale(0)} 60%{transform:scale(1.3)} 100%{transform:scale(1)} }
#btn-son{
  background:var(--panneau); border:1px solid var(--bord); color:var(--texte);
  border-radius:10px; min-width:44px; min-height:44px; font-size:20px; cursor:pointer;
}
#btn-son:focus-visible, .chip:focus-visible, #btn-envoyer:focus-visible,
#saisie:focus-visible, .gros-bouton:focus-visible{
  outline:2px solid var(--cyan); outline-offset:2px;
}

/* ---------- Zone dialogue (NOVA + bulle) ---------- */
#zone-dialogue{
  flex:0 0 auto;
  display:flex; gap:12px; align-items:flex-start;
  padding:10px 4px; min-height:120px;
}
#avatar-slot{ flex:0 0 auto; width:110px; }
#avatar-slot svg{ width:100%; height:auto; display:block; }
#bulle{
  flex:1 1 auto; position:relative;
  background:var(--panneau);
  border:1px solid var(--bord);
  border-radius:14px;
  padding:12px 30px 12px 14px;
  min-height:78px;
  font-size:18px; line-height:1.45;
  cursor:pointer;
}
#bulle .nom-perso{
  font-family:var(--font-titre); font-weight:800; font-size:14px;
  color:var(--cyan); display:block; margin-bottom:2px;
}
#bulle.perso-glitch .nom-perso{ color:var(--violet-glitch); }
#bulle.perso-pix .nom-perso{ color:var(--vert); }
#bulle.perso-portier .nom-perso{ color:var(--or); }
#fleche-suite{
  position:absolute; right:10px; bottom:6px;
  color:var(--cyan); font-size:16px;
  animation:pulse-fleche 1s ease-in-out infinite;
  display:none;
}
#fleche-suite.visible{ display:block; }
@keyframes pulse-fleche{ 0%,100%{opacity:.35; transform:translateY(0)} 50%{opacity:1; transform:translateY(3px)} }

/* ---------- Terminal ---------- */
#terminal{
  flex:1 1 auto;
  overflow-y:auto;
  background:var(--panneau);
  border:1px solid var(--bord);
  border-radius:14px;
  padding:12px 14px;
  font-size:18px; line-height:1.5;
  white-space:pre-wrap; word-break:break-word;
  transition:box-shadow .3s;
}
#terminal.reussite{ box-shadow:0 0 18px rgba(92,255,143,.6); }
.ligne-echo{ color:var(--cyan); }
.ligne-sys{ color:var(--texte); }
.ligne-ok{ color:var(--vert); }
.ligne-err{ color:var(--corail); }
.ligne-or{ color:var(--or); }

/* Grille de pixels du chapitre 5 */
#grille-pixels{
  display:grid; gap:2px;
  grid-template-columns:repeat(12, 16px);
  margin:10px 0;
}
#grille-pixels .px{
  width:16px; height:16px; border-radius:2px;
  background:#3a4470;
  transition:background .25s;
}

/* ---------- Saisie + chips ---------- */
#zone-saisie{ flex:0 0 auto; padding:10px 0 8px; }
#ligne-input{ display:flex; gap:8px; }
#saisie{
  flex:1 1 auto;
  background:var(--panneau); border:2px solid var(--bord);
  border-radius:12px; color:var(--texte);
  font-family:var(--font-mono); font-size:18px;
  padding:12px 14px; min-height:48px;
}
#saisie:disabled{ opacity:.55; }
#saisie.erreur{
  border-color:var(--corail);
  animation:shake .3s ease;
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-4px)} 50%{transform:translateX(4px)} 75%{transform:translateX(-4px)}
}
#btn-envoyer{
  flex:0 0 auto; min-width:56px; min-height:48px;
  background:var(--cyan); color:#06283a;
  border:none; border-radius:12px;
  font-size:24px; font-weight:700; cursor:pointer;
}
#btn-envoyer:disabled{ opacity:.4; cursor:default; }
#chips{
  display:flex; gap:8px; overflow-x:auto;
  padding:10px 2px 4px;
  -webkit-overflow-scrolling:touch;
}
.chip{
  flex:0 0 auto;
  background:var(--panneau); border:1px solid var(--cyan); color:var(--cyan);
  border-radius:999px; padding:8px 16px;
  font-family:var(--font-mono); font-size:16px;
  min-height:40px; cursor:pointer; white-space:nowrap;
}
.chip:active{ background:var(--cyan); color:#06283a; }

/* ---------- Overlays (titre, reprise, cartes, transition, diplôme) ---------- */
.overlay{
  position:fixed; inset:0; z-index:10;
  background:rgba(5,8,22,.82);
  display:flex; align-items:center; justify-content:center;
  padding:16px;
}
.overlay[hidden]{ display:none; }
.carte{
  background:var(--panneau); border:2px solid var(--bord);
  border-radius:18px; padding:24px;
  max-width:520px; width:100%;
  text-align:center;
  max-height:92dvh; overflow-y:auto;
}
.carte h2{
  font-family:var(--font-titre); font-weight:800;
  font-size:26px; color:var(--or); margin-bottom:10px;
}
.carte .icone-grande{ font-size:54px; display:block; margin-bottom:8px; }
.carte p{ line-height:1.5; margin-bottom:16px; }
.gros-bouton{
  font-family:var(--font-titre); font-weight:800; font-size:19px;
  background:var(--cyan); color:#06283a;
  border:none; border-radius:14px;
  padding:14px 26px; min-height:56px; cursor:pointer;
  margin:4px;
}
.gros-bouton.secondaire{ background:var(--panneau); color:var(--texte); border:2px solid var(--bord); }

/* Écran titre */
#ecran-titre .carte{ background:transparent; border:none; }
#logo-titre{
  font-family:var(--font-titre); font-weight:800;
  font-size:40px; color:var(--or); line-height:1.1;
  text-shadow:0 0 24px rgba(255,210,63,.55);
}
#sous-titre{ color:var(--cyan); font-size:18px; margin:10px 0 28px; }

/* Bandeau transition chapitre */
#transition{
  position:fixed; inset:0; z-index:9;
  display:flex; align-items:center; justify-content:center;
  background:var(--fond);
  opacity:0; pointer-events:none;
  transition:opacity .5s;
}
#transition.visible{ opacity:1; pointer-events:auto; }
#transition .bandeau{
  font-family:var(--font-titre); font-weight:800;
  font-size:28px; color:var(--cyan); text-align:center;
}

/* Ambiance Cœur (chapitre 7) : teinte statique, pas de clignotement */
body.ambiance-coeur #fond{
  background:radial-gradient(ellipse at 50% 40%, #2A1B45 0%, #160B26 70%);
}

/* ---------- Diplôme ---------- */
#diplome-cadre{
  border:4px double var(--or); border-radius:14px;
  padding:20px; margin-bottom:16px;
}
#diplome-cadre h2{ color:var(--or); }
#diplome-prenom{
  font-family:var(--font-titre); font-weight:800;
  font-size:32px; color:var(--cyan); margin:8px 0;
}
#grille-savoirs{
  display:grid; grid-template-columns:1fr 1fr; gap:8px;
  margin-bottom:16px; text-align:left;
}
.mini-savoir{
  background:var(--fond); border:1px solid var(--bord);
  border-radius:10px; padding:8px; font-size:13px; line-height:1.35;
}
.mini-savoir .ic{ font-size:18px; margin-right:4px; }

/* Confettis */
.confetti{
  position:fixed; top:-12px; z-index:30;
  width:9px; height:9px; border-radius:2px;
  animation:chute 3s linear forwards;
  pointer-events:none;
}
@keyframes chute{
  to{ transform:translateY(105vh) rotate(540deg); opacity:.7; }
}

/* ---------- Avatars SVG ---------- */
/* NOVA : antenne qui pulse */
.nova-antenne-boule{
  animation:pulse-antenne 1.8s ease-in-out infinite;
  transform-origin:60px 12px; transform-box:fill-box;
}
@keyframes pulse-antenne{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }
/* Clignement (déclenché par JS via la classe .cligne) */
.nova-oeil{ transform-origin:center; transform-box:fill-box; transition:transform .12s; }
svg.cligne .nova-oeil{ transform:scaleY(.1); }
/* États */
svg.etat-happy .nova-oeil-rond, svg.etat-idle .nova-oeil-accent, svg.etat-talk .nova-oeil-accent,
svg.etat-worried .nova-oeil-accent, svg.etat-thinking .nova-oeil-accent{ display:none; }
svg.etat-happy .nova-oeil-accent{ display:block; }
svg.etat-idle .nova-oeil-rond, svg.etat-talk .nova-oeil-rond,
svg.etat-worried .nova-oeil-rond, svg.etat-thinking .nova-oeil-rond{ display:block; }
.nova-oeil-accent{ display:none; }
svg.etat-worried .nova-tete{ transform:rotate(-6deg); transform-origin:60px 70px; transform-box:fill-box; }
svg.etat-worried .nova-antenne{ transform:rotate(-22deg); transform-origin:60px 38px; transform-box:fill-box; }
svg.etat-thinking .nova-pupille{ transform:translateY(-4px); }
.nova-points{ display:none; font:700 22px var(--font-mono); fill:var(--cyan); }
svg.etat-thinking .nova-points{ display:block; }
.nova-bouche-talk{ display:none; }
svg.etat-talk .nova-bouche-talk{
  display:block;
  animation:bouche .28s ease-in-out infinite alternate;
  transform-origin:center; transform-box:fill-box;
}
svg.etat-talk .nova-bouche-idle{ display:none; }
@keyframes bouche{ from{transform:scaleY(.3)} to{transform:scaleY(1)} }

/* GLITCH : jitter ±2px à ~2Hz (contrainte épilepsie §7.4 respectée) */
svg.forme-glitch .blob-corps{ fill:url(#degrade-glitch); }
svg.forme-glitch{ animation:jitter .5s steps(2) infinite; }
@keyframes jitter{
  0%{transform:translate(0,0)} 25%{transform:translate(2px,-1px)}
  50%{transform:translate(-2px,1px)} 75%{transform:translate(1px,2px)} 100%{transform:translate(0,0)}
}
svg.forme-pix .blob-corps{ fill:var(--vert); }
svg.forme-pix{ animation:none; transition:all 1.5s; }
.blob-sourire{ display:none; }
svg.forme-pix .blob-sourire{ display:block; }
svg.forme-pix .blob-bouche-zigzag{ display:none; }
.blob-corps{ transition:fill 1.5s; }

/* ---------- Responsive ---------- */
@media (max-width:759px){
  #avatar-slot{ width:72px; }
  #zone-dialogue{ min-height:96px; }
  #bulle{ font-size:16px; }
  #terminal{ font-size:16px; }
  #saisie{ font-size:16px; }
}
@media (max-width:379px){
  #titre-jeu .long{ display:none; }
  #titre-jeu .court{ display:inline; }
  .icone-module{ width:20px; height:20px; font-size:13px; }
}

/* ---------- prefers-reduced-motion (§7.3) ---------- */
@media (prefers-reduced-motion:reduce){
  .etoile{ animation:none; opacity:.6; }
  svg.forme-glitch{ animation:none; }
  .confetti{ animation:none; display:none; }
  .nova-antenne-boule{ animation:none; }
  #fleche-suite{ animation:none; opacity:1; }
}

/* ---------- Impression du diplôme (§10.3) ---------- */
@media print{
  body{ background:#fff; color:#000; overflow:visible; }
  body *{ visibility:hidden; }
  #ecran-diplome, #ecran-diplome *{ visibility:visible; }
  #ecran-diplome{ position:absolute; inset:0; background:#fff; }
  #ecran-diplome .carte{ border:none; background:#fff; color:#000; max-height:none; }
  #diplome-cadre{ border:4px double #000; }
  #diplome-cadre h2, #diplome-prenom{ color:#000; text-shadow:none; }
  .mini-savoir{ background:#fff; border:1px solid #000; color:#000; }
  .gros-bouton, #confettis-zone{ display:none !important; }
  @page{ size:A4 portrait; margin:1.5cm; }
}
</style>
</head>
<body>
<div id="fond"><div class="etoiles" id="etoiles"></div></div>

<div id="app">
  <header>
    <div id="titre-jeu"><span class="long">NOVA &amp; LE GLITCH</span><span class="court">N&amp;G</span></div>
    <div id="progression" aria-label="Progression des modules"></div>
    <button id="btn-son" aria-label="Couper ou remettre le son">🔊</button>
  </header>

  <div id="zone-dialogue">
    <div id="avatar-slot"></div>
    <div id="bulle" role="status" aria-live="polite">
      <span class="nom-perso" id="bulle-nom"></span>
      <span id="bulle-texte"></span>
      <span id="fleche-suite">▶</span>
    </div>
  </div>

  <div id="terminal" aria-live="polite"></div>

  <div id="zone-saisie">
    <div id="ligne-input">
      <input id="saisie" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
             placeholder="Lis le message de NOVA…" disabled aria-label="Champ de commande">
      <button id="btn-envoyer" aria-label="Envoyer la commande" disabled>⏎</button>
    </div>
    <div id="chips"></div>
  </div>
</div>

<div id="transition"><div class="bandeau" id="transition-texte"></div></div>

<!-- Écran titre -->
<div class="overlay" id="ecran-titre">
  <div class="carte">
    <div id="logo-titre">NOVA &amp; LE GLITCH</div>
    <div id="sous-titre">Mission Système</div>
    <button class="gros-bouton" id="btn-commencer">▶ COMMENCER LA MISSION</button>
  </div>
</div>

<!-- Écran de reprise -->
<div class="overlay" id="ecran-reprise" hidden>
  <div class="carte">
    <span class="icone-grande">🤖</span>
    <p id="texte-reprise"></p>
    <button class="gros-bouton" id="btn-reprendre">Reprendre ▶</button>
    <button class="gros-bouton secondaire" id="btn-recommencer">Recommencer à zéro ↺</button>
    <p id="confirm-reset" hidden>Sûr ? Toute la progression sera effacée.<br>
      <button class="gros-bouton" id="btn-reset-oui">Oui</button>
      <button class="gros-bouton secondaire" id="btn-reset-non">Non</button>
    </p>
  </div>
</div>

<!-- Carte CE QUE TU AS APPRIS -->
<div class="overlay" id="ecran-carte" hidden>
  <div class="carte">
    <span class="icone-grande" id="carte-icone"></span>
    <h2>CE QUE TU AS APPRIS</h2>
    <p id="carte-texte"></p>
    <button class="gros-bouton" id="btn-carte-continuer">Continuer ▶</button>
  </div>
</div>

<!-- Écran diplôme -->
<div class="overlay" id="ecran-diplome" hidden>
  <div class="carte">
    <div id="diplome-cadre">
      <h2>🏅 DIPLÔME OFFICIEL 🏅</h2>
      <p>AGENT SYSTÈME — NIVEAU 1<br>décerné à</p>
      <div id="diplome-prenom"></div>
      <p>le <span id="diplome-date"></span><br><br>signé : NOVA 🤖 &amp; PIX 💚</p>
    </div>
    <div id="grille-savoirs"></div>
    <button class="gros-bouton" id="btn-imprimer">🖨 Imprimer mon diplôme</button>
    <button class="gros-bouton secondaire" id="btn-rejouer">↺ Rejouer</button>
  </div>
</div>

<div id="confettis-zone"></div>

<script>
"use strict";
/* ============================================================
   SECTION 1 — DONNÉES & UTILITAIRES
   ============================================================ */

// ---------- Normalisation des saisies (§4.1) ----------
function normaliser(t){
  return String(t)
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .trim()
    .replace(/\s+/g, " ");
}
// Pour les codes / mots de passe / réponses : on retire TOUS les espaces
function normaliserCode(t){
  return normaliser(t).replace(/\s+/g, "");
}

// ---------- Données transverses ----------
const REPONSES_INCONNUES = [
  "BZZT ! Commande inconnue. Mais c'était joliment tapé ! Tape aide si tu es perdu.",
  "Hmm… mon dictionnaire répond : 404, pas trouvé ! Essaie aide.",
  "Même en penchant la tête, je ne comprends pas. Tape aide, je t'explique tout !",
  "Ça, c'est une commande du futur. Moi je suis une IA du présent ! Tape aide."
];
const BLAGUES = [
  "Pourquoi l'ordinateur est allé chez le docteur ? … Parce qu'il avait un VIRUS !",
  "Que dit un informaticien qui se noie ? … F1 ! F1 !",
  "Quel est le gâteau préféré des robots ? … Les cookies !"
];
// Liste courte de gros mots courants (formes normalisées)
const GROS_MOTS = ["merde","putain","connard","connasse","salope","pute","encule",
  "batard","crotte de bip","fdp","ntm","con","conne","debile","cretin","abruti","zut de zut"];

const SAVOIRS = [
  { ic:"⌨️", txt:"Une commande = un ordre précis tapé au clavier. La touche Entrée l'envoie à l'ordinateur." },
  { ic:"📁", txt:"Un dossier = une boîte. Un fichier = un document. Son extension (.txt, .png, .mp3, .exe) indique son type." },
  { ic:"🔐", txt:"Un mot de passe fort = long + lettres + chiffres + symbole. Et il reste SECRET." },
  { ic:"💾", txt:"L'ordinateur stocke TOUT en binaire : des 0 (éteint) et des 1 (allumé)." },
  { ic:"🖥️", txt:"Un écran = une grille de pixels. Chaque pixel mélange 3 lumières : Rouge, Vert, Bleu. Lumière rouge + verte = jaune !" },
  { ic:"🧩", txt:"Un programme = des instructions dans l'ordre, comme une recette. Un bug = une erreur. Débugger = la trouver et la corriger." }
];
// Les 6 modules du Système (barre de progression + scanner)
const MODULES = [
  { ic:"📁", nom:"ARCHIVES" },
  { ic:"🔐", nom:"SÉCURITÉ" },
  { ic:"💾", nom:"MÉMOIRE" },
  { ic:"🖥️", nom:"ÉCRAN" },
  { ic:"🧩", nom:"LOGIQUE" },
  { ic:"💛", nom:"CŒUR" }
];

// Arborescence du chapitre 2 (le fichier intrus est secret.txt dans images/)
const ARBO = {
  "":        { dossiers:["images","musique","jeux"], fichiers:[] },
  "images":  { dossiers:[], fichiers:["chat.png","fusee.png","secret.txt"] },
  "musique": { dossiers:[], fichiers:["bip_bop.mp3"] },
  "jeux":    { dossiers:[], fichiers:["morpion.exe"] }
};

// ---------- État global (objet unique, §9.2) ----------
const etat = {
  prenom: "",
  chapitreIndex: 0,
  etape: 0,
  essais: 0,
  indicesDonnes: 0,
  dossierCourant: "",
  sonOn: true,
  termine: false
};

// ---------- Sauvegarde localStorage (§4.4, §9.3) ----------
const CLE_SAVE = "nova_save_v1";
function sauvegarder(){
  try{
    localStorage.setItem(CLE_SAVE, JSON.stringify({
      prenom: etat.prenom,
      chapitreIndex: etat.chapitreIndex,
      sonOn: etat.sonOn,
      termine: etat.termine
    }));
  }catch(e){ /* navigation privée : le jeu continue sans sauvegarde */ }
}
function chargerSauvegarde(){
  try{
    const brut = localStorage.getItem(CLE_SAVE);
    if(!brut) return null;
    const s = JSON.parse(brut);
    if(typeof s.prenom !== "string" || typeof s.chapitreIndex !== "number") return null;
    return s;
  }catch(e){ return null; }
}

   SECTION 2 — AUDIO (Web Audio API, tout synthétisé, §8)
   ============================================================ */
let ctxAudio = null;
function debloquerAudio(){
  if(ctxAudio) return;
  try{
    ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
  }catch(e){ ctxAudio = null; }
}
// Joue une note simple (volume master <= 0.15)
function note(freq, debut, duree, type, vol){
  if(!ctxAudio || !etat.sonOn) return;
  try{
    const o = ctxAudio.createOscillator();
    const g = ctxAudio.createGain();
    o.type = type || "sine";
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, ctxAudio.currentTime + debut);
    g.gain.linearRampToValueAtTime(Math.min(vol || 0.12, 0.15), ctxAudio.currentTime + debut + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ctxAudio.currentTime + debut + duree);
    o.connect(g); g.connect(ctxAudio.destination);
    o.start(ctxAudio.currentTime + debut);
    o.stop(ctxAudio.currentTime + debut + duree + 0.05);
  }catch(e){}
}
function sonBoot(){ // balayage sinus 200→800 Hz, 600 ms
  if(!ctxAudio || !etat.sonOn) return;
  try{
    const o = ctxAudio.createOscillator();
    const g = ctxAudio.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(200, ctxAudio.currentTime);
    o.frequency.linearRampToValueAtTime(800, ctxAudio.currentTime + 0.6);
    g.gain.setValueAtTime(0.06, ctxAudio.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctxAudio.currentTime + 0.6);
    o.connect(g); g.connect(ctxAudio.destination);
    o.start(); o.stop(ctxAudio.currentTime + 0.65);
  }catch(e){}
}
function sonBlip(){ note(880, 0, 0.025, "sine", 0.05); }
function sonErreur(){ note(180, 0, 0.12, "sine", 0.08); }
function sonReussite(){ // arpège triangle Do-Mi-Sol
  note(523, 0,    0.08, "triangle", 0.1);
  note(659, 0.08, 0.08, "triangle", 0.1);
  note(784, 0.16, 0.08, "triangle", 0.1);
}
function sonModule(){ sonReussite(); note(1046, 0.26, 0.14, "triangle", 0.1); }
function sonFanfare(){ // 5 notes montantes, 1,2 s
  [523, 587, 659, 784, 1046].forEach(function(f, i){
    note(f, i * 0.22, 0.2, "triangle", 0.12);
  });
}

/* ============================================================
   SECTION 4 — MOTEUR : file de messages, typewriter, saisie
   ============================================================ */
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const VITESSE_TYPE = reduceMotion ? 5 : 30; // ms / caractère

let fileMessages = [];      // file de bulles et d'actions
let typeEnCours = false;    // typewriter actif ?
let texteCible = "";        // texte complet de la bulle courante
let timerType = null;
let attenteClic = false;    // bulle finie, on attend le clic pour la suivante
let saisieAttendue = false; // l'input est-il actif ?

// Ajoute une bulle : dire(perso, etatNova, texte)
function dire(perso, etatN, texte){
  fileMessages.push({ type:"bulle", perso:perso, etat:etatN, texte:texte });
}
function direNova(etatN, texte){ dire("NOVA", etatN, texte); }
// Ajoute une action (exécutée quand son tour arrive dans la file)
function ensuite(fn){ fileMessages.push({ type:"action", fn:fn }); }

function traiterFile(){
  if(typeEnCours || attenteClic) return;
  const msg = fileMessages.shift();
  if(!msg){ return; }
  if(msg.type === "action"){
    msg.fn();
    traiterFile();
    return;
  }
  // Bulle : nom du perso + état de NOVA + typewriter
  const bulle = $("bulle");
  bulle.className = "";
  if(msg.perso === "GLITCH") bulle.classList.add("perso-glitch");
  if(msg.perso === "PIX") bulle.classList.add("perso-pix");
  if(msg.perso === "PORTIER.EXE") bulle.classList.add("perso-portier");
  $("bulle-nom").textContent = msg.perso;
  if(msg.perso === "NOVA") etatNova(msg.etat || "talk");
  $("fleche-suite").classList.remove("visible");
  sonBlip();
  texteCible = injecter(msg.texte);
  typeEnCours = true;
  let i = 0;
  const span = $("bulle-texte");
  span.textContent = "";
  clearInterval(timerType);
  timerType = setInterval(function(){
    i++;
    span.textContent = texteCible.slice(0, i);
    if(i >= texteCible.length){ finBulle(msg); }
  }, VITESSE_TYPE);
}
function finBulle(msg){
  clearInterval(timerType);
  $("bulle-texte").textContent = texteCible;
  typeEnCours = false;
  if(msg.perso === "NOVA"){
    // Retour à l'état indiqué (talk → idle une fois la bulle finie)
    etatNova((!msg.etat || msg.etat === "talk") ? "idle" : msg.etat);
  }
  if(fileMessages.length > 0 || !saisieAttendue){
    attenteClic = true;
    $("fleche-suite").classList.add("visible");
  }else{
    activerSaisieReelle();
  }
}
// Clic / tap / Espace / Entrée sur la bulle : avance ou complète
function avancerBulle(){
  if(typeEnCours){
    // Interruption : afficher tout le texte immédiatement
    clearInterval(timerType);
    typeEnCours = false;
    $("bulle-texte").textContent = texteCible;
    const dernierMsg = { perso: $("bulle-nom").textContent, etat:null };
    if(dernierMsg.perso === "NOVA") etatNova("idle");
    if(fileMessages.length > 0 || !saisieAttendue){
      attenteClic = true;
      $("fleche-suite").classList.add("visible");
    }else{
      activerSaisieReelle();
    }
    return;
  }
  if(attenteClic){
    attenteClic = false;
    $("fleche-suite").classList.remove("visible");
    if(fileMessages.length > 0){ traiterFile(); }
    else if(saisieAttendue){ activerSaisieReelle(); }
  }
}

let placeholderCourant = "Tape une commande…";

/* ============================================================
   SECTION 5 — ÉNIGMES, INDICES PROGRESSIFS (§4.3) & ROUTEUR
   ============================================================ */
let enigme = null;
// Déclare l'énigme en cours :
// { solutions:[...], indices:[i1,i2,i3], special(n)->texte|null, onReussite() }
function definirEnigme(def){
  enigme = def;
  enigme.essais = 0;
  enigme.indicesDonnes = 0;
  enigme.echecsApres3 = 0;
}
function donnerIndice(){
  if(!enigme) return false;
  if(enigme.indicesDonnes >= 3){
    direNova("talk", "Je t'ai déjà tout dit, Agent ! Relis l'indice : " + enigme.indices[2]);
    traiterFile();
    return true;
  }
  const i = enigme.indicesDonnes;
  enigme.indicesDonnes++;
  direNova("thinking", "Indice " + (i + 1) + " : " + enigme.indices[i]);
  traiterFile();
  return true;
}
// NOVA tape la réponse elle-même (anti-blocage ultime, §4.3)
function novaValideElleMeme(){
  const reponse = enigme.reponseAuto || enigme.solutions[0];
  direNova("happy", "Regarde, je tape avec toi : " + reponse);
  ensuite(function(){
    desactiverSaisie();
    const inp = $("saisie");
    inp.disabled = false;
    let i = 0;
    const timer = setInterval(function(){
      i++;
      inp.value = reponse.slice(0, i);
      if(i >= reponse.length){
        clearInterval(timer);
        setTimeout(function(){
          inp.value = "";
          inp.disabled = true;
          echoCommande(reponse);
          const e = enigme;
          enigme = null;
          saisieAttendue = false; // la suite (carte, transition) gère la saisie
          glowReussite();
          sonReussite();
          e.onReussite();
        }, 450);
      }
    }, 90);
  });
  traiterFile();
}
function tenterEnigme(n, nCode){
  const solutions = enigme.solutions.map(normaliserCode);
  if(solutions.indexOf(nCode) !== -1){
    const e = enigme;
    enigme = null;
    saisieAttendue = false; // la suite (bulles, carte, transition) gère la saisie
    glowReussite();
    sonReussite();
    e.onReussite();
    return;
  }
  // Échec : feedback spécial ou message d'erreur de l'énigme
  enigme.essais++;
  secouerInput();
  const special = enigme.special ? enigme.special(n, nCode) : null;
  if(special){
    if(Array.isArray(special)){ dire(special[0], special[1], special[2]); }
    else{ direNova("talk", special); }
  }
  // Paliers automatiques : 2 / 4 / 6 essais → indices 1 / 2 / 3
  if(enigme.indicesDonnes < 3){
    const palier = (enigme.essais >= 6) ? 3 : (enigme.essais >= 4) ? 2 : (enigme.essais >= 2) ? 1 : 0;
    while(enigme.indicesDonnes < palier){
      const i = enigme.indicesDonnes;
      enigme.indicesDonnes++;
      direNova("thinking", "Indice " + (i + 1) + " : " + enigme.indices[i]);
    }
  }else{
    enigme.echecsApres3++;
    if(enigme.echecsApres3 >= 2){
      novaValideElleMeme();
      return;
    }
  }
  traiterFile();
}

// ---------- Commandes globales (§4.2) ----------
let blagueIndex = Math.floor(Math.random() * BLAGUES.length);
function commandeGlobale(n){
  if(n === "aide"){
    const ch = CHAPITRES[etat.chapitreIndex];
    ecrire("┌─ COMMANDES D'AGENT ─────────────────┐", "ligne-or");
    (ch.aideContextuelle || []).forEach(function(l){ ecrire("│ " + l, "ligne-sys"); });
    ecrire("│ aide    → j'affiche ce panneau", "ligne-sys");
    ecrire("│ scanner → état des modules du Système", "ligne-sys");
    ecrire("│ indice  → un coup de pouce sur l'énigme", "ligne-sys");
    ecrire("│ son     → couper / remettre le son", "ligne-sys");
    ecrire("└─────────────────────────────────────┘", "ligne-or");
    if(ch.objectifAide){ direNova("talk", ch.objectifAide); traiterFile(); }
    return true;
  }
  if(n === "indice"){
    if(enigme){ donnerIndice(); }
    else{ direNova("talk", "Pas d'énigme en cours, Agent ! Continue ta mission."); traiterFile(); }
    return true;
  }
  if(n === "scanner"){
    ecrire("SCAN DU SYSTÈME EN COURS... ▓▓▓▓▓▓▓▓ 100%", "ligne-or");
    afficherScan();
    return true;
  }
  if(n === "son"){
    basculerSon();
    ecrire("Son : " + (etat.sonOn ? "ACTIVÉ 🔊" : "COUPÉ 🔇"), "ligne-or");
    return true;
  }
  if(n === "nova"){
    blagueIndex = (blagueIndex + 1) % BLAGUES.length;
    direNova("happy", BLAGUES[blagueIndex]);
    traiterFile();
    return true;
  }
  if(n === "bip"){
    direNova("happy", "BIP BIP !");
    traiterFile();
    return true;
  }
  return false;
}
// État réel des modules à tout moment (icône + libellé, jamais couleur seule)
function afficherScan(){
  const etatsPanne = ["CORROMPU", "VERROUILLÉ", "CORROMPU", "CASSÉ", "BUGGÉ"];
  MODULES.forEach(function(m, i){
    const points = "........".slice(0, Math.max(2, 11 - m.nom.length)) + "........";
    if(modulesRepares.has(i)){
      ecrire("✔ " + m.nom + " " + points + " RÉPARÉ", "ligne-ok");
    }else if(i === 5){
      ecrire("? CŒUR ............ ??? signal inconnu détecté", "ligne-err");
    }else{

  });
}
function basculerSon(){
  etat.sonOn = !etat.sonOn;
  $("btn-son").textContent = etat.sonOn ? "🔊" : "🔇";
  sauvegarder();
}

// ---------- Routeur principal (§4.1) ----------
function traiterSaisie(brut){
  const n = normaliser(brut);
  const nCode = normaliserCode(brut);
  echoCommande(brut);

  if(n === ""){
    direNova("worried", "Bip ? Je n'ai rien reçu ! Tape quelque chose avant d'appuyer sur Entrée.");
    traiterFile();
    return;
  }
  if(brut.length > 60){
    direNova("worried", "Houlà, quel roman ! Les commandes sont courtes, Agent.");
    traiterFile();
    return;
  }
  // Filtre politesse
  const mots = n.split(" ");
  if(GROS_MOTS.some(function(g){ return mots.indexOf(g) !== -1; })){
    direNova("worried", "OH ! Mes circuits ont entendu ça ! On reste poli, Agent !");
    traiterFile();
    return;
  }

  const ch = CHAPITRES[etat.chapitreIndex];
  // 0. Saisies prioritaires du chapitre (ex : prénom au chapitre 0)
  // CHOIX: pendant la saisie du prénom, tout est traité comme un prénom
  // (sinon un enfant prénommé « Nova » déclencherait l'easter egg).
  if(ch.prioritaire && ch.prioritaire(n, nCode, brut)) return;
  // CHOIX: si la saisie est LA solution de l'énigme en cours, elle gagne sur
  // les commandes globales (ex : « bip » est à la fois l'easter egg et la
  // réponse du chapitre 4 — sinon l'énigme serait insoluble).
  if(enigme && enigme.solutions.map(normaliserCode).indexOf(nCode) !== -1){
    tenterEnigme(n, nCode);
    return;
  }
  // 1. Commandes globales (toujours prioritaires)
  if(commandeGlobale(n)) return;
  // 2. Commandes contextuelles du chapitre en cours
  if(ch.onInput && ch.onInput(n, nCode, brut)) return;
  // 3. Tentative de réponse à l'énigme en cours
  if(enigme){ tenterEnigme(n, nCode); return; }
  // 4. Commande inconnue (rotation aléatoire)
  const r = REPONSES_INCONNUES[Math.floor(Math.random() * REPONSES_INCONNUES.length)];
  direNova("thinking", r);
  traiterFile();
}

// Pixel-art 12×9 : une fusée stylisée (0 = fond nuit, lettres = couleurs)
const PIXEL_ART = [
  "0000FF000000",
  "000FJJF00000",
  "000FJJF000Y0",
  "00FFJJFF0000",
  "00FCJJCF0000",
  "0YFFJJFF0000",
  "00FRRRRF00Y0",
  "000R00R00000",
  "00RR00RR0000"
];
const COULEURS_PIXELS = { "0":"#0B1026", "F":"#F2F5FF", "J":"#FFD23F", "C":"#4DE3FF", "R":"#FF5C8A", "Y":"#FFD23F" };
CHAPITRES[5] = {
  id:"ecran", titre:"ÉCRAN",
  chips:["aide", "indice"],
  aideContextuelle:[],
  objectifAide:"Mission : lumière ROUGE + lumière VERTE allumées ensemble = quelle couleur ? Tape ta réponse !",
  onEnter:function(){
    direNova("worried", "Le module ÉCRAN est tout cassé… regarde cette pauvre image en miettes !");
    ensuite(function(){
      // Image cassée : grille de gros carrés gris
      const term = $("terminal");
      const grille = document.createElement("div");
      grille.id = "grille-pixels";
      PIXEL_ART.forEach(function(rangee){
        rangee.split("").forEach(function(){
          const p = document.createElement("div");
          p.className = "px";
          grille.appendChild(p);
        });
      });
      term.appendChild(grille);
      term.scrollTop = term.scrollHeight;
    });
    direNova("talk", "Petit secret : approche-toi TRÈS près d'une télé ou d'une tablette. Tu verras des petits carrés. Ce sont des PIXELS !");
    direNova("talk", "Chaque pixel est une mini-lampe avec 3 couleurs dedans : ROUGE, VERTE et BLEUE. En les mélangeant, l'écran fabrique TOUTES les couleurs !");
    direNova("talk", "Pour réparer l'écran, réponds à la question du module :");
    ensuite(function(){
      ecrire("┌─ QUESTION DE RÉPARATION ────────────────┐", "ligne-or");
      ecrire("│ Lumière ROUGE + lumière VERTE allumées  │", "ligne-sys");
      ecrire("│ en même temps = quelle couleur ?        │", "ligne-sys");
      ecrire("└──────────────────────────────────────────┘", "ligne-or");
    });
    ensuite(function(){
      definirEnigme({
        solutions:["jaune", "le jaune", "du jaune"],
        reponseAuto:"jaune",
        indices:[
          "Attention : on parle de LUMIÈRE, pas de peinture ! Les mélanges ne donnent pas pareil.",
          "C'est la couleur du soleil et des bananes…",
          "C'est JAUNE ! Avec la lumière : rouge + vert = jaune. Tape jaune."
        ],
        special:function(n, nCode){
          if(nCode === "marron" || nCode === "orange")
            return "Bien tenté ! Avec de la PEINTURE, oui. Mais avec de la LUMIÈRE, c'est différent… et c'est plus joli !";
          if(nCode === "vert" || nCode === "rouge")
            return "Les DEUX lampes sont allumées en même temps : elles se mélangent !";
          return "Hmm, non. Pense au soleil…";
        },
        onReussite:function(){
          // Animation OBLIGATOIRE : reconstruction pixel par pixel (~1,5 s)
          desactiverSaisie();
          const pixels = Array.prototype.slice.call(document.querySelectorAll("#grille-pixels .px"));
          const couleursPlat = [];
          PIXEL_ART.forEach(function(rangee){
            rangee.split("").forEach(function(c){ couleursPlat.push(COULEURS_PIXELS[c]); });
          });
          // Ordre aléatoire
          const ordre = pixels.map(function(_, i){ return i; });
          for(let i = ordre.length - 1; i > 0; i--){
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = ordre[i]; ordre[i] = ordre[j]; ordre[j] = tmp;
          }
          const pas = reduceMotion ? 0 : 1500 / ordre.length;
          ordre.forEach(function(idx, k){
            setTimeout(function(){ pixels[idx].style.background = couleursPlat[idx]; }, k * pas);
          });
          setTimeout(function(){
            allumerModule(3);
            ecrire("IMAGE RESTAURÉE ✔ Module ÉCRAN réparé !", "ligne-ok");
            direNova("happy", "MAGNIFIQUE ! Et voilà comment ton écran fabrique des millions de couleurs… avec seulement 3 petites lampes par pixel.");
            ensuite(function(){
              montrerCarte(4, function(){
                transitionChapitre("🧩 MODULE 5 — LOGIQUE", function(){ lancerChapitre(6); });
              });
            });
            traiterFile();
          }, reduceMotion ? 100 : 1600);
        }
      });
      attendreSaisie("Tape ta réponse…");
    });
    traiterFile();
  },
  onInput:function(){ return false; }
};

/* ============================================================
   SECTION 7 — ÉCRANS ANNEXES : diplôme, confettis, reprise (§10)
   ============================================================ */
function montrerDiplome(){
  etat.termine = true;
  sauvegarder();
  $("diplome-prenom").textContent = prenomAffiche();
  $("diplome-date").textContent = new Date().toLocaleDateString("fr-FR",
    { day:"numeric", month:"long", year:"numeric" });
  const grille = $("grille-savoirs");
  grille.innerHTML = "";
  SAVOIRS.forEach(function(s){
    const d = document.createElement("div");
    d.className = "mini-savoir";
    const ic = document.createElement("span");
    ic.className = "ic";
    ic.textContent = s.ic;
    d.appendChild(ic);
    d.appendChild(document.createTextNode(s.txt));
    grille.appendChild(d);
  });
  $("ecran-diplome").hidden = false;
  lancerConfettis();
  // Dernière bulle de NOVA derrière le diplôme
  direNova("happy", "Le Système est sauvé grâce à toi, Agent {PRENOM}. Reviens quand tu veux… BIP !");
  traiterFile();
}
function lancerConfettis(){
  if(reduceMotion){
    // Étoiles statiques à la place des confettis
    const z = $("confettis-zone");
    z.textContent = "✦ ✧ ✦ ✧ ✦";
    z.style.cssText = "position:fixed;top:8px;left:0;right:0;text-align:center;color:var(--or);font-size:22px;z-index:30;";
    setTimeout(function(){ z.textContent = ""; }, 4000);
    return;
  }
  const couleurs = ["var(--or)", "var(--cyan)", "var(--vert)", "var(--corail)"];
  for(let i = 0; i < 70; i++){
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = (Math.random() * 100) + "vw";
    c.style.background = couleurs[i % 4];
    c.style.animationDelay = (Math.random() * 0.8) + "s";
    c.style.animationDuration = (2.4 + Math.random() * 1.2) + "s";
    document.body.appendChild(c);
    setTimeout(function(){ c.remove(); }, 4500);
  }
}

// ---------- Écran de reprise (§4.4) ----------
function montrerReprise(save){
  etat.prenom = save.prenom;
  etat.sonOn = (save.sonOn !== false);
  $("btn-son").textContent = etat.sonOn ? "🔊" : "🔇";
  const nomsModules = ["DÉMARRAGE", "TERMINAL", "ARCHIVES", "SÉCURITÉ", "MÉMOIRE", "ÉCRAN", "LOGIQUE", "CŒUR"];
  $("texte-reprise").textContent = "Bip ! Re-bonjour Agent " + prenomAffiche() +
    " ! On reprend la mission au module " + nomsModules[save.chapitreIndex] + " ?";
  $("ecran-titre").hidden = true;
  $("ecran-reprise").hidden = false;
  $("btn-reprendre").onclick = function(){
    debloquerAudio();
    $("ecran-reprise").hidden = true;
    // Rallume les modules déjà réparés
    for(let i = 0; i < save.chapitreIndex - 2; i++){ modulesRepares.add(i); }
    dessinerProgression();
    afficherAvatar("nova");
    lancerChapitre(Math.max(1, save.chapitreIndex));
  };
  $("btn-recommencer").onclick = function(){
    $("confirm-reset").hidden = false;
  };
  $("btn-reset-oui").onclick = function(){
    debloquerAudio();
    effacerSauvegarde();
    etat.prenom = "";
    $("ecran-reprise").hidden = true;
    demarrerNouvellePartie();
  };
  $("btn-reset-non").onclick = function(){
    $("confirm-reset").hidden = true;
  };
}

function demarrerNouvellePartie(){
  dessinerProgression();
  lancerChapitre(0);
}

/* ============================================================
   SECTION 8 — INITIALISATION & ÉVÉNEMENTS
   ============================================================ */
function envoyerSaisie(){
  const inp = $("saisie");
  if(inp.disabled) return;
  const brut = inp.value;
  inp.value = "";
  desactiverSaisie();
  saisieAttendue = true; // la plupart des réponses réactivent la saisie ensuite
  traiterSaisie(brut);
  // Si aucune bulle n'a été produite (ex : scanner seul), on réactive direct
  if(!typeEnCours && !attenteClic && fileMessages.length === 0 && saisieAttendue){
    activerSaisieReelle();
  }
}

function initialiser(){
  creerEtoiles();
  dessinerProgression();
  afficherAvatar("nova");

  // Saisie : Entrée ou bouton ⏎
  $("saisie").addEventListener("keydown", function(e){
    if(e.key === "Enter"){ e.preventDefault(); envoyerSaisie(); }
  });
  $("btn-envoyer").addEventListener("click", envoyerSaisie);

  // Avancer les bulles : clic/tap sur la bulle, ou Espace/Entrée hors input
  $("bulle").addEventListener("click", avancerBulle);
  document.addEventListener("keydown", function(e){
    if(document.activeElement === $("saisie")) return;
    if(e.key === " " || e.key === "Enter"){
      if(typeEnCours || attenteClic){ e.preventDefault(); avancerBulle(); }
    }
  });

  // Bouton son
  $("btn-son").addEventListener("click", function(){
    debloquerAudio();
    basculerSon();
  });

  // Carte « CE QUE TU AS APPRIS »
  $("btn-carte-continuer").addEventListener("click", function(){
    $("ecran-carte").hidden = true;
    if(callbackCarte){ const cb = callbackCarte; callbackCarte = null; cb(); }
  });

  // Diplôme
  $("btn-imprimer").addEventListener("click", function(){ window.print(); });
  $("btn-rejouer").addEventListener("click", function(){
    if(window.confirm("Sûr ? Toute la progression sera effacée.")){
      effacerSauvegarde();
      window.location.reload();
    }
  });

  // Écran titre ou reprise
  const save = chargerSauvegarde();
  if(save && save.prenom && save.termine === false && save.chapitreIndex > 0){
    montrerReprise(save);
  }else{
    $("btn-commencer").addEventListener("click", function(){
      debloquerAudio(); // l'AudioContext est débloqué à la première interaction
      $("ecran-titre").hidden = true;
      demarrerNouvellePartie();
    });
  }
}

document.addEventListener("DOMContentLoaded", initialiser);

</script>
