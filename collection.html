<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collection — Tous les artefacts</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070d;
    --border: #1e1e2e;
    --accent: #4df0a0;
    --muted: #5a5a70;
    --text: #e8e8f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(77,240,160,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(77,240,160,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1000px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }

  header {
    margin-bottom: 56px;
    animation: fadeUp 0.5s ease both;
  }

  .tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    border-radius: 2px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1.05;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 14px;
  }

  .artefact {
    margin-bottom: 64px;
    animation: fadeUp 0.5s ease both;
  }

  .artefact:nth-child(1) { animation-delay: 0.15s; }
  .artefact:nth-child(2) { animation-delay: 0.3s; }
  .artefact:nth-child(3) { animation-delay: 0.45s; }

  .artefact-label {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .artefact-num {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: rgba(77,240,160,0.1);
    border: 1px solid rgba(77,240,160,0.25);
    padding: 3px 9px;
    border-radius: 3px;
    letter-spacing: 1px;
  }

  .artefact-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text);
  }

  .artefact-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  iframe {
    display: block;
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: #0a0a0f;
    transition: border-color 0.2s;
  }

  iframe:hover { border-color: rgba(77,240,160,0.2); }

  footer {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    animation: fadeUp 0.5s 0.6s ease both;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="tag">// Collection</div>
    <h1>Tous les<br><span>artefacts</span></h1>
    <p class="subtitle">3 artefacts · compilés pour Hive</p>
  </header>

  <div class="artefact">
    <div class="artefact-label">
      <span class="artefact-num">01</span>
      <span class="artefact-title">Android 17 & Pixel — Features</span>
      <div class="artefact-line"></div>
    </div>
    <iframe
      id="frame-android"
      src="android-17-pixel-features.html"
      scrolling="no"
      frameborder="0"
      height="800"
    ></iframe>
  </div>

  <div class="artefact">
    <div class="artefact-label">
      <span class="artefact-num">02</span>
      <span class="artefact-title">Templates Discord — Plan d'action</span>
      <div class="artefact-line"></div>
    </div>
    <iframe
      id="frame-plan"
      src="plan-discord-templates.html"
      scrolling="no"
      frameborder="0"
      height="800"
    ></iframe>
  </div>

  <div class="artefact">
    <div class="artefact-label">
      <span class="artefact-num">03</span>
      <span class="artefact-title">Documentation — Template Discord Gaming</span>
      <div class="artefact-line"></div>
    </div>
    <iframe
      id="frame-doc"
      src="documentation-discord-gaming.html"
      scrolling="no"
      frameborder="0"
      height="800"
    ></iframe>
  </div>

  <footer>
    <span>// Hive — Artefacts Claude</span>
    <span>3 fichiers · Mai 2026</span>
  </footer>

</div>

<script>
  function autoResize(iframe) {
    try {
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      const height = doc.documentElement.scrollHeight || doc.body.scrollHeight;
      if (height > 200) iframe.style.height = height + 'px';
    } catch (e) {}
  }

  document.querySelectorAll('iframe').forEach(function(iframe) {
    iframe.addEventListener('load', function() {
      autoResize(this);
      // Second pass after fonts/images settle
      setTimeout(() => autoResize(this), 800);
    });
  });
</script>
</body>
</html>
